<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>학습</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F5496">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        body {
            overflow: hidden;
        }

        /* 공통 컨테이너 */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
        }

        /* 상단 바 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #2F5496;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(47, 84, 150, 0.15);
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            flex: 1;
            text-align: center;
        }

        /* 페이지별 표시 */
        .page {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* ===== 홈 화면 ===== */
        #home-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .home-title {
            font-size: 28px;
            font-weight: 700;
            color: #2F5496;
            margin-bottom: 10px;
        }

        .today-button {
            width: 85%;
            max-width: 300px;
            padding: 24px 20px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(47, 84, 150, 0.3);
            transition: all 0.3s ease;
        }

        .today-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(47, 84, 150, 0.4);
        }

        .today-button:active {
            transform: translateY(0);
        }

        .button-subtitle {
            display: block;
            font-size: 12px;
            font-weight: 400;
            margin-top: 8px;
            opacity: 0.95;
        }

        /* 학습 현황 카드 */
        .stats-card {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }

        .stats-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #2F5496;
            font-weight: 700;
            font-size: 16px;
        }

        /* ===== 퀴즈 화면 ===== */
        #quiz-page {
            flex-direction: column;
            gap: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .instruction-text {
            font-size: 15px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 400;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Fill Blank 스타일 */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .choice-btn {
            padding: 14px 12px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .choice-btn:active {
            transform: scale(0.98);
        }

        .choice-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .choice-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        .choice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .choice-btn.multi-selected {
            background-color: #E3F2FD;
            border-color: #1a73e8;
            color: #1565C0;
            font-weight: 700;
        }

        .choice-btn.multi-selected::before {
            content: '✔ ';
            color: #1a73e8;
        }

        /* Arrange 스타일 */
        .arrange-container {
            margin-bottom: 16px;
        }

        .selected-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 2px dashed #ddd;
            min-height: 50px;
            margin-bottom: 12px;
            align-content: flex-start;
        }

        .selected-word {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: #e3f2fd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #90caf9;
        }

        .remove-word-btn {
            background: none;
            border: none;
            color: #2196F3;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }

        .available-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-btn {
            padding: 10px 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .word-btn:active {
            transform: scale(0.98);
        }

        .word-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .word-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .word-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* Match 스타일 */
        .match-options {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .match-option {
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .match-option:active {
            transform: scale(0.98);
        }

        .match-option.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .match-option.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* 컨트롤 버튼 */
        .quiz-controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 16px;
        }

        .btn-quit {
            flex: 1;
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
        }

        .btn-quit:active {
            background-color: #e0e0e0;
        }

        /* ===== 완료 화면 ===== */
        #result-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
            text-align: center;
        }

        .result-label {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        .missed-questions {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow-y: auto;
        }

        .missed-question-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .missed-question-item:last-child {
            border-bottom: none;
        }

        .missed-keyword {
            font-weight: 600;
            color: #F44336;
        }

        .missed-answer {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            flex-direction: column;
        }

        .btn-export {
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-home {
            padding: 14px;
            background-color: #2F5496;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-retry {
            padding: 14px;
            background-color: #E65100;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            animation: retryPulse 2s ease-in-out 1;
        }

        @keyframes retryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .retry-recovery-box {
            background: #FFF3E0;
            border: 2px solid #E65100;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            text-align: center;
        }

        .retry-recovery-rate {
            font-size: 28px;
            font-weight: 700;
            color: #E65100;
        }

        .retry-recovery-label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .retry-item-recovered {
            color: #2E7D32;
            font-weight: 600;
        }

        .retry-item-still-wrong {
            color: #C62828;
        }

        .btn-export:active, .btn-home:active, .btn-retry:active {
            opacity: 0.9;
        }

        /* 다음 문항 버튼 */
        .btn-next {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 3px 10px rgba(47, 84, 150, 0.3);
            display: none;
            transition: all 0.2s ease;
        }

        .btn-next:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 배열형 건너뛰기 버튼 */
        .btn-skip {
            flex: 1;
            padding: 14px;
            background-color: #fff3e0;
            border: 2px solid #ff9800;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #e65100;
        }

        /* 힌트 버튼 */
        .btn-hint {
            flex: 1;
            padding: 14px;
            background-color: #fff8e1;
            border: 2px solid #ffc107;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #f57f17;
        }

        /* 결과 화면 - 아이용 섹션 */
        .result-kid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-emoji {
            font-size: 64px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
        }

        .result-kid-message {
            font-size: 20px;
            font-weight: 600;
            color: #2F5496;
            text-align: center;
        }

        /* 결과 화면 - 부모용 섹션 */
        .result-parent-section {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-parent-toggle {
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            text-align: center;
        }

        /* 웹훅 설정 */
        .webhook-settings {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }
        .ops-diagnostics {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 7px;
            font-size: 12px;
            color: #555;
        }
        .ops-diag-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            line-height: 1.4;
        }
        .ops-diag-row strong {
            color: #2F5496;
            font-weight: 700;
            text-align: right;
            word-break: break-all;
        }
        .ops-diag-actions {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .ops-diag-actions button {
            flex: 1;
            padding: 8px 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #f7f7f7;
            color: #444;
            font-size: 12px;
            cursor: pointer;
        }
        
        /* position_ask: 단어 위치 표시 */
        .position-sentence {
            font-size: 18px;
            font-weight: 600;
            color: #2F5496;
            text-align: center;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 10px;
            margin-bottom: 12px;
            line-height: 1.8;
        }
        .position-sentence .word-token {
            display: inline-block;
            padding: 4px 6px;
            margin: 2px;
            border-bottom: 2px solid #ccc;
            font-family: monospace;
        }
        .position-sentence .word-number {
            display: block;
            font-size: 10px;
            color: #999;
            text-align: center;
            font-weight: 400;
        }

        /* mini_writing: 서술형 입력 */
        .writing-container {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .writing-condition {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #333;
        }
        .writing-condition strong {
            color: #e65100;
        }
        .writing-input {
            width: 100%;
            min-height: 60px;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: system-ui, -apple-system, sans-serif;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .writing-input:focus {
            outline: none;
            border-color: #2F5496;
        }
        .writing-submit-btn {
            padding: 14px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .writing-feedback {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        .writing-feedback.pass {
            background: #e8f5e9;
            border: 1px solid #4CAF50;
            color: #2e7d32;
        }
        .writing-feedback.fail {
            background: #fce4ec;
            border: 1px solid #f44336;
            color: #c62828;
        }

        /* Lesson Selector */
        .settings-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #e9ecef;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .setting-row + .setting-row {
            border-top: 1px solid #e9ecef;
            margin-top: 8px;
            padding-top: 12px;
        }
        .setting-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            min-width: 60px;
        }
        .lesson-selector {
            display: flex;
            gap: 8px;
        }
        .lesson-btn {
            padding: 8px 16px;
            min-width: 40px;
            border: 2px solid #2F5496;
            border-radius: 20px;
            background: white;
            color: #2F5496;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lesson-btn.active {
            background: #2F5496;
            color: white;
        }
        .count-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .count-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #2F5496;
            border-radius: 50%;
            background: white;
            color: #2F5496;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .count-btn:active {
            background: #2F5496;
            color: white;
        }
        .session-type-selector {
            display: flex;
            gap: 8px;
            flex: 1;
        }
        .session-type-btn {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #2F5496;
            border-radius: 20px;
            background: white;
            color: #2F5496;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.3;
        }
        .session-type-btn.active {
            background: #2F5496;
            color: white;
        }
        .session-type-btn .type-desc {
            display: block;
            font-size: 10px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 2px;
        }
        .count-display {
            font-size: 20px;
            font-weight: 700;
            color: #2F5496;
            min-width: 36px;
            text-align: center;
        }

        /* Flashcard — Quizlet-style flip */
        .flashcard-scene {
            perspective: 800px;
            min-height: 180px;
            cursor: pointer;
        }
        .flashcard {
            position: relative;
            width: 100%;
            min-height: 180px;
            transform-style: preserve-3d;
            transition: transform 0.25s ease;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute;
            width: 100%;
            min-height: 180px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-sizing: border-box;
        }
        .flashcard-front { font-size: 20px; font-weight: 600; color: #2F5496; line-height: 1.6; text-align: center; }
        .flashcard-back {
            transform: rotateY(180deg);
            font-size: 18px; color: #333; line-height: 1.6; text-align: center;
        }
        .flashcard-back .grammar-note { font-size: 14px; color: #e65100; background: #fff3e0; padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
        .flashcard-tap-hint { font-size: 13px; color: #999; margin-top: 12px; }
        #vocab-hint-display { background: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #1565c0; margin-top: 8px; }
        .flashcard-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .flashcard-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .flashcard-btn.know { background: #e8f5e9; color: #2e7d32; }
        .flashcard-btn.dont-know { background: #FFF3E0; color: #E65100; }

        /* Vocab Drill */
        .vocab-word { font-size: 32px; font-weight: 700; color: #2F5496; }

        .vocab-result-summary .detail { font-size: 15px; color: #666; margin-top: 12px; }
        .vocab-retry-btn { width: 100%; padding: 16px; border: 2px solid #ff9800; border-radius: 10px; background: #fff3e0; color: #e65100; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .vocab-done-btn { width: 100%; padding: 16px; border: none; border-radius: 10px; background: #2F5496; color: white; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }


        /* Typed Blank */
        .typed-blank-prompt { font-size: 16px; line-height: 1.8; color: #333; margin-bottom: 16px; }
        .typed-blank-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 8px; }
        .typed-blank-input.correct-input { border-color: #4CAF50; background: #e8f5e9; }
        .typed-blank-input.wrong-input { border-color: #f44336; background: #fce4ec; }
        .typed-blank-input.typo-input { border-color: #FF9800; background: #fff3e0; }

        /* Mode selector */
        .mode-selector { display: flex; gap: 10px; width: 85%; max-width: 300px; }
        .mode-btn { flex: 1; padding: 16px 12px; border: 2px solid #2F5496; border-radius: 10px; background: white; color: #2F5496; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; white-space: nowrap; }
        .mode-btn.active { background: #2F5496; color: white; }
        .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .mode-btn .mode-desc { display: block; font-size: 11px; font-weight: 400; opacity: 0.7; margin-top: 4px; }
        .exam-perf-mode-btn { border-color: #4B5563 !important; color: #4B5563 !important; white-space: normal; }
        .exam-perf-mode-btn.active { background: #4B5563 !important; color: white !important; border-color: #4B5563 !important; }
        .exam-perf-frame { margin: 8px 0 12px; padding: 8px 10px; border-left: 4px solid #4B5563; background: #F3F4F6; border-radius: 0 8px 8px 0; font-size: 12px; font-weight: 700; color: #374151; }
        /* 영어 모드 셀렉터: 모드 버튼 4개(단어/문장/실전대비/모두고르기) → 2열 wrap. 한 줄(nowrap) 고정 시 4번째 '모두고르기 5분' 버튼이 화면 밖으로 잘려 미노출되던 문제 해결. */
        #english-mode-selector { flex-wrap: wrap; width: 90%; max-width: 320px; }
        #english-mode-selector .mode-btn { flex: 0 0 calc(50% - 5px); white-space: normal; }
        /* 국어 모드 셀렉터: 2x2 그리드 */
        #korean-mode-selector { flex-wrap: wrap; width: 90%; max-width: 320px; }
        #korean-mode-selector .mode-btn { flex: 0 0 calc(50% - 5px); white-space: normal; border-color: #6B4C9A; color: #6B4C9A; font-size: 14px; padding: 14px 8px; }
        #korean-mode-selector .mode-btn.active { background: #6B4C9A; color: white; border-color: #6B4C9A; }
        /* 수학 모드 셀렉터 */
        #math-mode-selector { flex-wrap: wrap; width: 90%; max-width: 320px; }
        #math-mode-selector .mode-btn { flex: 0 0 calc(50% - 5px); white-space: normal; border-color: #D4760A; color: #D4760A; font-size: 14px; padding: 14px 8px; }
        #math-mode-selector .mode-btn.active { background: #D4760A; color: white; border-color: #D4760A; }

        #social-mode-selector { flex-wrap: wrap; width: 90%; max-width: 320px; }
        #social-mode-selector .mode-btn { flex: 0 0 calc(50% - 5px); white-space: normal; border-color: #2E7D32; color: #2E7D32; font-size: 14px; padding: 14px 8px; }
        #social-mode-selector .mode-btn.active { background: #2E7D32; color: white; border-color: #2E7D32; }

        #science-mode-selector { flex-wrap: wrap; width: 90%; max-width: 320px; }
        #science-mode-selector .mode-btn { flex: 0 0 calc(50% - 5px); white-space: normal; border-color: #1565C0; color: #1565C0; font-size: 14px; padding: 14px 8px; }
        #science-mode-selector .mode-btn.active { background: #1565C0; color: white; border-color: #1565C0; }
        /* 수학 수식 CSS */
        .mfrac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 2px; }
        .mfrac .mnum { border-bottom: 1.5px solid #333; padding: 0 3px 2px; font-size: 0.9em; line-height: 1.2; }
        .mfrac .mden { padding: 2px 3px 0; font-size: 0.9em; line-height: 1.2; }
        .mrep { text-decoration: overline; text-decoration-style: solid; font-weight: 500; }
        /* 절차 드릴 CSS */
        .pd-step { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #D4760A; }
        .pd-step-label { font-weight: 700; color: #D4760A; font-size: 15px; margin-bottom: 4px; }
        .pd-step-why { font-size: 13px; color: #888; margin-bottom: 10px; font-style: italic; }
        .pd-step-question { font-size: 15px; margin-bottom: 10px; line-height: 1.5; }
        .pd-step-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .pd-step-input:focus { border-color: #D4760A; outline: none; }
        .pd-step-btn { display: inline-block; padding: 10px 20px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .pd-choice-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border: 2px solid #D4760A; border-radius: 8px; background: white; color: #D4760A; font-size: 15px; cursor: pointer; text-align: left; }
        .pd-choice-btn:hover { background: #FFF3E0; }
        .pd-feedback { padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 14px; line-height: 1.5; }
        .pd-feedback.correct { background: #E8F5E9; color: #2E7D32; }
        .pd-feedback.wrong { background: #FFEBEE; color: #C62828; }
        /* 수학 개념카드 CSS */
        .mc-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.3s; min-height: 150px; }
        .mc-card.flipped .mc-front { display: none; }
        .mc-card:not(.flipped) .mc-back { display: none; }
        .mc-front { text-align: center; }
        .mc-front .mc-title { font-size: 24px; color: #D4760A; font-weight: 700; margin-bottom: 12px; }
        .mc-front .mc-question { font-size: 14px; font-weight: 500; line-height: 1.5; color: #888; }
        .mc-front .mc-tap { font-size: 12px; color: #aaa; margin-top: 16px; }
        .mc-back { text-align: left; }

        .mc-back .mc-easy { font-size: 14px; line-height: 1.7; margin-bottom: 12px; white-space: pre-line; }
        /* 자동 하이라이트 스타일 */
        .hl-term { background: linear-gradient(transparent 55%, #FFEB3B88 55%); font-weight: 600; }
        .hl-formula { color: #1565C0; font-weight: 600; }
        .hl-keyword { border-bottom: 2px solid #FF9800; font-weight: 600; }
        .hl-quote { font-weight: 600; color: #5D4037; }
        mark { background: linear-gradient(transparent 40%, #FFEB3B88 40%); padding: 0 2px; }

        .mc-back .mc-tip { font-size: 13px; background: #FFF3E0; padding: 10px; border-radius: 8px; border-left: 3px solid #D4760A; }
        .preparing-msg { color: #999; font-size: 14px; text-align: center; padding: 10px; }

        /* ===== 과목 선택 화면 (1단계) ===== */

        /* ===== 오늘의 한 장 (daily-page) ===== */

        // 전역 변수
        let isMuted = localStorage.getItem('sound_muted') === 'true';

        let currentMindmapBranch = null; // 과학 마인드맵 가지 학습 중이면 가지번호, 아니면 null
        const BUILD_VERSION = '2026-06-09 v159';
        const APP_CACHE_NAME = 'quiz-v159';

        // ── 기말 과학 범위 숨김 (2026-06-06) ──
        // 기말 후 복원: FINALS_MODE = false 한 줄로 셀렉터(sci1~4) 전체 노출 복귀.
        //              + lesson_sci2/sci3.js의 scope_out 필드 제거 시 빛/판운동 콘텐츠도 부활.
        const FINALS_MODE = true;
        function inScope(item) { return !(FINALS_MODE && item && item.scope_out === true); }
        function scopedItems(items) { return (items || []).filter(inScope); }

        // 그림 렌더 공통 헬퍼 (2026-06-06 v3): 우선순위 visual_img > visual_svg > 없음. 중복 렌더 금지.
        // 이미지 파일 누락 시 onerror로 컨테이너 숨김(빈 박스 방지).
        function renderVisualMedia(item) {
            if (!item) return '';
            if (item.visual_img) {
                return '<div class="mc-visual" style="margin-bottom:12px;text-align:center;overflow-x:auto;max-width:100%;"><img src="' + item.visual_img + '" alt="" style="max-width:100%;height:auto;border-radius:8px;" onerror="this.parentNode.style.display=\'none\'"></div>';
            }
            if (item.visual_svg) {
                return '<div class="mc-visual" style="margin-bottom:12px;text-align:center;overflow-x:auto;max-width:100%;">' + item.visual_svg.replace(/<svg /, '<svg style="max-width:100%;height:auto;" ') + '</div>';
            }
            return '';
        }

        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (err) {
                console.warn('[localStorage-set-fail]', key, err && err.message);
                pruneOldestQuizLogsForQuota();
                try {
                    localStorage.setItem(key, value);
                    return true;
                } catch (retryErr) {
                    console.warn('[localStorage-set-retry-fail]', key, retryErr && retryErr.message);
                    alert('앱 저장 공간이 부족합니다. 설정에서 로그 재전송 후 강제 새로고침을 실행해 주세요.');
                    return false;
                }
            }
        }

        function compactStoredQuizLog(log) {
            if (!log || typeof log !== 'object') return log;
            const compact = { ...log };
            if (Array.isArray(log.questions)) compact.question_count = log.questions.length;
            delete compact.questions;
            delete compact.details;
            compact.compacted = true;
            return compact;
        }

        function compactSentLogEntry(timestamp) {
            getQuizLogStorageKeys().forEach(k => {
                const items = JSON.parse(localStorage.getItem(k) || '[]');
                let changed = false;
                const next = items.map(log => {
                    if (log && log.timestamp === timestamp && (log.questions || log.details)) {
                        changed = true;
                        return compactStoredQuizLog(log);
                    }
                    return log;
                });
                if (changed) {
                    try { localStorage.setItem(k, JSON.stringify(next)); } catch (_) {}
                }
            });
        }

        function pruneOldSentLogs(days) {
            const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
            const sent = JSON.parse(localStorage.getItem('sent_logs') || '[]');
            const kept = sent.filter(ts => {
                const t = Date.parse(ts);
                return !Number.isFinite(t) || t >= cutoff;
            });
            if (kept.length !== sent.length) {
                try { localStorage.setItem('sent_logs', JSON.stringify(kept)); } catch (_) {}
            }
        }

        function pruneOldestQuizLogsForQuota() {
            const entries = [];
            getQuizLogStorageKeys().forEach(k => {
                const items = JSON.parse(localStorage.getItem(k) || '[]');
                items.forEach((log, idx) => {
                    entries.push({ key: k, idx, ts: Date.parse(log && log.timestamp || '') || 0, log });
                });
            });
            entries.sort((a, b) => a.ts - b.ts);
            const targets = entries.slice(0, Math.min(10, entries.length));
            const touched = new Set();
            targets.forEach(entry => {
                const items = JSON.parse(localStorage.getItem(entry.key) || '[]');
                if (items[entry.idx]) {
                    items[entry.idx] = compactStoredQuizLog(items[entry.idx]);
                    try { localStorage.setItem(entry.key, JSON.stringify(items)); } catch (_) {}
                    touched.add(entry.key);
                }
            });
            return touched.size;
        }

        // 세션 타입 선택 (하위호환 — 로그에 기록용으로 유지)
        function selectSessionType(type) {
            sessionType = type;
            safeSetItem('session_type', type);
        }

        // 고부하 문항 타입 (§7.4 Rule 4: 2개 연속 금지)
        const HIGH_LOAD_TASKS = new Set(['anchor_arrange', 'chunk_arrange', 'mini_rebuild', 'mini_writing', 'paragraph_order', 'dialogue_order']);

        function updateSubtitle() {
            // 버튼 제거됨 — 모드 선택 시 바로 시작하므로 subtitle info만 업데이트
            const el = document.getElementById('session-subtitle-info');
            if (!el) return;
            if (currentMode === 'vocab') {
                const count = (QUIZ_DATA && QUIZ_DATA.vocab_drill) ? QUIZ_DATA.vocab_drill.length : 0;
                el.textContent = count + '단어 · 약 5분';
            } else if (currentMode === 'math_concept') {
                const count = (QUIZ_DATA && QUIZ_DATA.concept_cards) ? QUIZ_DATA.concept_cards.length : 0;
                el.textContent = count + '개 카드 · 약 5분';
            } else if (currentMode === 'math_procedure') {
                const count = (QUIZ_DATA && QUIZ_DATA.procedure_drills) ? QUIZ_DATA.procedure_drills.length : 0;
                el.textContent = count + '문제 · 약 10분';
            } else if (currentMode === 'social_concept' || currentMode === 'science_concept') {
                // 기말 범위 필터 반영 (과학 sci2=13/sci3=6/sci4=6; 사회는 scope_out 없어 영향 없음)
                const count = (QUIZ_DATA && QUIZ_DATA.concept_cards) ? scopedItems(QUIZ_DATA.concept_cards).length : 0;
                el.textContent = count + '개 카드 · 약 5분';
            } else if (currentMode === 'exam_prep') {
                // 2026-06-06: 기말 범위 필터 후 실제 인스코프 수 표시(sci3 파동=8, sci4 식물=8 등 20 미만 단원 오인 방지)
                const epCount = (QUIZ_DATA && QUIZ_DATA.exam_prep) ? Math.min(20, scopedItems(QUIZ_DATA.exam_prep).length) : 20;
                el.textContent = epCount + '문항 · 약 20분';
            } else {
                const total = QUIZ_DATA && QUIZ_DATA.questions ? Math.min(30, QUIZ_DATA.questions.length) : 30;
                el.textContent = total + '문항 · 약 20분';
            }
        }

        // Sound effects
        // AudioContext를 앱 전체에서 하나만 생성하여 재사용 (모바일 브라우저 제한 대응)
        let _audioCtx = null;
        function getAudioCtx() {
            if (!_audioCtx) {
                try {
                    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.warn('[Sound] AudioContext 생성 실패:', e);
                    return null;
                }
            }
            // suspended 상태이면 resume (모바일 브라우저 정책 대응)
            if (_audioCtx.state === 'suspended') {
                _audioCtx.resume().catch(() => {});
            }
            return _audioCtx;
        }

        // TTS voices 프리로드 (첫 호출 시 빈 배열 반환 방지)
        let _ttsVoicesLoaded = false;
        if (window.speechSynthesis) {
            speechSynthesis.getVoices(); // 초기 호출로 로딩 트리거
            speechSynthesis.addEventListener('voiceschanged', () => { _ttsVoicesLoaded = true; });
        }

        function toggleMute() {
            isMuted = !isMuted;
            safeSetItem('sound_muted', isMuted);
            document.getElementById('mute-toggle').textContent = isMuted ? '🔇' : '🔊';
            // 음소거 해제 시 AudioContext 확실히 깨우기
            if (!isMuted) getAudioCtx();
        }

        function playSound(type) {
            if (isMuted) return;
            try {
                const ctx = getAudioCtx();
                if (!ctx) return;
                const gain = ctx.createGain();
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    // 정답: 도→미→솔 밝은 3음 상승 멜로디
                    gain.gain.value = 0.25;
                    const notes = [523, 659, 784]; // C5, E5, G5
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        osc.connect(gain);
                        osc.start(ctx.currentTime + i * 0.12);
                        osc.stop(ctx.currentTime + i * 0.12 + 0.15);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                } else {
                    // 오답 (2026-04-19d STEP99): 처벌형 버저 → 중립적 실패신호
                    // sine 단3도 하강(A4→F4), 볼륨/길이/꼬리 축소.
                    // Codex 자문: 00_Context/codex-advice/2026-04-17-영어-보기품질-및-오답음-검토.md
                    gain.gain.value = 0.16;
                    const notes = [440, 349]; // A4, F4 (단3도 하강)
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        osc.connect(gain);
                        osc.start(ctx.currentTime + i * 0.12);
                        osc.stop(ctx.currentTime + i * 0.12 + 0.12);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                }
            } catch(e) {
                console.warn('[Sound] playSound 오류:', e);
            }
        }

        // Webhook settings
        function isValidWebhookUrl(url) {
            // [보안] Apps Script 웹앱만 허용 — 임의 URL 주입(로그 exfiltration) 차단
            // [v2] prefix 비교보다 hostname 정확 일치가 더 단단함 (userinfo·유사도메인 트릭 차단)
            if (typeof url !== 'string') return false;
            try {
                var u = new URL(url);
                return u.protocol === 'https:' && u.hostname === 'script.google.com';
            } catch (e) {
                return false;   // 파싱 불가 = 무효
            }
        }

        function saveWebhookUrl() {
            const url = document.getElementById('webhook-input').value.trim();
            if (!url) return;
            if (!isValidWebhookUrl(url)) {                       // [v2]
                document.getElementById('webhook-status').textContent = '⚠ script.google.com 주소만 사용할 수 있어요';
                document.getElementById('webhook-status').style.color = '#c0392b';
                return;
            }
            document.getElementById('webhook-status').style.color = '';   // 원래 색 복귀
            safeSetItem('webhook_url', url);
            document.getElementById('webhook-status').textContent = '✓ 저장되었습니다';
            setTimeout(() => { document.getElementById('webhook-status').textContent = ''; }, 2000);
            flushVocabQueue();
            updateOpsDiagnostics();
        }

        function getQuizLogStorageKeys() {
            const keys = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k === 'quiz_logs' || (k && (k.startsWith('quiz_logs_L') || k.startsWith('quiz_logs_kor') || k.startsWith('quiz_logs_math') || k.startsWith('quiz_logs_soc') || k.startsWith('quiz_logs_sci')))) {
                    keys.push(k);
                }
            }
            return keys;
        }

        function getUnsentQuizLogCount() {
            const sent = new Set(JSON.parse(localStorage.getItem('sent_logs') || '[]'));
            const seen = new Set();

        // Lesson 데이터 로드
        // v15: JSONP(.js) 우선 로드 → fetch(.json) 폴백
        // 실제 파일이 .js(JSONP)이므로 script 태그를 1순위로 사용
        function fetchJsonCompat(url) {
            // 1순위: <script> 태그로 .js(JSONP) 직접 로드 — 모든 브라우저 호환
            // v144: 캐시버스팅 — lesson 데이터 URL에 ?v=<APP_CACHE_NAME> 부착. 버전 범프 시 자동 변경 → 강제 새 요청.
            //        (sw.js가 쿼리 제거한 bare 키로 정규화 저장/폴백하므로 오프라인 캐시 유지)
            // [④4-3] lesson별 캐시버스팅 버전(단건 데이터 갱신을 app 버전 범프 없이 전파). 키=파일명(.js 제외). 없으면 APP_CACHE_NAME.
            const LESSON_VERSIONS = { lesson_kor2: 'k2-1.2', lesson_kor3: 'k3-1.0' };
            const ver = (u) => {
                const m = u.match(/([A-Za-z0-9_]+)\.js(?:\?|$)/);
                const vv = (m && LESSON_VERSIONS[m[1]]) ? LESSON_VERSIONS[m[1]] : APP_CACHE_NAME;
                return u + (u.indexOf('?') < 0 ? '?v=' : '&v=') + encodeURIComponent(vv);
            };
            const jsUrl = ver(url.replace(/\.json$/, '.js'));
            return new Promise((resolve, reject) => {
                window.__loadLesson = function(data) {
                    delete window.__loadLesson;
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = jsUrl;
                script.onload = function() {
                    script.remove();
                    // __loadLesson이 아직 남아있으면 콜백이 호출 안 된 것
                    if (window.__loadLesson) {
                        delete window.__loadLesson;
                        reject(new Error('JSONP callback not invoked: ' + jsUrl));
                    }
                };
                script.onerror = function() {
                    delete window.__loadLesson;
                    script.remove();
                    reject(new Error('Script load failed: ' + jsUrl));
                };
                document.head.appendChild(script);
            }).catch(scriptErr => {
                // 2순위 폴백: fetch(.json) — .json 파일이 있는 환경 대비
                console.warn('JSONP load failed, trying fetch:', scriptErr.message);
                return fetch(ver(url)).then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                });
            }).catch(fetchErr => {
                // 3순위 폴백: XHR — file:// 프로토콜 등 특수 환경
                console.warn('Fetch failed, trying XHR:', fetchErr.message);
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', ver(url), true);
                    xhr.onload = function() {
                        if (xhr.status === 0 || xhr.status === 200) {
                            try { resolve(JSON.parse(xhr.responseText)); }
                            catch(e) { reject(e); }
                        } else { reject(new Error('XHR ' + xhr.status)); }
                    };
                    xhr.onerror = function() { reject(new Error('XHR network error')); };
                    xhr.send();
                });
            });
        }

        function backfillDailyReadToServer(missingIds) {

            try {
                var wh = localStorage.getItem('webhook_url');

                fetch(wh, {

        function syncDailyReadFromServer() {
            return new Promise(function (resolve) {
                var wh = localStorage.getItem('webhook_url');
                if (!wh) { resolve(false); return; }
                var cbName = '__daily_read_cb_' + Date.now();
                var done = false;
                var s = null;
                function finish(ok) {
                    if (done) return; done = true;
                    try { delete window[cbName]; } catch (e) {}
                    if (s && s.parentNode) s.parentNode.removeChild(s);
                    resolve(ok);
                }
                window[cbName] = function (serverIds) {
                    try {
                        if (Array.isArray(serverIds)) {
                            var local = loadDailyReadIds();
                            var serverSet = {};
                            serverIds.forEach(function (d) { if (d) serverSet[d] = true; });
                            // 1) union 병합 → 로컬 갱신
                            var merged = local.slice();
                            serverIds.forEach(function (d) {
                                if (d && merged.indexOf(d) === -1) merged.push(d);
                            });
                            safeSetItem(PA_DAILY_READ_IDS_KEY, JSON.stringify(merged));   // [v2] safeSetItem 사용
                            updateDailyUnreadBadges();   // 함정 §2-6
                            // 2) [v2] 백필: 서버에 없던 로컬 날짜를 일괄 업로드
                            var missing = local.filter(function (d) { return d && !serverSet[d]; });
                            backfillDailyReadToServer(missing);
                        }
                    } catch (e) {}
                    finish(true);
                };
                s = document.createElement('script');
                var sep = wh.indexOf('?') === -1 ? '?' : '&';
                s.src = wh + sep + 'action=daily_read&callback=' + cbName + '&_=' + Date.now();
                s.onerror = function () { finish(false); };
                document.head.appendChild(s);
                setTimeout(function () { finish(false); }, 5000);
            });
        }

        function pickNextQueueDate() {
            // FIFO: 날짜 오름차순으로 첫 미열람 카드. 미래 날짜는 큐에서 제외.
            const today = getTodayDateStr();
            const readIds = loadDailyReadIds();
            const list = (DAILY_INDEX_DATA || []).slice();
            list.sort(function(a, b) { return (a.date || '').localeCompare(b.date || ''); });
            for (let i = 0; i < list.length; i++) {
                const d = list[i].date;
                if (!d) continue;
                if (d > today) continue;
                if (readIds.indexOf(d) !== -1) continue;
                return d;
            }
            return null;
        }

        function getDailyUnreadCount() {
            const today = getTodayDateStr();
            const readIds = loadDailyReadIds();
            const list = (DAILY_INDEX_DATA || []);
            let n = 0;
            for (let i = 0; i < list.length; i++) {
                const d = list[i].date;
                if (!d) continue;
                if (d > today) continue;
                if (readIds.indexOf(d) !== -1) continue;
                n++;
            }
            return n;
        }

        function loadDailyIndexJsonp() {
            return new Promise((resolve) => {
                if (DAILY_INDEX_LOADED) { resolve(); return; }
                window.__loadDailyIndex = function(list, meta) {
                    delete window.__loadDailyIndex;
                    DAILY_INDEX_DATA = list || [];
                    DAILY_INDEX_META = meta || null;
                    DAILY_INDEX_LOADED = true;
                    resolve();
                };
                // First load: pure path (SW normalises). Later cache-bust handled by SW.
                const url = './daily_index.js';
                const s = document.createElement('script');
                s.src = url;
                s.onerror = function() {
                    delete window.__loadDailyIndex;
                    DAILY_INDEX_DATA = [];
                    DAILY_INDEX_META = null;
                    DAILY_INDEX_LOADED = true;
                    resolve();
                };
                document.head.appendChild(s);
                setTimeout(function() {
                    if (window.__loadDailyIndex) {
                        delete window.__loadDailyIndex;
                        DAILY_INDEX_DATA = [];
                        DAILY_INDEX_META = null;
                        DAILY_INDEX_LOADED = true;
                        resolve();
                    }
                }, 5000);
            });
        }

        function loadDailyMonth(month) {
            return new Promise((resolve) => {
                if (DAILY_MONTH_CACHE[month]) { resolve(DAILY_MONTH_CACHE[month]); return; }
                const v = (DAILY_INDEX_META && DAILY_INDEX_META.version_key) || 'v1';
                window.__loadDailyMonth = function(m, payload) {
                    delete window.__loadDailyMonth;
                    if (m && payload) DAILY_MONTH_CACHE[m] = payload;
                    resolve(DAILY_MONTH_CACHE[month] || null);
                };
                const url = './daily_' + month + '.js?v=' + encodeURIComponent(v);
                const s = document.createElement('script');
                s.src = url;
                s.onerror = function() {
                    delete window.__loadDailyMonth;
                    resolve(null);
                };
                document.head.appendChild(s);
                setTimeout(function() {
                    if (window.__loadDailyMonth) {
                        delete window.__loadDailyMonth;
                        resolve(DAILY_MONTH_CACHE[month] || null);
                    }
                }, 5000);
            });
        }

        async function tryLoadDailyDate(dateStr) {
            if (!dateStr || dateStr.length < 7) return null;
            const month = dateStr.slice(0, 7);
            const monthPayload = await loadDailyMonth(month);
            if (!monthPayload || !monthPayload.days) return null;
            const day = monthPayload.days[dateStr];
            return day || null;
        }

        function pickMostRecentPastFromIndex(todayStr) {
            const list = (DAILY_INDEX_DATA || []).slice();
            list.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
            for (let i = 0; i < list.length; i++) {
                const it = list[i];
                if (it && it.date && it.date < todayStr) return it;
            }
            return null;
        }

        async function loadDailyToday() {

            const nextDate = pickNextQueueDate();
            if (nextDate) {
                const data = await tryLoadDailyDate(nextDate);
                if (data) {
                    DAILY_TODAY_DATA = data;
                    saveDailyLastSuccess(nextDate, data);
                    renderDailyToday(data, { date: nextDate, isToday: nextDate === today, fromQueue: true });
                    updateDailyUnreadBadges();
                    return;
                }
                // index에는 있는데 month 파일 load 실패 — 빈 큐 처리로 폴백

        // STEP133: IntersectionObserver — 카드 하단 sentinel이 화면에 들어오면 read 처리
        var _dailyReadObserver = null;
        var _dailyReadScrollHandler = null;

        function attachReadObserver(dateStr) {
            // 이전 옵저버 / 스크롤 핸들러 정리
            if (_dailyReadObserver) {
                try { _dailyReadObserver.disconnect(); } catch (e) {}
                _dailyReadObserver = null;
            }
            if (_dailyReadScrollHandler) {
                window.removeEventListener('scroll', _dailyReadScrollHandler);
                _dailyReadScrollHandler = null;
            }
            if (!dateStr) return;
            const sentinel = document.getElementById('daily-read-sentinel');
            if (!sentinel) return;
            if (typeof IntersectionObserver === 'undefined') {
                attachScrollFallback(dateStr);
                return;
            }
            _dailyReadObserver = new IntersectionObserver(function(entries) {
                for (let i = 0; i < entries.length; i++) {
                    if (entries[i].isIntersecting) {
                        markDailyAsRead(dateStr);
                        if (_dailyReadObserver) { _dailyReadObserver.disconnect(); _dailyReadObserver = null; }
                        showReadConfirmedToast();
                        break;
                    }
                }
            }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });
            _dailyReadObserver.observe(sentinel);
        }

        function attachScrollFallback(dateStr) {
            _dailyReadScrollHandler = function() {
                const sentinel = document.getElementById('daily-read-sentinel');
                if (!sentinel) return;
                const rect = sentinel.getBoundingClientRect();
                if (rect.top <= window.innerHeight) {
                    markDailyAsRead(dateStr);
                    window.removeEventListener('scroll', _dailyReadScrollHandler);
                    _dailyReadScrollHandler = null;
                    showReadConfirmedToast();
                }
            };
            window.addEventListener('scroll', _dailyReadScrollHandler, { passive: true });
        }

        function showReadConfirmedToast() {
            let t = document.getElementById('daily-read-toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'daily-read-toast';
                t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2F5496;color:#fff;padding:8px 16px;border-radius:18px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;';
                document.body.appendChild(t);
            }
            t.textContent = '읽음 처리됨';
            t.style.opacity = '1';
            setTimeout(function() { t.style.opacity = '0'; }, 2400);
        }

        // 어제 틀린 문항 추출 (간격 반복 워밍업용)
        function getYesterdayWrongQuestions(maxCount) {
            const logsKey = (typeof currentLesson === 'string' && isNaN(currentLesson))
                ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            const todayStr = today();
            const yesterday = new Date(Date.now() - 86400000);
            const yStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');

            // 어제 로그에서 틀린 문항 ID 수집
            const wrongIds = new Set();
            const skipTypes = new Set(['flashcard', 'concept_card', 'math_concept_card', 'study_concept_card',
                'passage_guide_picker', 'passage_guide_section', 'explanation_method_card',
                'reading_journal_guide', 'outline_exercise', 'procedure_drill', 'mini_writing', 'kor_core_sentence']);
            logs.forEach(log => {
                if (log.date !== yStr || !log.questions) return;
                log.questions.forEach(a => {
                    if (!a.correct && !skipTypes.has(a.type)) wrongIds.add(a.id);
                });
            });
            if (wrongIds.size === 0) return [];

            // QUIZ_DATA에서 해당 문항 찾기 (exam_prep + questions 모두 탐색)
            const allQ = [...(QUIZ_DATA.questions || []), ...(QUIZ_DATA.exam_prep || [])];
            const found = allQ.filter(q => wrongIds.has(q.id));
            shuffleArray(found);
            return found.slice(0, maxCount);
        }

        // 학습 이력 기반 우선순위 점수 (높을수록 복습 필요)
        // v3.1: 최근 출제 쿨다운 — 직전 세션 문항이 바로 반복되지 않도록
        function priorityScore(q) {
            const h = questionHistory[q.id];
            if (!h) return 50; // 신규: 중간 우선도

            let base;
            if (h.last_correct === false) base = 100; // 오답: 최고 우선
            else if (h.correct >= 3 && h.last_correct) base = 10; // 마스터: 최저
            else base = 70; // 복습 필요

            // 쿨다운: 최근 세션에서 출제된 문항은 우선도 하향
            // last_seen이 오늘이고, 이번 세션에서 이미 풀었다면 감점
            if (h.last_seen === today() && h.attempts > 0) {
                base -= 40; // 오답(100→60), 복습(70→30) — 신규(50)보다 낮아짐
            }

            return Math.max(base, 5); // 최소 5
        }

        // 수행평가 모드: 독서 단어장 가이드
        function generatePerfReadingJournalSession() {
            const pa = QUIZ_DATA.perf_assessment;
            if (!pa || !pa.reading_journal) return [];
            // 이 모드는 가이드만 표시하고 문항을 푸는 형식이 아니므로
            // 단일 "가이드" 객체를 반환

        // mini_writing 비활성 (2026-05-14: PA 기말 = 5과목 선택형 100점 체계, mini_writing 점수 기여 0)
        // 학습 가치는 인정되나 기말 시점 슬롯 누수 차단 우선
        const HIDDEN_TYPES = new Set(['mini_writing']);
        const HIDDEN_MODES_OUTSIDE_EXAM_WINDOW = new Set(['exam_perf']);

        function generateDrillSession() {
            if (!QUIZ_DATA || !QUIZ_DATA.core_sentences) return [];

            const allQuestions = QUIZ_DATA.questions.filter(q => !HIDDEN_TYPES.has(q.type));
            const drillQuestions = allQuestions.filter(q => q.phase === 'drill');
            const currentStage = getDrillStage();

            // Get questions for current stage
            let stageQuestions = drillQuestions.filter(q => q.drill_stage === currentStage);

            // Group by core_sentence_id and handle pairs
            const groups = {};
            stageQuestions.forEach(q => {
                const csId = q.core_sentence_id;
                if (!groups[csId]) groups[csId] = [];
                groups[csId].push(q);
            });

            // Build session respecting pair_id adjacency
            const coreSentences = QUIZ_DATA.core_sentences || [];
            const ordered = [];
            const processedCS = new Set();

            // Shuffle core sentence order
            const csIds = Object.keys(groups);
            shuffleArray(csIds);

            csIds.forEach(csId => {
                if (processedCS.has(csId)) return;
                processedCS.add(csId);

                // Check if this CS has a pair
                const cs = coreSentences.find(c => c.id === csId);
                if (cs && cs.pair_id && groups[cs.pair_id] && !processedCS.has(cs.pair_id)) {
                    // Add both pair members adjacent
                    processedCS.add(cs.pair_id);
                    ordered.push(...(groups[csId] || []));
                    ordered.push(...(groups[cs.pair_id] || []));
                } else {
                    ordered.push(...(groups[csId] || []));
                }
            });

            return ordered;
        }

        // 국어 핵심 문장 세션: core_sentences를 flashcard로 변환
        function generateKoreanCoreSentenceSession() {

            shuffleArray(sentences);
            // core_sentence를 flashcard 형태의 question 객체로 변환
            return sentences.map(cs => ({

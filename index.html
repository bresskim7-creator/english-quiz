        // 그만하기
        function quitQuiz() {
            if (confirm('학습을 중단하겠습니까?')) {
                // 지금까지 푼 문항의 이력은 이미 recordAnswer에서 저장됨
                // 로그도 부분 저장
                if (sessionAnswers.length > 0) {
                    const totalCorrect = sessionAnswers.filter(a => a.correct).length;
                    const sessionDuration = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
                    const typeStats = {};
                    sessionAnswers.forEach(a => {
                        if (!typeStats[a.type]) typeStats[a.type] = { total: 0, correct: 0 };
                        typeStats[a.type].total++;
                        if (a.correct) typeStats[a.type].correct++;
                    });
                    const typeBreakdown = Object.entries(typeStats).map(([t, st]) => t + ':' + st.correct + '/' + st.total).join(', ');
                    const examPerfFields = getExamPerfLogFields();
                    const log = {
                        lesson: currentLesson || 1,
                        subject: currentSubject,
                        date: today(),
                        session_type: currentSessionMeta ? currentSessionMeta.type : sessionType,
                        total: sessionAnswers.length,
                        correct: totalCorrect,
                        percentage: Math.round((totalCorrect / sessionAnswers.length) * 100),
                        duration_sec: sessionDuration,
                        weak: sessionAnswers.filter(a => !a.correct).map(a => a.keyword || a.id).join(', '),
                        score_group: collectAnswerMeta(sessionAnswers, 'score_group'),
                        recovery_band: collectAnswerMeta(sessionAnswers, 'recovery_band'),
                        type_breakdown: typeBreakdown,
                        hint_count: sessionAnswers.filter(a => a.hint_used).length,
                        metrics: compute4Metrics(sessionAnswers),
                        condition_miss: examPerfFields.condition_miss,
                        omr_miss: examPerfFields.omr_miss,
                        time_complete: examPerfFields.time_complete,
                        details: sessionAnswers.map(a => a.id + (a.correct ? '✓' : '✗') + a.time_sec + 's' + (a.hint_used ? '💡' : '')).join(', '),
                        questions: sessionAnswers,
                        timestamp: new Date().toISOString(),
                        partial: true
                    };
                    const quitLogsKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
                    const logs = JSON.parse(localStorage.getItem(quitLogsKey) || '[]');
                    logs.push(log);
                    safeSetItem(quitLogsKey, JSON.stringify(logs));
                }
                // arrange interval 정리
                if (arrangeCheckInterval) {
                    clearInterval(arrangeCheckInterval);
                    arrangeCheckInterval = null;
                }
                document.getElementById('btn-skip').style.display = 'none';
                goHome();
            }
        }

        // 페이지 전환
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 헤더 타이틀 생성 헬퍼
        function getHeaderTitle(modeLabel) {
            if (currentSubject === 'korean') {
                const lessonLabel = typeof currentLesson === 'string' ? currentLesson.replace('kor', '') + '단원' : currentLesson;
                return modeLabel ? `국어 ${lessonLabel} · ${modeLabel}` : `국어 ${lessonLabel}`;
            } else if (currentSubject === 'math') {
                const title = QUIZ_DATA ? QUIZ_DATA.title : '유리수와 순환소수';
                return modeLabel ? `수학 · ${modeLabel}` : `수학 · ${title}`;
            } else if (currentSubject === 'social') {
                return modeLabel ? `사회 · ${modeLabel}` : '사회';
            } else if (currentSubject === 'science') {
                return modeLabel ? `과학 · ${modeLabel}` : '과학';
            }
            return modeLabel ? `영어 Lesson ${currentLesson} · ${modeLabel}` : `영어 Lesson ${currentLesson || 1}`;
        }

        // 유틸리티
        function today() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // ============================================================
        // 수학 모듈: renderMath, 세션 생성기, 렌더러
        // ============================================================

        // 수식 마크업 변환: {f:분자:분모} → 분수, {r:숫자} → 순환마디, {s:n} → 위첨자
        function renderMath(str) {
            if (!str) return '';
            return str
                .replace(/\{f:([^:}]+):([^}]+)\}/g, '<span class="mfrac"><span class="mnum">$1</span><span class="mden">$2</span></span>')
                .replace(/\{r:([^}]+)\}/g, '<span class="mrep">$1</span>')
                .replace(/\{s:([^}]+)\}/g, '<sup>$1</sup>');
        }

        // 수학 개념카드 세션 생성
        // =========================================================
        // 사회/과학 공통: 개념정리 + 실전문제 세션 엔진
        // =========================================================
        function generateStudyConceptSession() {
            const cards = scopedItems(QUIZ_DATA.concept_cards);  // 기말 범위 필터 후 평일 5장 제한
            const limited = limitConceptCards(cards);
            return limited.map(c => ({...c, type: 'study_concept_card'}));
        }

        function generateStudyExamSession() {
            const questions = scopedItems(QUIZ_DATA.exam_prep);  // 기말 범위 필터
            if (questions.length === 0) return [];
            // 2026-05-14: A/B/C 그룹별 추출 제거 → 단순 무작위 20문항
            const pool = [...questions];
            shuffleArray(pool);
            return pool.slice(0, 20);
        }

        // 사회/과학 개념카드 렌더러
        // ── 개념카드 텍스트 자동 하이라이트 ──
        function highlightText(text, term) {
            if (!text) return text;
            let s = text;

            // 1) 해당 카드의 term이 설명에 등장하면 형광펜
            if (term) {
                const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                s = s.replace(new RegExp('(' + escaped + ')', 'g'), '<span class="hl-term">$1</span>');
            }

            // 2) 「」 『』 작품명/용어 → 굵게
            s = s.replace(/([「『][^」』]+[」』])/g, '<span class="hl-quote">$1</span>');

            // 3) 숫자+단위 (g/cm³, °C, %, mL 등) → 파란 볼드
            s = s.replace(/(\d+\.?\d*\s*(?:g\/cm[³3]|°C|%|mL|cm|kg|g|m\/s|J|N|L|mol))/g, '<span class="hl-formula">$1</span>');

            // 4) = 등호 포함 공식 (밀도 = 질량 ÷ 부피 등) → 파란 볼드
            s = s.replace(/([\w가-힣]+\s*[=＝]\s*[\w가-힣\s÷×\+\-\/\(\)]+)/g, '<span class="hl-formula">$1</span>');

            // 5) 핵심 패턴: ~(이)란, ~(이)라 하, ~을/를 뜻 → 정의 밑줄
            s = s.replace(/([\w가-힣]+(?:이란|란|이라 하|라 하|을 뜻하|를 뜻하|을 의미하|를 의미하)[^\.\,]*)/g, '<span class="hl-keyword">$1</span>');

            return s;
        }

        // ============================================================
        // 과학 마인드맵 허브 (v1, 2026-06-08) — 과학 개념정리 한정 분기.
        // 진입은 startSession()에서 currentSubject==='science' && QUIZ_DATA.mindmap 일 때만.
        // limitConceptCards/scopedItems/generateStudyConceptSession 불변 — 허브 경로는 가지 카드만 직접 세션화(평일 5장 제한 우회).
        // ============================================================
        function getMindmapDone() {
            try { return JSON.parse(localStorage.getItem('pa_mm_done_' + ((QUIZ_DATA && QUIZ_DATA.lesson) || 'sci2')) || '[]'); }
            catch (e) { return []; }
        }
        function saveMindmapDone(arr) {
            safeSetItem('pa_mm_done_' + ((QUIZ_DATA && QUIZ_DATA.lesson) || 'sci2'), JSON.stringify(arr));
        }

        function renderMindmapHub() {
            currentMindmapBranch = null;
            const mm = QUIZ_DATA.mindmap;
            const branches = mm.branches;
            const done = getMindmapDone();
            const totalCards = branches.reduce((s, b) => s + (b.cards ? b.cards.length : 0), 0);
            let doneCards = 0;
            branches.forEach(b => { if (done.includes(b.no)) doneCards += (b.cards ? b.cards.length : 0); });
            const doneBranches = branches.filter(b => done.includes(b.no)).length;
            const nextBranch = branches.find(b => !done.includes(b.no));

            const grid = branches.map(b => {
                const num = String.fromCharCode(0x2460 + b.no - 1);
                const isDone = done.includes(b.no);
                const isZoom = b.action === 'zoom';
                const cardCount = b.cards ? b.cards.length : 0;
                const wingBorder = b.wing === 'L' ? '#1565C0' : '#E8821A';
                const wingBg = isDone ? '#F1F8E9' : (b.wing === 'L' ? '#E3F2FD' : '#FFF3E0');
                const sub = isZoom ? '전체 지도 보기' : ('카드 ' + cardCount + '장');
                const dashed = isZoom ? 'border-style:dashed;' : '';
                const check = isDone ? ' ✅' : '';
                return '<button onclick="startMindmapBranch(' + b.no + ')" style="text-align:left;padding:12px 14px;border:2px solid ' + wingBorder + ';' + dashed + 'border-radius:12px;background:' + wingBg + ';cursor:pointer;font-size:15px;font-weight:600;color:#333;line-height:1.35;">' +
                    num + ' ' + b.label + check +
                    '<span style="display:block;font-size:12px;font-weight:400;color:#777;margin-top:3px;">' + sub + '</span>' +
                    '</button>';
            }).join('');

            const continueBtn = nextBranch
                ? '<button onclick="startMindmapBranch(' + nextBranch.no + ')" style="width:100%;margin-top:16px;padding:15px;font-size:16px;font-weight:600;background:#1565C0;color:white;border:none;border-radius:12px;cursor:pointer;">▶ 이어서 학습 (다음: ' + nextBranch.label + ')</button>'
                : '<div style="margin-top:16px;padding:15px;text-align:center;background:#F1F8E9;border-radius:12px;color:#2E7D32;font-weight:600;">🎉 모든 가지를 끝냈어!</div>';

            const html =
                '<div style="font-size:18px;font-weight:700;color:#1565C0;text-align:center;margin:4px 0 10px;">' + mm.title + '</div>' +
                '<div style="text-align:center;margin-bottom:12px;cursor:pointer;" onclick="openMindmapZoom()">' +
                    '<img src="' + mm.img + '" alt="" style="max-width:100%;height:auto;border-radius:10px;border:1px solid #eee;" onerror="this.style.display=\'none\'">' +
                    '<div style="font-size:12px;color:#999;margin-top:4px;">🔍 탭하면 크게 보기</div>' +
                '</div>' +
                '<div style="font-size:13px;color:#666;text-align:center;margin-bottom:14px;">가지 ' + doneBranches + '/' + branches.length + ' 완료 · 카드 ' + doneCards + '/' + totalCards + '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' + grid + '</div>' +
                continueBtn +
                '<button onclick="goHome()" style="width:100%;margin-top:10px;padding:12px;font-size:14px;background:#f0f0f0;color:#555;border:none;border-radius:10px;cursor:pointer;">← 과목으로 돌아가기</button>';

            document.getElementById('science-hub-content').innerHTML = html;
            document.querySelector('.header-title').textContent = getHeaderTitle('개념 정리');
            showPage('science-hub-page');
        }

        function startMindmapBranch(branchNo) {
            const mm = QUIZ_DATA.mindmap;
            const branch = mm.branches.find(b => b.no === branchNo);
            if (!branch) return;
            if (branch.action === 'zoom') {
                const done = getMindmapDone();
                if (!done.includes(branch.no)) { done.push(branch.no); saveMindmapDone(done); }
                renderMindmapHub();
                openMindmapZoom();
                return;
            }
            // scopedItems로 판운동(scope_out) 카드 원천 차단 후 가지 카드만 순서대로
            const byId = {};
            scopedItems(QUIZ_DATA.concept_cards).forEach(c => { byId[c.id] = c; });
            const cards = (branch.cards || []).map(id => byId[id]).filter(Boolean);
            if (cards.length === 0) { alert('이 가지는 카드를 준비 중입니다.'); return; }
            currentMindmapBranch = branchNo;
            currentSession = cards.map(c => ({ ...c, type: 'study_concept_card' }));
            currentQuestionIndex = 0;
            sessionAnswers = [];
            sessionStartTime = Date.now();
            currentSessionMeta = { type: 'science_concept', lesson: currentLesson, mode: currentMode, size: currentSession.length, branch: branchNo };
            document.querySelector('.header-title').textContent = getHeaderTitle(branch.label);
            showPage('quiz-page');
            showQuestion();
        }

        function completeMindmapBranch() {
            if (currentMindmapBranch != null) {
                const done = getMindmapDone();
                if (!done.includes(currentMindmapBranch)) { done.push(currentMindmapBranch); saveMindmapDone(done); }
            }
            currentSession = null;
            currentQuestionIndex = 0;
            renderMindmapHub();
        }

        function renderMinimapStrip() {
            const mm = QUIZ_DATA.mindmap;
            const done = getMindmapDone();
            let h = '<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:14px;">';
            mm.branches.forEach(b => {
                const cur = b.no === currentMindmapBranch;
                const isDone = done.includes(b.no);
                const num = String.fromCharCode(0x2460 + b.no - 1);
                const bg = cur ? '#1565C0' : (isDone ? '#C8E6C9' : '#eee');
                const col = cur ? '#fff' : '#666';
                h += '<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:' + bg + ';color:' + col + ';font-size:13px;font-weight:600;">' + num + '</span>';
            });
            return h + '</div>';
        }

        function openMindmapZoom() {
            if (!QUIZ_DATA || !QUIZ_DATA.mindmap) return;
            let ov = document.getElementById('mm-zoom-overlay');
            if (!ov) {
                ov = document.createElement('div');
                ov.id = 'mm-zoom-overlay';
                ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:12px;';
                ov.onclick = function () { ov.style.display = 'none'; };
                const img = document.createElement('img');
                img.id = 'mm-zoom-img';
                img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;';
                ov.appendChild(img);
                document.body.appendChild(ov);
            }
            document.getElementById('mm-zoom-img').src = QUIZ_DATA.mindmap.img;
            ov.style.display = 'flex';
        }

        function showStudyConceptCard(q) {
            const container = document.getElementById('question-container');
            const subjectColor = currentSubject === 'social' ? '#2E7D32' : '#1565C0';
            // 마인드맵 가지 학습 중이면 미니맵 + 마지막 카드에 '가지 완료' 버튼(방어: mindmap 없는 과목이면 일반 경로)
            const inBranch = (currentMindmapBranch != null && QUIZ_DATA && QUIZ_DATA.mindmap);
            const isLast = currentQuestionIndex >= currentSession.length - 1;
            let navHtml;
            if (inBranch && isLast) {
                const prevBtn = currentQuestionIndex > 0
                    ? '<button onclick="goPrevQuestion()" style="flex:1;padding:14px;font-size:15px;background:#f0f0f0;color:#333;border:none;border-radius:10px;cursor:pointer;">← 이전</button>'
                    : '';
                navHtml = '<div style="display:flex;gap:8px;margin-top:16px;">' + prevBtn +
                    '<button onclick="completeMindmapBranch()" style="flex:1;padding:14px;font-size:15px;background:#2E7D32;color:white;border:none;border-radius:10px;cursor:pointer;">가지 완료 ✓</button></div>';
            } else {
                navHtml = browseNavButtons('다음 카드 →', subjectColor);
            }
            const minimap = inBranch ? renderMinimapStrip() : '';
            container.innerHTML = minimap + `
                <div class="mc-card" onclick="this.classList.toggle('flipped')" style="--mc-color:${subjectColor}">
                    <div class="mc-front">
                        <div class="mc-title" style="color:${subjectColor}">${q.term}</div>
                        <div class="mc-question" style="font-size:15px;color:#666;margin-top:8px;">이 용어, 뭐야?</div>
                        <div class="mc-tap">탭하면 설명 보기</div>
                    </div>
                    <div class="mc-back">
                        ${renderVisualMedia(q)}
                        <div class="mc-easy" style="font-size:16px;line-height:1.7;margin-bottom:12px;">💡 ${highlightText(q.easy_explanation, q.term)}</div>
                        <div class="mc-def" style="font-size:13px;color:#888;border-top:1px solid #eee;padding-top:8px;">📖 교과서 표현: ${highlightText(q.definition, q.term)}</div>
                        ${q.exam_tip ? `<div class="mc-tip" style="margin-top:8px;">🎯 ${highlightText(q.exam_tip, q.term)}</div>` : ''}
                    </div>
                </div>
                ${navHtml}
            `;
            document.getElementById('btn-hint').style.display = 'none';
        }

        // 사회/과학 선택형 렌더러 — 보기 셔플 포함
        function showStudyChoice(q) {
            const container = document.getElementById('question-container');
            container.style.display = 'block';
            const subjectColor = currentSubject === 'social' ? '#2E7D32' : '#1565C0';

            let sentenceHtml = q.sentence ? `<div style="font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line;background:#F1F8E9;padding:12px;border-radius:8px;">${q.sentence}</div>` : '';
            // 그림 문항 렌더 — visual_img(이미지) 우선, 없으면 visual_svg (renderVisualMedia)
            let visualHtml = renderVisualMedia(q);
            let questionHtml = q.question ? `<div style="font-size:15px;font-weight:600;margin-bottom:12px;">${q.question.replace(/(틀린|아닌|않는|없는|못한|아닌 것|틀린 것|해당하지 않는|거리가 먼|적절하지 않은|올바르지 않은)/g, '<span style="color:#E53935;font-weight:700;text-decoration:underline;text-decoration-color:#E53935;">\$1</span>')}</div>` : '';

            // 보기 셔플
            const shuffled = q.options.map((opt, idx) => ({ origIdx: idx, opt }));
            shuffleArray(shuffled);
            // 셔플 맵 저장 (checkStudyChoice에서 사용)
            window._studyShuffleMap = shuffled;

            let optionsHtml = shuffled.map((item, i) => {
                const label = String.fromCharCode(0x2460 + i);
                return `<button class="option-btn" style="display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border:2px solid #ddd;border-radius:10px;background:white;font-size:15px;cursor:pointer;line-height:1.5;" onclick="checkStudyChoice(this, ${i})">${label} ${item.opt}</button>`;
            }).join('');

            container.innerHTML = sentenceHtml + visualHtml + questionHtml + `<div id="study-options">${optionsHtml}</div>`;
            document.getElementById('question-text').innerHTML = q.instruction || '';
            document.getElementById('btn-hint').style.display = q.hint ? '' : 'none';
            if (q.hint) {
                document.getElementById('btn-hint').onclick = function() {
                    document.getElementById('hint-display').style.display = 'block';
                    document.getElementById('hint-display').textContent = q.hint;
                    hintUsedThisQuestion = true;
                };
            }
        }

        function checkStudyChoice(btn, displayIdx) {
            const q = currentSession[currentQuestionIndex];
            const isMulti = Array.isArray(q.correct);
            const origIdx = window._studyShuffleMap[displayIdx].origIdx;
            const isCorrect = isMulti ? q.correct.includes(origIdx) : origIdx === q.correct;

            document.querySelectorAll('#study-options .option-btn').forEach((b, i) => {
                b.disabled = true;
                b.style.cursor = 'default';
                const correctArr = isMulti ? q.correct : [q.correct];
                if (correctArr.includes(window._studyShuffleMap[i].origIdx)) {
                    b.style.background = '#E8F5E9';
                    b.style.borderColor = '#4CAF50';
                }
            });

            if (!isCorrect) {
                btn.style.background = '#FFEBEE';
                btn.style.borderColor = '#F44336';
                if (q.wrong_explanations && q.wrong_explanations[String(origIdx)]) {
                    const wrongDiv = document.createElement('div');
                    wrongDiv.className = 'wrong-explanation';
                    wrongDiv.style.cssText = 'background:#FFEBEE;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.5;';
                    wrongDiv.innerHTML = '❌ ' + q.wrong_explanations[String(origIdx)];
                    document.getElementById('study-options').appendChild(wrongDiv);
                }
            } else {
                btn.style.background = '#E8F5E9';
                btn.style.borderColor = '#4CAF50';
            }

            if (q.explanation) {
                const expDiv = document.createElement('div');
                expDiv.className = 'correct-answer-display';
                expDiv.style.cssText = 'background:#F5F5F5;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line;';
                expDiv.innerHTML = '📝 ' + q.explanation;
                document.getElementById('study-options').appendChild(expDiv);
            }

            // 오답 시 관련 개념카드 보기 버튼
            if (!isCorrect && q.linked_concept && q.linked_concept.length > 0) {
                const conceptCards = scopedItems(QUIZ_DATA.concept_cards);  // 숨김 카드 링크 방어
                const linked = conceptCards.filter(c => q.linked_concept.includes(c.id));
                if (linked.length > 0) {
                    const linkDiv = document.createElement('div');
                    linkDiv.style.cssText = 'margin-top:10px;';
                    linkDiv.innerHTML = linked.map(c =>
                        `<button onclick="showLinkedConceptPopup('${c.id}')" style="display:inline-flex;align-items:center;gap:6px;padding:10px 16px;margin:4px;border:2px solid #7C4DFF;border-radius:10px;background:#EDE7F6;color:#4527A0;font-size:14px;font-weight:600;cursor:pointer;">📚 <span>${c.term}</span> 개념 복습</button>`
                    ).join('');
                    document.getElementById('study-options').appendChild(linkDiv);
                }
            }

            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // 오답→개념카드 팝업 오버레이
        function showLinkedConceptPopup(cardId) {
            const conceptCards = QUIZ_DATA.concept_cards || [];

            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
            overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

            const subjectColor = currentSubject === 'social' ? '#2E7D32' : '#1565C0';
            const popup = document.createElement('div');
            popup.style.cssText = 'background:white;border-radius:16px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.3);position:relative;';

            popup.innerHTML = `
                <button onclick="document.getElementById('concept-popup-overlay').remove()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:24px;cursor:pointer;color:#999;padding:4px 8px;">✕</button>
                <div style="font-size:12px;color:${subjectColor};font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">📚 관련 개념카드</div>
                <div style="font-size:20px;font-weight:700;color:#333;margin-bottom:16px;">${card.term}</div>
                ${renderVisualMedia(card)}

        // 절차 드릴 렌더러
        function showProcedureDrill(q) {
            const container = document.getElementById('question-container');
            window._pdState = { drill: q, stepIndex: 0, correctSteps: 0 };

            let html = `
                <div style="background:#FFF3E0;border-radius:12px;padding:16px;margin-bottom:16px;">
                    <div style="font-size:13px;color:#D4760A;font-weight:600;margin-bottom:4px;">${q.category} 문제</div>

            showProcedureStep();

        function showProcedureStep() {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            if (!step) {
                // 모든 스텝 완료
                showProcedureFinal();
                return;
            }

            const stepsContainer = document.getElementById('pd-steps-container');
            const stepDiv = document.createElement('div');
            stepDiv.className = 'pd-step';
            stepDiv.id = 'pd-step-' + state.stepIndex;

            let inputHtml = '';
            if (step.input_type === 'choice') {
                inputHtml = step.options.map((opt, i) =>
                    `<button class="pd-choice-btn" onclick="checkProcedureAnswer(this, '${opt.replace(/'/g, "\\'")}')">${renderMath(opt)}</button>`
                ).join('');
            } else {
                inputHtml = `
                    <input type="text" class="pd-step-input" id="pd-input-${state.stepIndex}" placeholder="답 입력" onkeydown="if(event.key==='Enter'){document.getElementById('pd-check-${state.stepIndex}').click();}">
                    <button class="pd-step-btn" id="pd-check-${state.stepIndex}" onclick="checkProcedureTextAnswer(${state.stepIndex})" style="background:#D4760A;color:white;">확인</button>
                `;
            }

            stepDiv.innerHTML = `
                <div class="pd-step-label">${step.label}</div>
                ${step.why ? `<div class="pd-step-why">${step.why}</div>` : ''}
                <div class="pd-step-question">${renderMath(step.question)}</div>
                <div id="pd-input-area-${state.stepIndex}">${inputHtml}</div>
                <div id="pd-feedback-${state.stepIndex}"></div>
            `;

            stepsContainer.appendChild(stepDiv);

            // 텍스트 입력이면 포커스
            const inp = document.getElementById('pd-input-' + state.stepIndex);
            if (inp) setTimeout(() => inp.focus(), 100);
        }

        function checkProcedureAnswer(btn, answer) {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            const isCorrect = step.correct.includes(answer);

            // 모든 버튼 비활성화
            const area = document.getElementById('pd-input-area-' + state.stepIndex);
            area.querySelectorAll('.pd-choice-btn').forEach(b => {
                b.disabled = true;
                b.style.cursor = 'default';
                if (step.correct.includes(b.textContent.trim())) {
                    b.style.background = '#E8F5E9';
                    b.style.borderColor = '#4CAF50';
                    b.style.color = '#2E7D32';
                }
            });

            if (!isCorrect) {
                btn.style.background = '#FFEBEE';
                btn.style.borderColor = '#F44336';
                btn.style.color = '#C62828';
            } else {
                state.correctSteps++;
            }

            showProcedureFeedback(isCorrect);
        }

        function checkProcedureTextAnswer(stepIdx) {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            const input = document.getElementById('pd-input-' + stepIdx);
            const answer = input.value.trim();

            if (!answer) return;

            // 정답 체크: correct 배열의 어느 하나와 일치하면 정답
            const isCorrect = step.correct.some(c =>
                answer.replace(/\s/g, '') === c.replace(/\s/g, '')
            );

            input.disabled = true;
            const checkBtn = document.getElementById('pd-check-' + stepIdx);
            if (checkBtn) checkBtn.disabled = true;

            if (isCorrect) {
                input.style.borderColor = '#4CAF50';
                input.style.background = '#E8F5E9';
                state.correctSteps++;
            } else {
                input.style.borderColor = '#F44336';
                input.style.background = '#FFEBEE';
            }

            showProcedureFeedback(isCorrect);
        }

        function showProcedureFeedback(isCorrect) {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            const feedbackDiv = document.getElementById('pd-feedback-' + state.stepIndex);

            if (isCorrect) {
                feedbackDiv.innerHTML = `<div class="pd-feedback correct">✅ 맞았어!</div>`;
            } else {
                feedbackDiv.innerHTML = `<div class="pd-feedback wrong">❌ ${renderMath(step.wrong_feedback)}</div>`;
            }

            // 다음 스텝으로
            state.stepIndex++;
            setTimeout(() => showProcedureStep(), 800);
        }

        function showProcedureFinal() {
            const state = window._pdState;
            const total = state.drill.steps.length;
            const correct = state.correctSteps;
            const resultDiv = document.getElementById('pd-final-result');
            const pct = Math.round(correct / total * 100);

            let emoji = pct === 100 ? '🎉' : pct >= 50 ? '👍' : '💪';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="text-align:center;padding:20px;background:${pct === 100 ? '#E8F5E9' : '#FFF8E1'};border-radius:12px;margin-top:16px;">

                    <div style="font-size:18px;font-weight:700;margin:8px 0;">${correct}/${total} 단계 정답</div>

        // 수학 선택형 렌더러
        // 수학 선택형 — 보기 셔플 맵 (원본 인덱스 추적)
        let mathShuffleMap = []; // [{origIdx, opt}]

        function showMathChoice(q) {
            const container = document.getElementById('question-container');
            container.style.display = 'block';

            const isMulti = Array.isArray(q.correct);
            let sentenceHtml = q.sentence ? `<div style="font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line;background:#FFF8E1;padding:12px;border-radius:8px;">${renderMath(q.sentence)}</div>` : '';
            // visual_svg 도형/그림: showMathConceptCard(line 5454) 패턴과 동일. Q-34(math2 계단형 도형), Q-41(math3 수직선) 대응.
            let visualHtml = q.visual_svg ? `<div style="margin-bottom:12px;text-align:center;overflow-x:auto;max-width:100%;">${q.visual_svg.replace(/<svg /,'<svg style="max-width:100%;height:auto;" ')}</div>` : '';

            // 보기 셔플 (원본 인덱스 보존)
            mathShuffleMap = q.options.map((opt, idx) => ({ origIdx: idx, opt }));
            shuffleArray(mathShuffleMap);

            let optionsHtml = mathShuffleMap.map((item, i) => {
                const label = String.fromCharCode(0x2460 + i); // ①②③④⑤
                const shown = q._exam_omr ? ((i + 1) + '. ' + renderMath(item.opt)) : (label + ' ' + renderMath(item.opt));
                return `<button class="option-btn" style="display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border:2px solid #ddd;border-radius:10px;background:white;font-size:15px;cursor:pointer;line-height:1.5;" onclick="checkMathChoice(this, ${i})">${shown}</button>`;
            }).join('');

            container.innerHTML = sentenceHtml + visualHtml + `<div id="math-options">${optionsHtml}</div>`;

            document.getElementById('question-text').innerHTML = q.instruction ? renderMath(q.instruction) : '';
            document.getElementById('btn-hint').style.display = q.hint ? '' : 'none';

            if (q.hint) {
                document.getElementById('btn-hint').onclick = function() {
                    document.getElementById('hint-display').style.display = 'block';
                    document.getElementById('hint-display').innerHTML = renderMath(q.hint);
                    hintUsedThisQuestion = true;
                };
            }
        }

        function checkMathChoice(btn, displayIdx) {
            const q = currentSession[currentQuestionIndex];
            const isMulti = Array.isArray(q.correct);
            const origIdx = mathShuffleMap[displayIdx].origIdx;
            let isCorrect;

            if (isMulti) {
                isCorrect = q.correct.includes(origIdx);
            } else {
                isCorrect = origIdx === q.correct;
            }

            // 모든 버튼 비활성화 + 정답 표시
            document.querySelectorAll('#math-options .option-btn').forEach((b, i) => {
                b.disabled = true;
                b.style.cursor = 'default';
                const correctArr = isMulti ? q.correct : [q.correct];
                if (correctArr.includes(mathShuffleMap[i].origIdx)) {
                    b.style.background = '#E8F5E9';
                    b.style.borderColor = '#4CAF50';
                }
            });

            if (!isCorrect) {
                btn.style.background = '#FFEBEE';
                btn.style.borderColor = '#F44336';
                // 오답 해설 (원본 인덱스로 참조)
                if (q.wrong_explanations && q.wrong_explanations[origIdx]) {
                    const wrongDiv = document.createElement('div');
                    wrongDiv.className = 'wrong-explanation';
                    wrongDiv.style.cssText = 'background:#FFEBEE;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.5;';
                    wrongDiv.innerHTML = '❌ ' + renderMath(q.wrong_explanations[origIdx]);
                    document.getElementById('math-options').appendChild(wrongDiv);
                }
            } else {
                btn.style.background = '#E8F5E9';
                btn.style.borderColor = '#4CAF50';
            }

            if (q.explanation) {
                const expDiv = document.createElement('div');
                expDiv.className = 'correct-answer-display';
                expDiv.style.cssText = 'background:#F5F5F5;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line;';
                expDiv.innerHTML = '📝 ' + renderMath(q.explanation);
                document.getElementById('math-options').appendChild(expDiv);
            }

            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // 수학 직접입력 렌더러
        function showMathTypedAnswer(q) {
            const container = document.getElementById('question-container');
            container.style.display = 'block';

            let sentenceHtml = q.sentence ? `<div style="font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line;background:#FFF8E1;padding:12px;border-radius:8px;">${renderMath(q.sentence)}</div>` : '';

            container.innerHTML = sentenceHtml + `
                <input type="text" id="math-typed-input" style="width:100%;padding:14px;border:2px solid #D4760A;border-radius:10px;font-size:18px;text-align:center;box-sizing:border-box;" placeholder="답 입력 (예: 5/9)" onkeydown="if(event.key==='Enter')checkMathTypedAnswer()">
                <button onclick="checkMathTypedAnswer()" style="width:100%;margin-top:10px;padding:14px;background:#D4760A;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">확인</button>
                <div id="math-typed-feedback"></div>
            `;

            document.getElementById('question-text').innerHTML = q.instruction ? renderMath(q.instruction) : '';
            setTimeout(() => document.getElementById('math-typed-input')?.focus(), 100);

            // 힌트
            document.getElementById('btn-hint').style.display = q.hint ? '' : 'none';
            if (q.hint) {
                document.getElementById('btn-hint').onclick = function() {
                    document.getElementById('hint-display').style.display = 'block';
                    document.getElementById('hint-display').innerHTML = renderMath(q.hint);
                    hintUsedThisQuestion = true;
                };
            }
        }

        // typed_answer 스키마 계약: q.correct (string[]), q.alt_correct (string[]) 필수.
        // correct_answer/accept_answers 등 과거 키는 읽지 않음. 신규 문항은 반드시 배열 형태의
        // correct + alt_correct 로만 정의할 것. (math1 전체 / math2 Q-35,Q-37 / math3 Q-39,Q-42,Q-43 참조)
        function checkMathTypedAnswer() {
            const q = currentSession[currentQuestionIndex];
            const input = document.getElementById('math-typed-input');
            const answer = input.value.trim();
            if (!answer) return;

            input.disabled = true;

            const allCorrect = [...(q.correct || []), ...(q.alt_correct || [])];
            const isCorrect = allCorrect.some(c => answer.replace(/\s/g, '') === c.replace(/\s/g, ''));

            const feedback = document.getElementById('math-typed-feedback');
            if (isCorrect) {
                input.style.borderColor = '#4CAF50';
                input.style.background = '#E8F5E9';
                feedback.innerHTML = `<div style="background:#E8F5E9;padding:12px;border-radius:8px;margin-top:8px;color:#2E7D32;font-size:15px;">✅ 정답!</div>`;
            } else {
                input.style.borderColor = '#F44336';
                input.style.background = '#FFEBEE';
                feedback.innerHTML = `<div style="background:#FFEBEE;padding:12px;border-radius:8px;margin-top:8px;color:#C62828;font-size:14px;line-height:1.5;">❌ 정답: ${renderMath(q.correct[0])}</div>`;
            }

            if (q.explanation) {
                feedback.innerHTML += `<div style="background:#F5F5F5;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line;">📝 ${renderMath(q.explanation)}</div>`;
            }

            // [Codex 2026-05-13 index-tail-restore] Restored truncated tail from the last known-good index backup.
            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // 앱 시작
        // [Codex 2026-05-13 index-tail-restore] Keep this marker so coworkers can identify the recovery patch.
        window.addEventListener('load', init);
    </script>

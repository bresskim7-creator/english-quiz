        function handleChoiceBlankAnswer(q, selectedIdx, correctIdx, userChoice) {
            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });
            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);
            if (!isCorrect) {
                showWrongExplanation(q, document.getElementById('fill-blank-container'), userChoice);

            showNextButton();

        // [06b A-1] 다중정답 채점 — Set 엄격 일치 (부분점수 없음)
        function handleChoiceBlankMultiAnswer(q, selectedSet, correctSet) {
            const isCorrect = selectedSet.size === correctSet.size &&
                              [...selectedSet].every(i => correctSet.has(i));

            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
                const origIdx = parseInt(btn.dataset.origIdx, 10);
                if (isNaN(origIdx)) return;
                if (correctSet.has(origIdx)) {
                    btn.classList.add('correct');
                } else if (selectedSet.has(origIdx)) {
                    btn.classList.add('incorrect');
                }
            });
            const submitBtn = document.getElementById('multi-answer-submit');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
            }

            // [multi_focus 1차] 다답 세부 메트릭 — 조건읽기/polarity 오독 분리 로깅
            const need = correctSet.size;
            const selected_count = selectedSet.size;
            const correct_hit_count = [...selectedSet].filter(i => correctSet.has(i)).length;
            const count_mismatch = selected_count !== need;                                  // 정답 개수 오독
            const likely_polarity_miss = (selected_count === need && correct_hit_count < need); // 개수는 맞췄으나 오선택(반대 polarity 후보 — hit<need, 확정 아님)
            // [④4-1] polarity_miss 세분(진단 전용 — GAS condition_miss 합산값 불변, boolean 둘 다 유지):
            //   count(개수 처리 실패) / flip(개수는 맞지만 hit=0, 조건 통째 뒤집힘) / partial(0<hit<need, 보기별 판단 흔들림) / none(정답)
            let polarity_miss_level = 'none';
            if (count_mismatch) {
                polarity_miss_level = 'count';
            } else if (need > 0 && correct_hit_count === 0) {
                polarity_miss_level = 'flip';
            } else if (correct_hit_count < need) {
                polarity_miss_level = 'partial';
            }
            recordAnswer(q, isCorrect, {
                need: need,
                selected_count: selected_count,
                correct_hit_count: correct_hit_count,
                count_mismatch: count_mismatch,
                likely_polarity_miss: likely_polarity_miss,
                polarity_miss_level: polarity_miss_level
            });
            if (!isCorrect) {
                // [06b A-1 + Codex Q1] 다중정답 전용 wrong explanation — 인덱스별 해설 표시
                showWrongExplanationMulti(q, document.getElementById('fill-blank-container'), selectedSet, correctSet);
            }
            showNextButton();
        }

        // Chunk Order renderer (reuse arrange-container)
        function showChunkOrder(q) {
            document.getElementById('question-text').textContent = q.prompt_ko;
            const container = document.getElementById('arrange-container');
            container.style.display = 'block';

            const selected = [];
            const shuffled = [...q.chunks];
            shuffleArray(shuffled);

            const selectedDiv = document.getElementById('selected-words');
            const availableDiv = document.getElementById('available-words');
            selectedDiv.innerHTML = '<div style="color:#999;font-size:13px;padding:8px 0;">👆 아래 단어를 순서대로 탭하세요</div>';
            availableDiv.innerHTML = '';

            // Show skip button for chunk_order
            document.getElementById('btn-skip').style.display = 'inline-block';

            shuffled.forEach((chunk, idx) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = chunk;
                btn.dataset.word = chunk;
                btn.dataset.idx = idx;
                btn.onclick = () => {
                    if (!btn.classList.contains('used')) {
                        selected.push({ word: chunk, idx });
                        btn.classList.add('used');
                        updateSelectedChunks();
                    }
                };
                availableDiv.appendChild(btn);
            });

            function updateSelectedChunks() {
                selectedDiv.innerHTML = '';
                selected.forEach((item, selIdx) => {
                    const tag = document.createElement('div');
                    tag.className = 'selected-word';
                    tag.textContent = item.word;
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-word-btn';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = () => {
                        selected.splice(selIdx, 1);
                        document.querySelector(`[data-word="${item.word}"][data-idx="${item.idx}"]`).classList.remove('used');
                        updateSelectedChunks();
                    };
                    tag.appendChild(removeBtn);
                    selectedDiv.appendChild(tag);
                });
            }

            // Auto-check when all chunks placed
            if (arrangeCheckInterval) clearInterval(arrangeCheckInterval);
            arrangeCheckInterval = setInterval(() => {
                if (selected.length === q.chunks.length) {
                    clearInterval(arrangeCheckInterval);
                    arrangeCheckInterval = null;
                    const userAnswer = selected.map(x => x.word).join(' ');
                    const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(q.answer);

                    document.querySelectorAll('#available-words .word-btn').forEach(btn => {
                        if (btn.classList.contains('used')) {
                            btn.classList.add(isCorrect ? 'correct' : 'incorrect');
                        }
                        btn.disabled = true;
                    });
                    document.querySelectorAll('.remove-word-btn').forEach(b => b.disabled = true);

                    recordAnswer(q, isCorrect);
                    if (!isCorrect) {
                        showWrongExplanation(q, container, userAnswer);
                    }
                    document.getElementById('btn-skip').style.display = 'none';
                    showNextButton();
                }
            }, 100);
        }

        // Paragraph Order renderer (06b A-3) — chunk_order 모방, paragraphs 셔플
        function showParagraphOrder(q) {
            document.getElementById('question-text').textContent = q.prompt_ko || q.instruction || '';

            const container = document.getElementById('paragraph-order-container');
            container.style.display = 'block';

            // intro
            const introEl = document.getElementById('paragraph-order-intro');
            if (q.intro_paragraph_en) {
                introEl.style.display = 'block';
                introEl.textContent = q.intro_paragraph_en;
            } else {
                introEl.style.display = 'none';
                introEl.textContent = '';
            }

            const selectedDiv = document.getElementById('paragraph-order-selected');
            const availableDiv = document.getElementById('paragraph-order-available');
            selectedDiv.innerHTML = '<div style="color:#999;font-size:13px;padding:8px 0;">👆 아래 문단을 순서대로 탭하세요</div>';
            availableDiv.innerHTML = '';

            // skip 미허용 (난이도 보존)
            document.getElementById('btn-skip').style.display = 'none';

            // paragraphs 셔플
            const shuffled = [...q.paragraphs];
            shuffleArray(shuffled);

            const selected = [];

            // label 정규화: '(A)' → 'A', 'A' → 'A'
            function normalizeLabel(lbl) {
                return String(lbl || '').replace(/[()\s]/g, '');
            }

            shuffled.forEach((p, idx) => {
                const card = document.createElement('button');
                card.className = 'paragraph-card';
                card.dataset.label = normalizeLabel(p.label);
                card.dataset.idx = idx;

                const labelSpan = document.createElement('span');
                labelSpan.className = 'pc-label';
                labelSpan.textContent = normalizeLabel(p.label);

                const textSpan = document.createElement('span');
                textSpan.className = 'pc-text';
                textSpan.textContent = p.text_en || p.text || '';

                card.appendChild(labelSpan);
                card.appendChild(textSpan);

                card.onclick = () => {
                    if (card.disabled || card.classList.contains('used')) return;
                    selected.push({ label: normalizeLabel(p.label), text: p.text_en || p.text || '', cardRef: card, idx });
                    card.classList.add('used');
                    updateSelectedParagraphs();
                };
                availableDiv.appendChild(card);
            });

            function updateSelectedParagraphs() {
                selectedDiv.innerHTML = '';
                selected.forEach((item, selIdx) => {
                    const tag = document.createElement('div');
                    tag.className = 'selected-paragraph-card';

                    const orderEl = document.createElement('span');
                    orderEl.className = 'spc-order';
                    orderEl.textContent = (selIdx + 1) + '.';

                    const labelEl = document.createElement('span');
                    labelEl.className = 'spc-label';
                    labelEl.textContent = item.label;

                    const textEl = document.createElement('span');
                    textEl.className = 'spc-text';
                    const preview = item.text.length > 60 ? item.text.substring(0, 60) + '…' : item.text;
                    textEl.textContent = preview;

                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-paragraph-btn';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = (e) => {
                        e.stopPropagation();
                        selected.splice(selIdx, 1);
                        if (item.cardRef) item.cardRef.classList.remove('used');
                        updateSelectedParagraphs();
                    };

                    tag.appendChild(orderEl);
                    tag.appendChild(labelEl);
                    tag.appendChild(textEl);
                    tag.appendChild(removeBtn);
                    selectedDiv.appendChild(tag);
                });
            }

            // 자동 채점: 모든 paragraph 배치되면 비교
            if (arrangeCheckInterval) clearInterval(arrangeCheckInterval);
            arrangeCheckInterval = setInterval(() => {
                if (selected.length === q.paragraphs.length) {
                    clearInterval(arrangeCheckInterval);
                    arrangeCheckInterval = null;

                    const userAnswer = selected.map(s => s.label).join('-');
                    const correct = (q.answer || []).map(a => String(a).replace(/[()\s]/g, '')).join('-');
                    const isCorrect = userAnswer === correct;

                    // 카드 색칠
                    document.querySelectorAll('#paragraph-order-available .paragraph-card').forEach(card => {
                        card.disabled = true;
                        if (card.classList.contains('used')) {
                            card.classList.add(isCorrect ? 'correct' : 'incorrect');
                        }
                    });
                    document.querySelectorAll('.remove-paragraph-btn').forEach(b => b.disabled = true);

                    recordAnswer(q, isCorrect);
                    if (!isCorrect) {
                        showWrongExplanation(q, container, userAnswer);
                    }
                    showNextButton();
                }
            }, 100);
        }

        function checkTypedBlank() {
            const q = currentSession[currentQuestionIndex];
            if (!q) return;

            const inputs = document.querySelectorAll('#typed-blank-inputs .typed-blank-input');
            const answers = q.answers || [];
            const acceptTypos = q.accept_typos || {};

            let allCorrect = true;
            let hasTypo = false;
            let typoWords = [];

            inputs.forEach((input, i) => {
                const userVal = input.value.trim().toLowerCase();
                const correctVal = (answers[i] || '').toLowerCase();
                input.disabled = true;

                if (userVal === correctVal) {
                    input.classList.add('correct-input');
                } else {
                    // Check accept_typos
                    const typoList = acceptTypos[answers[i]] || [];
                    if (typoList.map(t => t.toLowerCase()).includes(userVal)) {
                        input.classList.add('typo-input');
                        hasTypo = true;
                        typoWords.push(answers[i]);
                    } else {
                        input.classList.add('wrong-input');
                        allCorrect = false;
                    }
                }
            });

            document.getElementById('typed-blank-submit').style.display = 'none';
            const feedbackEl = document.getElementById('typed-blank-feedback');
            feedbackEl.style.display = 'block';

            if (allCorrect) {
                if (hasTypo) {
                    feedbackEl.className = 'writing-feedback';
                    feedbackEl.style.background = '#fff3e0';
                    feedbackEl.style.border = '1px solid #FF9800';
                    feedbackEl.style.borderRadius = '8px';
                    feedbackEl.style.padding = '12px';
                    feedbackEl.style.marginTop = '10px';
                    feedbackEl.innerHTML = '✅ 거의 맞았어요! 정확한 철자: <strong>' + typoWords.join(', ') + '</strong>';
                } else {
                    feedbackEl.className = 'writing-feedback pass';
                    feedbackEl.innerHTML = '✅ 정답!';
                }
                recordAnswer(q, true);
            } else {
                feedbackEl.className = 'writing-feedback fail';
                feedbackEl.innerHTML = '❌ 오답이에요. 정답: <strong>' + answers.join(', ') + '</strong>';
                if (q.hint) feedbackEl.innerHTML += '<br><span style="color:#795548;font-size:13px;">💡 ' + q.hint + '</span>';
                recordAnswer(q, false);
            }

            showNextButton();
        }

        // 정답 문장 추출 (유형별) - B-9
        function getCorrectSentence(q) {
            // B-9: Drill types
            if (q.type === 'flashcard') return q.prompt_en || '';
            if (q.type === 'choice_blank') {
                // [06b A-1] 다중정답
                if (Array.isArray(q.answer_indices) && q.choices) {
                    return q.answer_indices.map(i => q.choices[i]).join(', ');
                }
                return q.prompt ? q.prompt.replace('_____', q.answer || '') : '';
            }
            if (q.type === 'chunk_order') return q.answer || '';
            if (q.type === 'paragraph_order' || q.type === 'dialogue_order') {
                // [06b A-3] / [5/12j dialogue_order]
                return (q.answer || []).map(a => String(a).replace(/[()\s]/g, '')).join(' → ');
            }
            if (q.type === 'typed_blank') {
                let result = q.prompt || '';
                (q.answers || []).forEach(a => { result = result.replace('_____', a); });
                return result;
            }
            // Existing types
            if (q.type === 'arrange') return q.answer;
            if (q.type === 'match') return q.choices[q.correct];
            if (q.type === 'dialogue_response') return q.blank_answer || q.choices[q.correct];
            if (q.type === 'short_reading') return q.blank_answer || q.choices[q.correct];
            if (q.type === 'position_ask') return q.sentence; // 전체 문장 읽기
            if (q.type === 'mini_writing') return q.example_answer || '';
            if (q.sentence && q.blank_answer) {
                return q.sentence.replace('_____', q.blank_answer);
            }
            return q.blank_answer || q.answer || '';
        }

        // Vocab hint for sentence drill: show unknown words
        function showVocabHint(q) {
            let hintEl = document.getElementById('vocab-hint-display');
            if (!hintEl) {
                // Create hint element if not exists
                hintEl = document.createElement('div');
                hintEl.id = 'vocab-hint-display';
                hintEl.style.cssText = 'background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:8px 12px;font-size:13px;color:#1565c0;margin-top:8px;display:none;';
                document.getElementById('hint-display').parentNode.insertBefore(hintEl, document.getElementById('hint-display'));
            }
            hintEl.style.display = 'none';
            hintEl.textContent = '';

            if (!QUIZ_DATA || !QUIZ_DATA.vocab_drill || currentMode === 'vocab') return;

            const vocabResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lessonKey = 'L' + currentLesson;
            const lessonResults = vocabResults[lessonKey] || {};

            // Find words that appear in this question and are known === false
            const qId = q.id || '';
            const csId = q.core_sentence_id || '';
            const unknownWords = QUIZ_DATA.vocab_drill.filter(item => {
                const result = lessonResults[item.id];
                if (!result || result.known !== false) return false;
                return item.appears_in && (item.appears_in.includes(qId) || item.appears_in.includes(csId));
            });

            if (unknownWords.length > 0) {
                hintEl.textContent = '💡 ' + unknownWords.map(w => w.word + ' ' + w.meaning).join(' · ');
                hintEl.style.display = 'block';
            }
        }

        // 답변 기록 - B-8: Fallback field support
        function recordAnswer(q, isCorrect, extra) {
            playSound(isCorrect ? 'correct' : 'incorrect');
            // 정답이면 0.5초 후 문장 읽어주기 (드릴 모드만, 실전대비는 제외, 국어는 제외)
            if (isCorrect && currentMode === 'drill' && currentSubject !== 'korean') {
                setTimeout(() => speakEnglish(getCorrectSentence(q)), 500);
            }
            const elapsed = questionStartTime ? Math.round((Date.now() - questionStartTime) / 1000) : 0;
            updateExamPerfMetrics(q, isCorrect, elapsed);
            sessionAnswers.push({
                id: q.id,
                correct: isCorrect,
                type: q.type,
                difficulty: q.difficulty || (q.phase === 'drill' ? 'drill' : ''),
                keyword: q.keyword || q.core_sentence_id || q.id,
                score_group: q.score_group || '',
                recovery_band: q.recovery_band || '',
                test_task: q.test_task || q.type || '',
                time_sec: elapsed,
                hint_used: hintUsedThisQuestion,
                exam_perf: q._exam_perf ? 'Y' : '',
                exam_perf_variants: q._exam_perf_variants ? q._exam_perf_variants.join('|') : '',
                time_limit_sec: q._exam_time_limit || '',
                phase: q.phase || '',
                polarity: q.polarity || '',
                ...(extra || {})
            });

            if (!questionHistory[q.id]) {
                questionHistory[q.id] = { attempts: 0, correct: 0, last_seen: today(), last_correct: false };
            }

            const hist = questionHistory[q.id];
            hist.attempts = (hist.attempts || 0) + 1;
            if (isCorrect) hist.correct = (hist.correct || 0) + 1;
            hist.last_seen = today();
            hist.last_correct = isCorrect;

            saveQuestionHistory();
        }

        // =========================================================
        // Vocab Drill Engine
        // =========================================================
        // Phase A·B (2026-05-09): Helpers for example block rendering and auto-sized flip card
        function markBoldKo(text) {
            if (!text) return '';
            return text.replace(/\*\*([^*]+)\*\*/g, '<strong class="vocab-target-ko">$1</strong>');
        }
        function autoSizeFlipCard(sceneEl, cardEl, frontEl, backEl) {
            if (!sceneEl || !cardEl || !frontEl || !backEl) return;
            requestAnimationFrame(() => {
                const fH = frontEl.scrollHeight;
                const bH = backEl.scrollHeight;
                const h = Math.max(fH, bH, 180);
                sceneEl.style.minHeight = h + 'px';
                cardEl.style.minHeight = h + 'px';
            });
        }

        let vocabDrillList = [];      // current round words (shuffled)
        let vocabDrillIndex = 0;
        let vocabDrillResults = {};   // { "VD-L1-001": true/false, ... }
        let vocabDrillRound = 1;

        function startVocabDrill() {
            if (!QUIZ_DATA || !QUIZ_DATA.vocab_drill || QUIZ_DATA.vocab_drill.length === 0) {
                alert('이 Lesson에는 단어 드릴 데이터가 없습니다.');
                return;
            }

            vocabDrillRound = 1;
            vocabDrillResults = {};

            // 이전 세션 결과 읽어서 모르는 단어를 앞에 배치
            const prevResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lk = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? currentLesson : ('L' + currentLesson);
            const prevLesson = prevResults[lk] || {};
            const unknown = QUIZ_DATA.vocab_drill.filter(item => prevLesson[item.id] && prevLesson[item.id].known === false);
            const untested = QUIZ_DATA.vocab_drill.filter(item => !prevLesson[item.id]);
            const known = QUIZ_DATA.vocab_drill.filter(item => prevLesson[item.id] && prevLesson[item.id].known === true);
            shuffleArray(unknown);
            shuffleArray(untested);
            shuffleArray(known);
            vocabDrillList = [...unknown, ...untested, ...known];
            vocabDrillIndex = 0;

            document.getElementById('vocab-result-area').style.display = 'none';
            document.getElementById('vocab-card-area').style.display = 'block';
            document.getElementById('vocab-controls').style.display = '';

            const modeLabel = '단어 드릴';
            document.querySelector('.header-title').textContent = getHeaderTitle(modeLabel);

            showPage('vocab-page');
            showVocabCard();
        }

        // vocab 형광펜 정규식: 단어 변이형(s/es/ed/d/ing/en) + 명시적 inflections(불규칙) 모두 매칭
        function buildVocabHighlightRegex(item) {
            const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // backward-compat: 문자열로 호출된 경우
            const rawWord = (typeof item === 'string') ? item : ((item && item.word) || '');
            const inflections = (item && Array.isArray(item.inflections)) ? item.inflections : [];
            const parts = rawWord.trim().split(/\s+/);
            if (parts.length === 0 || !parts[0]) return /a^/g; // never match
            const inflect = '(?:e?s|ed|d|ing|en)?';
            let basePattern;
            if (parts.length === 1) {
                basePattern = esc(parts[0]) + inflect;
            } else {
                const first = esc(parts[0]);
                const rest = parts.slice(1).map(esc).join('\\s+');
                basePattern = first + inflect + '\\s+' + rest;
            }
            const inflPats = inflections
                .filter(s => typeof s === 'string' && s.trim())
                .map(s => esc(s.trim()).replace(/\s+/g, '\\s+'));
            const all = [basePattern].concat(inflPats);
            return new RegExp('\\b(' + all.join('|') + ')\\b', 'gi');
        }

        function showVocabCard() {
            if (vocabDrillIndex >= vocabDrillList.length) {
                finishVocabRound();
                return;
            }

            const item = vocabDrillList[vocabDrillIndex];
            const total = vocabDrillList.length;
            const progress = (vocabDrillIndex / total) * 100;

            document.getElementById('vocab-progress-fill').style.width = progress + '%';
            document.getElementById('vocab-counter').textContent = (vocabDrillIndex + 1) + ' / ' + total + (vocabDrillRound > 1 ? ' (재시도)' : '');

            const front = document.getElementById('vocab-front');
            const back = document.getElementById('vocab-back');
            const buttons = document.getElementById('vocab-buttons');
            const card = document.getElementById('vocab-card');
            const scene = document.getElementById('vocab-scene');

            // Reset
            card.classList.remove('flipped');
            buttons.style.display = 'none';
            document.querySelectorAll('#vocab-buttons .flashcard-btn').forEach(b => { b.disabled = false; });

            // Front: word (big)
            front.innerHTML = '<div class="vocab-word">' + item.word + '</div><div class="flashcard-tap-hint">탭하면 뜻 보기</div>';

            // Back: 국어는 확장 레이아웃 (meaning + pos + example + similar_expression)
            if (currentSubject === 'korean') {
                let backHtml = '<div class="kor-vocab-meaning">' + item.meaning + '</div>';
                backHtml += '<div class="kor-vocab-pos">' + (item.pos || '') + '</div>';
                if (item.example) backHtml += '<div class="kor-vocab-example">' + item.example + '</div>';
                if (item.similar_expression) backHtml += '<div class="kor-vocab-similar">≈ ' + item.similar_expression + '</div>';
                backHtml += '<div class="flashcard-tap-hint">탭하면 단어 보기</div>';
                back.innerHTML = backHtml;
            } else {
                let engBackHtml = '<div class="vocab-meaning">' + item.meaning + '</div><div class="vocab-pos">' + item.pos + '</div>';
                if (item.example) {
                    const highlighted = item.example.replace(buildVocabHighlightRegex(item), '<mark class="vocab-highlight">$1</mark>');
                    engBackHtml += '<div class="vocab-example-block">';
                    engBackHtml += '<span class="vocab-example-label">EN</span>';
                    engBackHtml += '<div class="vocab-example-line">' + highlighted + '</div>';
                    if (item.example_ko_chunk) {
                        engBackHtml += '<div class="vocab-example-line ko-chunk"><span class="vocab-example-label">직역</span>' + markBoldKo(item.example_ko_chunk) + '</div>';
                    }
                    if (item.example_ko) {
                        engBackHtml += '<div class="vocab-example-line ko-natural"><span class="vocab-example-label">자연 번역</span>' + markBoldKo(item.example_ko) + '</div>';
                    }
                    engBackHtml += '</div>';
                }
                engBackHtml += '<div class="flashcard-tap-hint">탭하면 영어 보기</div>';
                back.innerHTML = engBackHtml;
            }
            // Phase A (2026-05-09): Auto-size card to fit example block / longer back content
            autoSizeFlipCard(scene, card, front, back);

            // TTS: 국어는 비활성화
            if (currentSubject !== 'korean') {
                setTimeout(() => speakEnglish(item.word), 300);
            }

            let flipped = false;
            scene.onclick = function() {
                flipped = !flipped;
                card.classList.toggle('flipped');
                if (flipped) {
                    buttons.style.display = 'flex';
                }
                if (!flipped && currentSubject !== 'korean') {
                    setTimeout(() => speakEnglish(item.word), 300);
                }
            };
        }

        function handleVocabAnswer(known) {
            const item = vocabDrillList[vocabDrillIndex];
            document.getElementById('vocab-scene').onclick = null;
            document.querySelectorAll('#vocab-buttons .flashcard-btn').forEach(b => { b.disabled = true; });

            vocabDrillResults[item.id] = known;
            playSound(known ? 'correct' : 'incorrect');

            vocabDrillIndex++;
            setTimeout(() => showVocabCard(), 400);
        }

        function finishVocabRound() {
            const unknownItems = vocabDrillList.filter(item => vocabDrillResults[item.id] === false);
            const knownCount = vocabDrillList.filter(item => vocabDrillResults[item.id] === true).length;
            const totalAll = QUIZ_DATA.vocab_drill.length;
            const totalKnown = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === true).length;

            if (unknownItems.length > 0 && vocabDrillRound < 3) {
                // Show retry prompt
                const area = document.getElementById('vocab-result-area');
                area.style.display = 'block';
                document.getElementById('vocab-card-area').style.display = 'none';
                area.innerHTML = `
                    <div class="vocab-round-msg">
                        <h3>라운드 ${vocabDrillRound} 완료!</h3>
                        <p>외웠어: ${totalKnown}개 / 한번 더: ${unknownItems.length}개</p>
                        <button class="vocab-retry-btn" onclick="retryVocabDrill()">한번 더 볼 ${unknownItems.length}개 다시 도전</button>
                        <button class="vocab-done-btn" onclick="finishVocabDrill()">여기서 마치기</button>
                    </div>
                `;
            } else {
                finishVocabDrill();
            }
        }

        function retryVocabDrill() {
            vocabDrillRound++;
            const unknownItems = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === false);
            vocabDrillList = [...unknownItems];
            shuffleArray(vocabDrillList);
            vocabDrillIndex = 0;

            document.getElementById('vocab-result-area').style.display = 'none';
            document.getElementById('vocab-card-area').style.display = 'block';
            showVocabCard();
        }

        function quitVocabDrill() {
            if (confirm('학습을 중단하겠습니까?')) {
                if (Object.keys(vocabDrillResults).length > 0) {
                    finishVocabDrill();
                } else {
                    showPage('home-page');
                }
            }
        }

        function finishVocabDrill() {
            // 그만하기 버튼 숨기기 (결과 화면에서는 "홈으로 돌아가기"가 있으므로)
            document.getElementById('vocab-controls').style.display = 'none';
            // Save results to localStorage
            const vocabResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lessonKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? currentLesson : ('L' + currentLesson);
            if (!vocabResults[lessonKey]) vocabResults[lessonKey] = {};
            const now = new Date().toISOString();
            QUIZ_DATA.vocab_drill.forEach(item => {
                if (vocabDrillResults[item.id] !== undefined) {
                    vocabResults[lessonKey][item.id] = {
                        known: vocabDrillResults[item.id],
                        tested_at: now
                    };
                }
            });
            safeSetItem('vocab_results', JSON.stringify(vocabResults));

            // Calculate final stats
            const totalAll = QUIZ_DATA.vocab_drill.length;
            const totalKnown = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === true).length;
            const percentage = Math.round((totalKnown / totalAll) * 100);

            // Show result
            const area = document.getElementById('vocab-result-area');
            area.style.display = 'block';
            document.getElementById('vocab-card-area').style.display = 'none';

            const unknownWords = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === false);
            let unknownHtml = '';
            if (unknownWords.length > 0) {
                unknownHtml = '<div style="text-align:left;margin-top:20px;"><div style="font-size:15px;font-weight:600;color:#e65100;margin-bottom:8px;">복습 필요 단어</div>';
                unknownWords.forEach(w => {
                    unknownHtml += `<div style="padding:8px 0;border-bottom:1px solid #eee;font-size:14px;"><strong>${w.word}</strong> <span style="color:#888">${w.pos}</span> — ${w.meaning}</div>`;
                });
                unknownHtml += '</div>';
            }

            area.innerHTML = `
                <div class="vocab-result-summary">
                    <h2>단어 드릴 완료!</h2>
                    <div class="score">${percentage}%</div>
                    <div class="detail">${totalAll}개 중 ${totalKnown}개 알고 있어요</div>
                    ${unknownHtml}
                    <button class="vocab-done-btn" onclick="showPage('home-page')" style="margin-top:24px;">홈으로 돌아가기</button>
                </div>
            `;

            // Send to Google Sheets (vocab_log)
            sendVocabToGoogleSheets();
        }

        function enqueueVocabRow(row) {
            const q = JSON.parse(localStorage.getItem('pending_vocab_log') || '[]');
            q.push(row);
            safeSetItem('pending_vocab_log', JSON.stringify(q));
        }

        function flushVocabQueue() {
            // v132: 동시 호출 차단 + reserve-before-fetch (race 중복 방지)
            if (_vocabFlushInFlight) return Promise.resolve(false);

            const webhookUrl = localStorage.getItem('webhook_url');
            if (!webhookUrl) return Promise.resolve(false);

            const q = JSON.parse(localStorage.getItem('pending_vocab_log') || '[]');
            if (!q.length) return Promise.resolve(true);

            _vocabFlushInFlight = true;

            // 큐를 즉시 비움 — fetch 도중 새 row enqueue돼도 다음 flush 차례
            safeSetItem('pending_vocab_log', JSON.stringify([]));

            const remaining = [];
            return Promise.allSettled(q.map(row =>
                fetch(webhookUrl, {
                    method: 'POST',
                    body: JSON.stringify(row)
                }).then(async r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    const text = await r.text();
                    let body = null;
                    try { body = JSON.parse(text); } catch (_) {}
                    if (body && body.ok === false) throw new Error(body.error || 'apps-script reject');
                    if (body && body.status && body.status !== 'ok') throw new Error(body.error || body.status);
                }).catch(err => {
                    console.warn('[vocab-log-send-fail]', err && err.message);
                    remaining.push(row);
                })
            )).then(() => {
                // 실패 row만 큐 복귀 — 그 사이 enqueue된 새 row와 병합
                const currentQ = JSON.parse(localStorage.getItem('pending_vocab_log') || '[]');
                safeSetItem('pending_vocab_log', JSON.stringify([...currentQ, ...remaining]));
                if (remaining.length < q.length) {
                    try { safeSetItem('vocab_last_send', new Date().toISOString()); } catch (_) {}
                }
                _vocabFlushInFlight = false;
                return remaining.length === 0;
            }).catch(err => {
                // 예상 못한 에러 — 원본 큐 복구
                const currentQ = JSON.parse(localStorage.getItem('pending_vocab_log') || '[]');
                safeSetItem('pending_vocab_log', JSON.stringify([...currentQ, ...q]));
                _vocabFlushInFlight = false;
                throw err;
            });
        }

        function sendVocabToGoogleSheets() {
            if (!QUIZ_DATA || !QUIZ_DATA.vocab_drill) return;

            const now = new Date().toISOString();
            QUIZ_DATA.vocab_drill.forEach(item => {
                if (vocabDrillResults[item.id] !== undefined) {
                    enqueueVocabRow({
                        sheet: 'vocab_log',
                        timestamp: now,
                        lesson: currentLesson,
                        subject: currentSubject,
                        word_id: item.id,
                        word: item.word,
                        known: vocabDrillResults[item.id] ? 'T' : 'F'
                    });
                }
            });
            flushVocabQueue();
        }

        // 세션 종료
        // =========================================================
        // 3대 메트릭 계산 (§9.1)
        // 1) 첫 시도 정답률: 힌트 없이 맞춘 비율
        // 2) 조건 준수율: (Phase 1에서는 placeholder)
        // 3) arrange 성공률: arrange 계열 정답률
        // =========================================================
        // B-11: Drill metrics (MVP minimal)
        function compute4Metrics(answers) {
            if (!QUIZ_DATA) return null;

            // 문항 풀(questions / exam_prep / procedure_drills) 통합 조회
            const allQuestions = QUIZ_DATA.questions || QUIZ_DATA.exam_prep || [];
            function findQ(id) {
                let q = allQuestions.find(x => x.id === id);
                if (!q && QUIZ_DATA.exam_prep) q = QUIZ_DATA.exam_prep.find(x => x.id === id);
                if (!q && QUIZ_DATA.procedure_drills) q = QUIZ_DATA.procedure_drills.find(x => x.id === id);
                return q || null;
            }

            // Check if this is a drill session
            const isDrillSession = currentMode === 'drill';

            if (currentMode === 'exam_perf') {
                return { mode: 'exam_perf', ...getExamPerfLogFields() };
            }

            if (isDrillSession) {
                // Drill-specific metrics
                const totalCorrect = answers.filter(a => a.correct).length;
                const totalRate = answers.length > 0 ? Math.round((totalCorrect / answers.length) * 100) : 0;
                return {
                    mode: 'drill',
                    drill_stage: getDrillStage(),
                    total_rate: totalRate,
                    sentences_practiced: new Set(answers.map(a => {
                        const q = findQ(a.id);
                        return q ? q.core_sentence_id : null;
                    }).filter(Boolean)).size
                };
            }

            // 첫 시도 정답률 (힌트 미사용 + 정답)
            const noHintCorrect = answers.filter(a => a.correct && !a.hint_used).length;
            const firstAttemptRate = answers.length > 0
                ? Math.round((noHintCorrect / answers.length) * 100) : null;

            // 조건 준수율 (mini_writing 미구현이므로 placeholder)
            const conditionRate = null;

            // arrange 성공률 (arrange 타입 전체)
            const arrangeAnswers = answers.filter(a => a.type === 'arrange');
            const arrangeCorrect = arrangeAnswers.filter(a => a.correct).length;
            const arrangeRate = arrangeAnswers.length > 0
                ? Math.round((arrangeCorrect / arrangeAnswers.length) * 100) : null;

            return {
                first_attempt_rate: firstAttemptRate,
                condition_compliance: conditionRate,
                arrange_success: arrangeRate,
                arrange_count: arrangeAnswers.length
            };
        }

        // =========================================================
        // 오답 재도전 라운드
        // =========================================================
        function startRetryRound() {
            // 재도전 불가능한 타입 (학습/열람 모드)
            const skipTypes = ['flashcard', 'kor_core_sentence', 'passage_guide_picker', 'passage_guide_section',
                'concept_card', 'explanation_method_card', 'reading_journal_guide', 'outline_exercise',
                'math_concept_card', 'procedure_drill', 'mini_writing'];

            // 원본 세션에서 틀린 문항 ID 수집
            const missedIds = new Set(sessionAnswers.filter(a => !a.correct).map(a => a.id));

            // 원본 세션의 question 객체에서 재도전 대상 추출
            const sourceSession = retryMode ? originalSession : currentSession;
            const retryQuestions = sourceSession.filter(q =>
                missedIds.has(q.id) && !skipTypes.includes(q.type)
            );

            if (retryQuestions.length === 0) {
                alert('재도전할 문항이 없습니다.');
                return;
            }

            // 원본 데이터 보존 (첫 재도전 시에만)
            if (!retryMode) {
                originalSessionAnswers = [...sessionAnswers];
                originalSession = [...currentSession];
            }

            retryMode = true;
            sessionAnswers = [];   // 재도전용 새 답안 배열

            // 셔플 후 세션 교체
            shuffleArray(retryQuestions);
            currentSession = retryQuestions;
            currentQuestionIndex = 0;
            sessionStartTime = Date.now();

            // 진도바 제목 변경
            showPage('quiz-page');
            showQuestion();
        }

        async function finishSession() {
            // ========== 재도전 라운드 종료 ==========
            if (retryMode) {
                finishRetryRound();
                return;
            }

            // ========== 일반 세션 종료 ==========
            const totalCorrect = sessionAnswers.filter(a => a.correct).length;
            const percentage = Math.round((totalCorrect / sessionAnswers.length) * 100);

            document.getElementById('result-percentage').textContent = percentage;

            // 틀린 문항 표시 - B-8: Fallback field support
            const missed = sessionAnswers.filter(a => !a.correct).map(a => {
                const q = findQuestionById(a.id);
                return q;
            }).filter(Boolean);

            const retryBtn = document.getElementById('btn-retry');
            const msgEl = document.getElementById('result-kid-message');

            if (missed.length > 0) {
                document.getElementById('missed-questions-container').style.display = 'block';
                const list = document.getElementById('missed-questions-list');
                list.innerHTML = '';
                missed.forEach(q => {
                    const item = document.createElement('div');
                    item.className = 'missed-question-item';
                    const keyword = getWeakLabel(q) || q.prompt_en || q.prompt || q.id;
                    const answer = q.blank_answer || q.answer || (q.choices && q.correct_index != null ? q.choices[q.correct_index] : '') || (q.choices && q.correct != null ? q.choices[q.correct] : '') || (q.options && q.correct != null ? q.options[q.correct] : '') || '';
                    item.innerHTML = `<div class="missed-keyword">${keyword}</div><div class="missed-answer">정답: ${answer}</div>`;
                    list.appendChild(item);
                });

                // 재도전 가능한 문항이 있는지 확인
                const skipTypes = ['flashcard', 'kor_core_sentence', 'passage_guide_picker', 'passage_guide_section',
                    'concept_card', 'explanation_method_card', 'reading_journal_guide', 'outline_exercise',
                    'math_concept_card', 'procedure_drill', 'mini_writing'];
                const retryable = missed.filter(q => !skipTypes.includes(q.type));

                if (retryable.length > 0) {
                    retryBtn.style.display = 'block';
                    retryBtn.textContent = `틀린 문제 다시 풀기 (${retryable.length}문제)`;
                    msgEl.textContent = '틀린 문제를 다시 풀어볼까요?';
                } else {
                    retryBtn.style.display = 'none';
                    msgEl.textContent = '오늘 끝! 내일 또 만나요 👋';
                }
            } else {
                document.getElementById('missed-questions-container').style.display = 'none';
                retryBtn.style.display = 'none';
                msgEl.textContent = '전부 맞혔어요! 대단해요! 🎉';
            }

            // 로그 저장 및 전송
            const weakKeywords = sessionAnswers.filter(a => !a.correct).map(a => {
                const q2 = findQuestionById(a.id);
                return (q2 ? getWeakLabel(q2) : '') || a.keyword || a.id;
            });

            const sessionDuration = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;

            const typeStats = {};
            sessionAnswers.forEach(a => {
                if (!typeStats[a.type]) typeStats[a.type] = { total: 0, correct: 0 };
                typeStats[a.type].total++;
                if (a.correct) typeStats[a.type].correct++;
            });
            const typeBreakdown = Object.entries(typeStats).map(([t, s]) =>
                t + ':' + s.correct + '/' + s.total
            ).join(', ');

            const hintCount = sessionAnswers.filter(a => a.hint_used).length;

            const metrics = compute4Metrics(sessionAnswers);
            const examPerfFields = getExamPerfLogFields();

            // [multi_focus 1차] 평시 다답 모드: 조건읽기실수 컬럼(condition_miss) 재활용.
            // exam_perf 전용 updateExamPerfMetrics는 평시에 미작동 → 세션 답안에서 직접 집계.
            // condition_miss = Σ(정답개수 오독) + Σ(개수는 맞췄으나 반대 polarity 선택).
            // [④4-2] multi_focus는 condition_miss 컬럼을 exam_perf와 공유하지만, GAS calcExamPerfSignals(v15~)가
            //   session_type='exam_perf' 행만 집계하므로 exam_perf 신호는 미오염(②). flip/partial 세분은 details(polMiss=) 진단용 — 합산값 불변.
            let multiFocusConditionMiss = '';
            if (currentMode === 'multi_focus') {
                let sum = 0;
                sessionAnswers.forEach(a => {
                    if (a.count_mismatch) sum++;
                    if (a.likely_polarity_miss) sum++;
                });
                multiFocusConditionMiss = sum;
            }

            const log = {
                lesson: currentLesson || 1,
                subject: currentSubject,
                date: today(),
                session_type: currentSessionMeta ? currentSessionMeta.type : sessionType,
                total: sessionAnswers.length,
                correct: totalCorrect,
                percentage: percentage,
                duration_sec: sessionDuration,
                weak: weakKeywords.join(', '),
                score_group: collectAnswerMeta(sessionAnswers, 'score_group'),
                recovery_band: collectAnswerMeta(sessionAnswers, 'recovery_band'),
                type_breakdown: typeBreakdown,
                hint_count: hintCount,
                metrics: metrics,
                condition_miss: currentMode === 'multi_focus' ? multiFocusConditionMiss : examPerfFields.condition_miss,
                omr_miss: examPerfFields.omr_miss,
                time_complete: examPerfFields.time_complete,
                details: sessionAnswers.map(a => {
                    let s = a.id + (a.correct ? '✓' : '✗') + a.time_sec + 's' + (a.hint_used ? '💡' : '');
                    // [multi_focus 1차] 다답 세부 인코딩: [need2,sel1,hit1,pol=awk,countMiss]
                    if (a.need != null && a.selected_count != null) {
                        const flags = [];
                        if (a.count_mismatch) flags.push('countMiss');
                        if (a.likely_polarity_miss) flags.push('polMiss=' + (a.polarity_miss_level || 'flip'));
                        const polShort = a.polarity === 'awkward' ? 'awk' : (a.polarity === 'correct' ? 'ok' : a.polarity);
                        const polTag = polShort ? ',pol=' + polShort : '';
                        s += '[need' + a.need + ',sel' + a.selected_count + ',hit' + a.correct_hit_count + polTag + (flags.length ? ',' + flags.join(',') : '') + ']';
                    }
                    return s;
                }).join(', '),
                questions: sessionAnswers,
                timestamp: new Date().toISOString(),
                partial: false
            };

            const logsKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            logs.push(log);
            safeSetItem(logsKey, JSON.stringify(logs));

            // Drill stage progression check
            if (currentMode === 'drill') {
                const pct = Math.round((totalCorrect / sessionAnswers.length) * 100);
                const currentStage = getDrillStage();
                if (pct >= 80 && currentStage < 4) {
                    setDrillStage(currentStage + 1);
                }
            }

            updateStats();
            showPage('result-page');
            sendToGoogleSheets();
        }

        // 재도전 라운드 결과 처리
        function finishRetryRound() {
            const retryCorrect = sessionAnswers.filter(a => a.correct).length;
            const retryTotal = sessionAnswers.length;
            const recoveryRate = Math.round((retryCorrect / retryTotal) * 100);

            // 결과 화면 업데이트 — 회복률 중심 표시
            document.getElementById('result-percentage').textContent = recoveryRate;

            const msgEl = document.getElementById('result-kid-message');
            if (recoveryRate === 100) {
                msgEl.textContent = '전부 회복! 완벽해요! 💪';
            } else if (recoveryRate >= 50) {
                msgEl.textContent = `${retryTotal}문제 중 ${retryCorrect}문제 회복! 잘했어요!`;
            } else {
                msgEl.textContent = `${retryCorrect}문제 회복했어요. 다음에 다시 도전!`;
            }

            // 재도전 버튼 숨기기 (더 이상 재도전 없음)
            document.getElementById('btn-retry').style.display = 'none';

            // 틀린 문항 리스트: 회복/미회복 구분
            const missedContainer = document.getElementById('missed-questions-container');
            missedContainer.style.display = 'block';
            const list = document.getElementById('missed-questions-list');
            list.innerHTML = '';

            // 회복률 박스
            const recoveryBox = document.createElement('div');
            recoveryBox.className = 'retry-recovery-box';
            recoveryBox.innerHTML = `
                <div class="retry-recovery-rate">${retryCorrect} / ${retryTotal} 회복</div>
                <div class="retry-recovery-label">재도전 회복률 ${recoveryRate}%</div>
            `;
            list.appendChild(recoveryBox);

            // 개별 문항 결과
            sessionAnswers.forEach(a => {
                const q = findQuestionById(a.id);
                if (!q) return;
                const item = document.createElement('div');
                item.className = 'missed-question-item';
                const keyword = getWeakLabel(q) || q.prompt_en || q.prompt || q.id;
                const status = a.correct ? '✅ 회복' : '❌ 미회복';
                const statusClass = a.correct ? 'retry-item-recovered' : 'retry-item-still-wrong';
                item.innerHTML = `<div class="missed-keyword">${keyword}</div><div class="${statusClass}">${status}</div>`;
                list.appendChild(item);
            });

            // stats-title 변경
            const statsTitle = missedContainer.querySelector('.stats-title');
            if (statsTitle) statsTitle.textContent = '재도전 결과';

            // 로그 저장 (재도전 로그)
            const retryDuration = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
            const retryLog = {
                lesson: currentLesson || 1,
                subject: currentSubject,
                date: today(),
                session_type: 'retry',
                total: retryTotal,
                correct: retryCorrect,
                percentage: recoveryRate,
                duration_sec: retryDuration,
                weak: sessionAnswers.filter(a => !a.correct).map(a => {
                    const q2 = findQuestionById(a.id);
                    return (q2 ? getWeakLabel(q2) : '') || a.keyword || a.id;
                }).join(', '),
                score_group: collectAnswerMeta(sessionAnswers, 'score_group'),
                recovery_band: collectAnswerMeta(sessionAnswers, 'recovery_band'),
                type_breakdown: '',
                hint_count: sessionAnswers.filter(a => a.hint_used).length,
                metrics: null,
                details: sessionAnswers.map(a =>
                    a.id + (a.correct ? '✓(회복)' : '✗') + a.time_sec + 's'
                ).join(', '),
                questions: sessionAnswers,
                timestamp: new Date().toISOString(),
                partial: false,
                retry: true,
                recovery_rate: recoveryRate
            };

            const logsKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            logs.push(retryLog);
            safeSetItem(logsKey, JSON.stringify(logs));

            // 상태 초기화
            retryMode = false;
            originalSessionAnswers = [];
            originalSession = [];

            updateStats();
            showPage('result-page');
            sendToGoogleSheets();
        }

        // 문항 ID로 question 객체 찾기 (모든 과목 대응)
        function findQuestionById(id) {
            if (!QUIZ_DATA) return null;
            // questions 배열 검색 (영어/국어 실전)
            if (QUIZ_DATA.questions) {
                const found = QUIZ_DATA.questions.find(x => x.id === id);
                if (found) return found;
            }
            // exam_prep 배열 (수학)
            if (QUIZ_DATA.exam_prep) {
                const found = QUIZ_DATA.exam_prep.find(x => x.id === id);
                if (found) return found;
            }
            // procedure_drills 배열 (수학)
            if (QUIZ_DATA.procedure_drills) {
                const found = QUIZ_DATA.procedure_drills.find(x => x.id === id);
                if (found) return found;
            }
            // currentSession에서 직접 검색 (최후 수단)
            const sess = retryMode ? originalSession : currentSession;
            if (sess) {
                const found = sess.find(x => x.id === id);
                if (found) return found;
            }
            return null;
        }

        function resolveConceptLabel(id) {
            if (!id || !QUIZ_DATA || !QUIZ_DATA.concept_cards) return id || '';
            const card = QUIZ_DATA.concept_cards.find(c => c && c.id === id);
            return card ? (card.term || card.title || card.concept || id) : id;
        }

        function collectAnswerMeta(answers, key) {
            const seen = new Set();
            (answers || []).forEach(a => {
                const v = a && a[key];
                if (v !== '' && v != null) seen.add(String(v));
            });
            return Array.from(seen).join(', ');
        }

        function getWeakLabel(q) {
            if (!q) return '';
            if (q.keyword) return q.keyword;
            if (q.concept) return q.concept;
            if (Array.isArray(q.linked_concept) && q.linked_concept.length) {
                return q.linked_concept.map(resolveConceptLabel).filter(Boolean).join('/');
            }
            if (q.concept_id) return resolveConceptLabel(q.concept_id);
            if (q.concept_card_id) return resolveConceptLabel(q.concept_card_id);
            if (q.subunit) return q.subunit;
            if (q.passage_group) return q.passage_group;
            if (q.category) return q.category;
            if (q.test_task) return q.test_task;
            if (q.type) return q.type;
            return q.id || '';
        }

        // v132: 동시 송신 차단 mutex (race 중복 방지)
        let _sendInFlight = false;
        let _vocabFlushInFlight = false;

        // Google Sheets 전송
        async function sendToGoogleSheets() {
            if (_sendInFlight) return;  // 동시 호출 차단
            _sendInFlight = true;

            try {
                const webhookUrl = localStorage.getItem('webhook_url');
                if (!webhookUrl) return;
                pruneOldSentLogs(90);

                // 모든 레슨 로그 자동 수집 (L1, L2, L3, ... 무제한)
                const allLogs = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (k === 'quiz_logs' || k.startsWith('quiz_logs_L') || k.startsWith('quiz_logs_kor') || k.startsWith('quiz_logs_math') || k.startsWith('quiz_logs_soc') || k.startsWith('quiz_logs_sci')) {
                        const items = JSON.parse(localStorage.getItem(k) || '[]');
                        items.forEach(log => allLogs.push(log));
                    }
                }
                // timestamp 기준 중복 제거
                const seen = new Set();
                const logs = allLogs.filter(log => {
                    if (seen.has(log.timestamp)) return false;
                    seen.add(log.timestamp);
                    return true;
                });
                const sentKeys = JSON.parse(localStorage.getItem('sent_logs') || '[]');

                // v132: reserve-before-fetch — fetch 발사 직전 sentKeys에 reserve, 실패 시 catch에서 revert
                const fetches = [];
                logs.forEach((log, idx) => {
                    const key = log.timestamp;
                    if (sentKeys.includes(key)) return;

                    // RESERVE IMMEDIATELY (race 방어)
                    sentKeys.push(key);

                    const m = log.metrics || {};
                    const data = {
                        lesson: log.lesson || currentLesson || 1,
                        subject: log.subject || 'english',
                        date: log.date,
                        session_type: log.session_type || '',
                        total: log.total,
                        correct: log.correct,
                        percentage: log.percentage,
                        duration_sec: log.duration_sec || 0,
                        weak: log.weak || '',
                        type_breakdown: log.type_breakdown || '',
                        hint_count: log.hint_count || 0,
                        // 2026-05-14: metrics에서 a_group_recovery 제거됨 → 빈 값 자동 전송 (Apps Script v10 컬럼 호환 유지)
                        a_group_recovery: m.a_group_recovery != null ? m.a_group_recovery : '',
                        first_attempt_rate: m.first_attempt_rate != null ? m.first_attempt_rate : '',
                        arrange_success: m.arrange_success != null ? m.arrange_success : '',
                        details: log.details || '',
                        partial: log.partial ? 'Y' : 'N',
                        retry: log.retry ? 'Y' : 'N',
                        recovery_rate: log.recovery_rate != null ? log.recovery_rate : '',
                        condition_miss: log.condition_miss != null ? log.condition_miss : '',
                        omr_miss: log.omr_miss != null ? log.omr_miss : '',
                        time_complete: log.time_complete || '',
                        score_group: log.score_group || '',
                        recovery_band: log.recovery_band || '',
                        timestamp: log.timestamp
                    };

                    const p = fetch(webhookUrl, {
                        method: 'POST',
                        body: JSON.stringify(data)
                    }).then(async r => {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        const text = await r.text();
                        let body = null;
                        try { body = JSON.parse(text); } catch (_) {}
                        if (body && body.ok === false) throw new Error(body.error || 'apps-script reject');
                        if (body && body.status && body.status !== 'ok') throw new Error(body.error || body.status);
                        compactSentLogEntry(key);
                    }).catch(err => {
                        console.warn('[log-send-fail]', key, err && err.message);
                        // REVERT reservation
                        const i2 = sentKeys.indexOf(key);
                        if (i2 >= 0) sentKeys.splice(i2, 1);
                    });
                    fetches.push(p);
                });

                // 즉시 sentKeys 저장 (reserve 보존 — fetch 중 새로고침돼도 reservation 유지)
                safeSetItem('sent_logs', JSON.stringify(sentKeys));

                // 모든 fetch 완료 후 sentKeys 다시 저장 (revert 반영)
                await Promise.allSettled(fetches);
                safeSetItem('sent_logs', JSON.stringify(sentKeys));
            } finally {
                _sendInFlight = false;
            }
        }

        // 미전송 로그 재전송
        function retransmitUnsentLogs() {
            sendToGoogleSheets();
            flushVocabQueue();
        }

        // 결과 내보내기

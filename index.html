<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>영어 학습</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F5496">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        body {
            overflow: hidden;
        }

        /* 공통 컨테이너 */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
        }

        /* 상단 바 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #2F5496;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(47, 84, 150, 0.15);
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            flex: 1;
            text-align: center;
        }

        /* 페이지별 표시 */
        .page {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* ===== 홈 화면 ===== */
        #home-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .home-title {
            font-size: 28px;
            font-weight: 700;
            color: #2F5496;
            margin-bottom: 10px;
        }

        .today-button {
            width: 85%;
            max-width: 300px;
            padding: 24px 20px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(47, 84, 150, 0.3);
            transition: all 0.3s ease;
        }

        .today-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(47, 84, 150, 0.4);
        }

        .today-button:active {
            transform: translateY(0);
        }

        .button-subtitle {
            display: block;
            font-size: 12px;
            font-weight: 400;
            margin-top: 8px;
            opacity: 0.95;
        }

        /* 학습 현황 카드 */
        .stats-card {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }

        .stats-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #2F5496;
            font-weight: 700;
            font-size: 16px;
        }

        /* ===== 퀴즈 화면 ===== */
        #quiz-page {
            flex-direction: column;
            gap: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .instruction-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 400;
        }

        /* Fill Blank 스타일 */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .choice-btn {
            padding: 14px 12px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .choice-btn:active {
            transform: scale(0.98);
        }

        .choice-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .choice-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        .choice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Arrange 스타일 */
        .arrange-container {
            margin-bottom: 16px;
        }

        .selected-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 2px dashed #ddd;
            min-height: 50px;
            margin-bottom: 12px;
            align-content: flex-start;
        }

        .selected-word {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: #e3f2fd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #90caf9;
        }

        .remove-word-btn {
            background: none;
            border: none;
            color: #2196F3;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }

        .available-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-btn {
            padding: 10px 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .word-btn:active {
            transform: scale(0.98);
        }

        .word-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .word-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .word-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* Match 스타일 */
        .match-options {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .match-option {
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .match-option:active {
            transform: scale(0.98);
        }

        .match-option.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .match-option.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* 컨트롤 버튼 */
        .quiz-controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 16px;
        }

        .btn-quit {
            flex: 1;
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
        }

        .btn-quit:active {
            background-color: #e0e0e0;
        }

        /* ===== 완료 화면 ===== */
        #result-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
            text-align: center;
        }

        .result-label {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        .missed-questions {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow-y: auto;
        }

        .missed-question-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .missed-question-item:last-child {
            border-bottom: none;
        }

        .missed-keyword {
            font-weight: 600;
            color: #F44336;
        }

        .missed-answer {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            flex-direction: column;
        }

        .btn-export {
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-home {
            padding: 14px;
            background-color: #2F5496;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-export:active, .btn-home:active {
            opacity: 0.9;
        }

        /* 다음 문항 버튼 */
        .btn-next {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 3px 10px rgba(47, 84, 150, 0.3);
            display: none;
            transition: all 0.2s ease;
        }

        .btn-next:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 배열형 건너뛰기 버튼 */
        .btn-skip {
            flex: 1;
            padding: 14px;
            background-color: #fff3e0;
            border: 2px solid #ff9800;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #e65100;
        }

        /* 힌트 버튼 */
        .btn-hint {
            flex: 1;
            padding: 14px;
            background-color: #fff8e1;
            border: 2px solid #ffc107;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #f57f17;
        }

        /* 결과 화면 - 아이용 섹션 */
        .result-kid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-emoji {
            font-size: 64px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
        }

        .result-kid-message {
            font-size: 20px;
            font-weight: 600;
            color: #2F5496;
            text-align: center;
        }

        /* 결과 화면 - 부모용 섹션 */
        .result-parent-section {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-parent-toggle {
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            text-align: center;
        }

        /* 웹훅 설정 */
        .webhook-settings {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }
        
        /* Lesson Selector */
        .settings-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #e9ecef;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .setting-row + .setting-row {
            border-top: 1px solid #e9ecef;
            margin-top: 8px;
            padding-top: 12px;
        }
        .setting-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            min-width: 60px;
        }
        .lesson-selector {
            display: flex;
            gap: 8px;
        }
        .lesson-btn {
            padding: 8px 18px;
            border: 2px solid #2F5496;
            border-radius: 20px;
            background: white;
            color: #2F5496;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lesson-btn.active {
            background: #2F5496;
            color: white;
        }
        .count-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .count-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #2F5496;
            border-radius: 50%;
            background: white;
            color: #2F5496;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .count-btn:active {
            background: #2F5496;
            color: white;
        }
        .count-display {
            font-size: 20px;
            font-weight: 700;
            color: #2F5496;
            min-width: 36px;
            text-align: center;
        }
</style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">영어 Lesson 1</div>
            <button id="mute-toggle" onclick="toggleMute()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px 8px;">🔊</button>
        </div>

        <!-- 홈 화면 -->
        <div id="home-page" class="page active">
            <div class="home-title">오늘의 학습</div>

            <div class="settings-card">
                <div class="setting-row">
                    <span class="setting-label">단원</span>
                    <div class="lesson-selector">
                        <button class="lesson-btn active" id="lesson-btn-1" onclick="selectLesson(1)">1단원</button>
                        <button class="lesson-btn" id="lesson-btn-2" onclick="selectLesson(2)">2단원</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">문제 수</span>
                    <div class="count-selector">
                        <button class="count-btn" onclick="adjustCount(-5)">−</button>
                        <span class="count-display" id="count-display">20</span>
                        <button class="count-btn" onclick="adjustCount(5)">+</button>
                    </div>
                </div>
            </div>

            <button class="today-button" onclick="startSession()">
                오늘의 학습 시작
                <span class="button-subtitle" id="session-subtitle">20문항 · 약 15분</span>
            </button>

            <div class="stats-card">
                <div class="stats-title">학습 현황</div>
                <div class="stat-row">
                    <span class="stat-label">총 학습일수</span>
                    <span class="stat-value"><span id="stat-days">0</span>일</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">전체 정답률</span>
                    <span class="stat-value"><span id="stat-accuracy">0</span>%</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">마스터한 문항</span>
                    <span class="stat-value"><span id="stat-mastered">0</span>/<span id="stat-total-q">80</span></span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">복습 필요</span>
                    <span class="stat-value"><span id="stat-review">0</span>개</span>
                </div>
            </div>

            <div id="webhook-settings-toggle" style="font-size:12px;color:#999;cursor:pointer;text-align:center;" onclick="document.getElementById('webhook-settings').style.display='block';this.style.display='none';">⚙️ 설정</div>
            <div class="webhook-settings" id="webhook-settings" style="display:none;">
                <div class="stats-title">설정</div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">Google Sheets 웹훅 URL</label>
                <input type="url" id="webhook-input" placeholder="https://script.google.com/..."
                       style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;" />
                <button onclick="saveWebhookUrl()" style="margin-top:8px;padding:8px 16px;background:#2F5496;color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer;">저장</button>
                <button onclick="document.getElementById('webhook-settings').style.display='none';document.getElementById('webhook-settings-toggle').style.display='block';" style="margin-top:8px;margin-left:4px;padding:8px 16px;background:#f0f0f0;border:1px solid #ddd;border-radius:6px;font-size:13px;cursor:pointer;color:#666;">닫기</button>
                <div id="webhook-status" style="font-size:11px;color:#4CAF50;margin-top:4px;"></div>
            </div>
        </div>

        <!-- 퀴즈 화면 -->
        <div id="quiz-page" class="page">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="question-number" id="question-number">1 / 12</div>

            <div class="instruction-text" id="instruction-text">빈칸에 알맞은 단어를 고르세요.</div>
            <div class="question-text" id="question-text"></div>

            <!-- Fill Blank -->
            <div id="fill-blank-container" class="choices-grid" style="display: none;"></div>

            <!-- Arrange -->
            <div id="arrange-container" class="arrange-container" style="display: none;">
                <div class="selected-words" id="selected-words"></div>
                <div class="available-words" id="available-words"></div>
            </div>

            <!-- Match -->
            <div id="match-container" class="match-options" style="display: none;"></div>

            <div id="hint-display" style="display:none;background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;font-size:13px;color:#795548;margin-top:8px;"></div>
            <button class="btn-next" id="btn-next" onclick="goNextQuestion()">다음 문항 ▶</button>
            <div class="quiz-controls" id="quiz-controls">
                <button class="btn-hint" id="btn-hint" onclick="showHint()">💡 힌트</button>
                <button class="btn-quit" onclick="quitQuiz()">그만하기</button>
                <button class="btn-skip" id="btn-skip" onclick="skipArrange()" style="display:none;">건너뛰기</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-page" class="page">
            <!-- 아이용 전면 -->
            <div class="result-kid-section">
                <div class="result-emoji">🎉</div>
                <div class="result-score"><span id="result-percentage">0</span>%</div>
                <div class="result-kid-message">오늘 끝! 내일 또 만나요 👋</div>
                <button class="btn-home" onclick="goHome()">홈으로</button>
            </div>

            <!-- 부모용 하단 -->
            <div class="result-parent-section">
                <button class="result-parent-toggle" onclick="toggleParentSection()">▼ 상세 결과 보기 (부모용)</button>
                <div id="parent-detail" style="display:none;">
                    <div class="missed-questions" id="missed-questions-container" style="display: none;">
                        <div class="stats-title">틀린 문항</div>
                        <div id="missed-questions-list"></div>
                    </div>
                    <button class="btn-export" onclick="exportResults()">학습 결과 내보내기</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수
        let isMuted = localStorage.getItem('sound_muted') === 'true';
        let arrangeCheckInterval = null;
        let hintUsedThisQuestion = false;
        let sessionSize = parseInt(localStorage.getItem('session_size') || '20');

        // 문제 수 조절
        function adjustCount(delta) {
            const maxQ = QUIZ_DATA ? QUIZ_DATA.questions.length : 80;
            sessionSize = Math.max(5, Math.min(maxQ, sessionSize + delta));
            document.getElementById('count-display').textContent = sessionSize;
            localStorage.setItem('session_size', sessionSize);
            updateSubtitle();
        }

        function updateSubtitle() {
            const mins = Math.round(sessionSize * 0.75);
            document.getElementById('session-subtitle').textContent = sessionSize + '문항 · 약 ' + mins + '분';
        }

        // Sound effects
        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('sound_muted', isMuted);
            document.getElementById('mute-toggle').textContent = isMuted ? '🔇' : '🔊';
        }

        function playSound(type) {
            if (isMuted) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const gain = ctx.createGain();
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    // 정답: 도→미→솔 밝은 3음 상승 멜로디
                    gain.gain.value = 0.25;
                    const notes = [523, 659, 784]; // C5, E5, G5
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        osc.connect(gain);
                        osc.start(ctx.currentTime + i * 0.12);
                        osc.stop(ctx.currentTime + i * 0.12 + 0.15);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                } else {
                    // 오답: 낮은 2음 하강 버저 (뚜뚜)
                    gain.gain.value = 0.2;
                    const notes = [311, 233]; // Eb4, Bb3
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        osc.connect(gain);
                        osc.start(ctx.currentTime + i * 0.2);
                        osc.stop(ctx.currentTime + i * 0.2 + 0.18);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                }
            } catch(e) {}
        }

        // 학습 현황 업데이트
        function updateStats() {
            const logsKey = currentLesson ? `quiz_logs_L${currentLesson}` : 'quiz_logs';
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            const uniqueDays = new Set(logs.map(log => log.date)).size;

            const totalAttempts = Object.values(questionHistory).reduce((sum, q) => sum + (q.attempts || 0), 0);
            const totalCorrect = Object.values(questionHistory).reduce((sum, q) => sum + (q.correct || 0), 0);
            const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;

            const mastered = Object.keys(questionHistory).filter(id => {
                const q = questionHistory[id];
                return q.correct >= 3 && q.last_correct === true;
            }).length;

            const review = Object.keys(questionHistory).filter(id => {
                const q = questionHistory[id];
                return q.attempts > 0 && q.last_correct === false;
            }).length;

            document.getElementById('stat-days').textContent = uniqueDays;
            document.getElementById('stat-accuracy').textContent = accuracy;
            document.getElementById('stat-mastered').textContent = mastered;
            if (QUIZ_DATA) document.getElementById('stat-total-q').textContent = QUIZ_DATA.questions.length;
            document.getElementById('stat-review').textContent = review;

        // 자동 세션 생성 알고리즘 v2
        // 원칙: 매 세션마다 다양한 문항이 나오도록
        function generateSession() {
            const SESSION_SIZE = sessionSize;
            const questions = QUIZ_DATA.questions;
            const todayStr = today();

            // 4개 풀로 분류
            const pools = { wrong: [], newQ: [], review: [], mastered: [] };
            questions.forEach(q => {
                const h = questionHistory[q.id];
                if (!h) {
                    pools.newQ.push(q);
                } else if (h.correct >= 3 && h.last_correct) {
                    pools.mastered.push(q); // 3회 이상 정답 + 마지막도 정답 → 마스터
                } else if (h.last_correct === false) {
                    pools.wrong.push(q);
                } else {
                    pools.review.push(q); // 맞춘 적 있지만 아직 마스터 아님
                }
            });

            // 각 풀 내에서 셔플 (매번 다른 문항이 선택되도록!)
            Object.values(pools).forEach(p => shuffleArray(p));

            // 오답 풀: 오늘 이미 틀린 건 우선도 낮춤 (뒤로 보냄)
            pools.wrong.sort((a, b) => {
                const ha = questionHistory[a.id], hb = questionHistory[b.id];
                const aToday = ha && ha.last_seen === todayStr ? 1 : 0;
                const bToday = hb && hb.last_seen === todayStr ? 1 : 0;
                return aToday - bToday; // 오늘 안 한 것 우선
            });

            // 배분: 오답 4 + 새문항 8 + 복습 6 + 마스터 2 (가용한 만큼)
            const selected = [];
            const pick = (pool, count) => {
                const ids = new Set(selected.map(q => q.id));
                let picked = 0;
                for (const q of pool) {
                    if (picked >= count) break;
                    if (!ids.has(q.id)) { selected.push(q); picked++; }
                }
            };

            pick(pools.wrong, 4);
            pick(pools.newQ, 8);
            pick(pools.review, 6);
            pick(pools.mastered, 2);

            // 부족하면 나머지 풀에서 채움
            if (selected.length < SESSION_SIZE) pick(pools.newQ, SESSION_SIZE);
            if (selected.length < SESSION_SIZE) pick(pools.review, SESSION_SIZE);
            if (selected.length < SESSION_SIZE) pick(pools.wrong, SESSION_SIZE);
            if (selected.length < SESSION_SIZE) pick(pools.mastered, SESSION_SIZE);

            shuffleArray(selected);
            return selected.slice(0, SESSION_SIZE).map(q => ({ ...q, poolIdx: questions.indexOf(q) }));
        }

        // 정규화 함수: arrange 정답 비교 시 구두점 차이 무시
        function normalizeAnswer(str) {

                .replace(/[.,!?;:]/g, '')   // 모든 구두점 제거
                .replace(/\s+/g, ' ')       // 연속 공백 → 단일 공백
                .trim();

        // 공통 선택형 답변 처리 (fill_blank / dialogue_response / short_reading)
        function handleChoiceAnswer(q, selectedIdx, correctIdx, originalIdx) {
            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            const userChoice = buttons[selectedIdx] ? buttons[selectedIdx].textContent : '';
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });

            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);

            if (!isCorrect) {
                showWrongExplanation(q, document.getElementById('fill-blank-container'), userChoice, originalIdx);
            }

            showNextButton();
        }

        function handleFillBlankAnswer(q, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            const userChoice = buttons[selectedIdx] ? buttons[selectedIdx].textContent : '';
            buttons.forEach((btn, idx) => {
                btn.disabled = true;

        // Arrange 유형
        function showArrange(q) {
            document.getElementById('question-text').textContent = q.sentence_ko;
            const container = document.getElementById('arrange-container');
            container.style.display = 'block';

            const selected = [];
            const shuffled = [...q.words];
            shuffleArray(shuffled);

            const selectedDiv = document.getElementById('selected-words');
            const availableDiv = document.getElementById('available-words');
            selectedDiv.innerHTML = '';
            availableDiv.innerHTML = '';

            shuffled.forEach((word, idx) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.dataset.word = word;
                btn.dataset.idx = idx;
                btn.onclick = () => {
                    if (!btn.classList.contains('used')) {
                        selected.push({ word, idx });
                        btn.classList.add('used');
                        updateSelectedWords();
                    }
                };
                availableDiv.appendChild(btn);
            });

            function updateSelectedWords() {
                selectedDiv.innerHTML = '';
                selected.forEach((item, selIdx) => {
                    const tag = document.createElement('div');
                    tag.className = 'selected-word';
                    tag.textContent = item.word;
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-word-btn';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = () => {
                        selected.splice(selIdx, 1);
                        document.querySelector(`[data-word="${item.word}"][data-idx="${item.idx}"]`).classList.remove('used');
                        updateSelectedWords();
                    };
                    tag.appendChild(removeBtn);
                    selectedDiv.appendChild(tag);
                });
            }

            // 모든 단어를 배치하면 자동 채점
            const checkArrange = setInterval(() => {
                if (selected.length === q.words.length) {
                    clearInterval(checkArrange);
                    const userAnswer = selected.map(x => x.word).join(' ');
                    const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(q.answer);

                    const buttons = document.querySelectorAll('#available-words .word-btn');
                    buttons.forEach((btn, idx) => {
                        if (!btn.classList.contains('used')) return;
                        if (isCorrect) btn.classList.add('correct');
                        else btn.classList.add('incorrect');
                        btn.disabled = true;
                    });

                    // 제거 버튼 비활성화
                    document.querySelectorAll('.remove-word-btn').forEach(b => b.disabled = true);

                    recordAnswer(q, isCorrect);

                    // 오답 시 정답 + 설명 표시
                    if (!isCorrect) {
                        showWrongExplanation(q, container, userAnswer);
                    }

                    document.getElementById('btn-skip').style.display = 'none';
                    showNextButton();
                }
            }, 100);
        }

        function handleMatchAnswer(q, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll('#match-container .match-option');

            buttons.forEach((btn, idx) => {

        // 오답 시 이해 도움 설명 (정답을 직접 말하지 않고 이해를 유도)
        function showWrongExplanation(q, afterEl, userAnswer, originalIdx) {
            const box = document.createElement('div');
            box.className = 'wrong-explanation';
            box.style.cssText = 'background:linear-gradient(135deg,#fff8e1,#fff3e0);border-left:4px solid #FF9800;border-radius:0 10px 10px 0;padding:14px 16px;margin-top:12px;font-size:15px;color:#333;line-height:1.8;';

            const we = q.wrong_explanations || {};
            let html = '<div style="font-weight:700;color:#e65100;margin-bottom:8px;font-size:16px;">🎓 선생님 설명</div>';

            // 설명 조회: 텍스트 키 → 숫자 인덱스 키 → hint 순으로 시도
            function findExplanation(answer, idx) {
                return we[answer] || we[String(idx)] || q.hint || '';
            }

            if (q.type === 'fill_blank' || q.type === 'dialogue_response' || q.type === 'short_reading') {
                const explanation = findExplanation(userAnswer, originalIdx);
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
            } else if (q.type === 'arrange') {
                const explanation = we['default'] || q.hint || '';
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
            } else if (q.type === 'match') {
                const explanation = findExplanation(userAnswer, originalIdx);
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
            }

            html += '<div style="font-size:13px;color:#888;margin-top:8px;border-top:1px solid #ffe0b2;padding-top:6px;">📖 정답 문장을 소리 내어 읽어보면 기억에 남아요!</div>';

            box.innerHTML = html;
            afterEl.after(box);
        }

        // TTS: 정답 시 영어 문장 읽어주기
        function speakEnglish(text) {
            if (isMuted || !window.speechSynthesis) return;
            // 이전 발화 중단
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.85;  // 약간 느리게 (학습용)
            utter.pitch = 1.0;
            // 영어 음성 선택 (가능하면)
            const voices = speechSynthesis.getVoices();
            const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female'))
                         || voices.find(v => v.lang.startsWith('en'));
            if (enVoice) utter.voice = enVoice;
            speechSynthesis.speak(utter);
        }

        // 정답 문장 추출 (유형별)
        function getCorrectSentence(q) {
            if (q.type === 'arrange') return q.answer;
            if (q.type === 'match') return q.choices[q.correct];
            // dialogue_response: 정답 선택지 읽어주기
            if (q.type === 'dialogue_response') return q.blank_answer || q.choices[q.correct];
            // short_reading: 정답 선택지 읽어주기
            if (q.type === 'short_reading') return q.blank_answer || q.choices[q.correct];
            // fill_blank: 빈칸에 정답을 채운 완성 문장
            if (q.sentence && q.blank_answer) {
                return q.sentence.replace('_____', q.blank_answer);
            }
            return q.blank_answer || q.answer || '';
        }

        // 답변 기록
        function recordAnswer(q, isCorrect) {
            playSound(isCorrect ? 'correct' : 'incorrect');
            // 정답이면 0.5초 후 문장 읽어주기 (효과음 끝난 뒤)
            if (isCorrect) {
                setTimeout(() => speakEnglish(getCorrectSentence(q)), 500);
            }
            const elapsed = questionStartTime ? Math.round((Date.now() - questionStartTime) / 1000) : 0;
            sessionAnswers.push({
                id: q.id,
                correct: isCorrect,
                type: q.type,
                difficulty: q.difficulty,
                keyword: q.keyword,
                time_sec: elapsed,
                hint_used: hintUsedThisQuestion
            });

            if (!questionHistory[q.id]) {
                questionHistory[q.id] = { attempts: 0, correct: 0, last_seen: today(), last_correct: false };
            }

            const hist = questionHistory[q.id];
            hist.attempts = (hist.attempts || 0) + 1;
            if (isCorrect) hist.correct = (hist.correct || 0) + 1;
            hist.last_seen = today();
            hist.last_correct = isCorrect;

            saveQuestionHistory();
        }

        // 세션 종료
        async function finishSession() {
            const totalCorrect = sessionAnswers.filter(a => a.correct).length;
            const percentage = Math.round((totalCorrect / sessionAnswers.length) * 100);

            document.getElementById('result-percentage').textContent = percentage;

            // 틀린 문항 표시
            const missed = sessionAnswers.filter(a => !a.correct).map(a => {
                const q = QUIZ_DATA.questions.find(x => x.id === a.id);
                return q;
            });

            if (missed.length > 0) {
                document.getElementById('missed-questions-container').style.display = 'block';
                const list = document.getElementById('missed-questions-list');
                list.innerHTML = '';
                missed.forEach(q => {
                    const item = document.createElement('div');
                    item.className = 'missed-question-item';
                    item.innerHTML = `<div class="missed-keyword">${q.keyword}</div><div class="missed-answer">정답: ${q.blank_answer || q.answer || (q.choices ? q.choices[q.correct] : '')}</div>`;
                    list.appendChild(item);
                });
            } else {
                document.getElementById('missed-questions-container').style.display = 'none';
            }

            // 로그 저장 및 전송
            const weakKeywords = sessionAnswers.filter(a => !a.correct).map(a => {
                const q2 = QUIZ_DATA.questions.find(x => x.id === a.id);
                return q2 ? q2.keyword : a.id;
            });

            const sessionDuration = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;

            // 유형별 통계
            const typeStats = {};
            sessionAnswers.forEach(a => {
                if (!typeStats[a.type]) typeStats[a.type] = { total: 0, correct: 0 };
                typeStats[a.type].total++;
                if (a.correct) typeStats[a.type].correct++;
            });
            const typeBreakdown = Object.entries(typeStats).map(([t, s]) =>
                t + ':' + s.correct + '/' + s.total
            ).join(', ');

            const hintCount = sessionAnswers.filter(a => a.hint_used).length;

            const log = {
                lesson: currentLesson || 1,
                date: today(),
                total: sessionAnswers.length,
                correct: totalCorrect,
                percentage: percentage,
                duration_sec: sessionDuration,
                weak: weakKeywords.join(', '),
                type_breakdown: typeBreakdown,
                hint_count: hintCount,
                details: sessionAnswers.map(a =>
                    a.id + (a.correct ? '✓' : '✗') + a.time_sec + 's' + (a.hint_used ? '💡' : '')
                ).join(', '),
                questions: sessionAnswers,
                timestamp: new Date().toISOString(),
                partial: false
            };

            const logs = JSON.parse(localStorage.getItem(`quiz_logs_L${currentLesson}`) || '[]');
            logs.push(log);
            localStorage.setItem(`quiz_logs_L${currentLesson}`, JSON.stringify(logs));

            updateStats();
            showPage('result-page');
            sendToGoogleSheets();
        }

        // Google Sheets 전송
        async function sendToGoogleSheets() {
            const webhookUrl = localStorage.getItem('webhook_url');
            if (!webhookUrl) return;

            const logs = JSON.parse(localStorage.getItem('quiz_logs') || '[]');
            const sentKeys = JSON.parse(localStorage.getItem('sent_logs') || '[]');

            logs.forEach((log, idx) => {
                const key = log.timestamp;
                if (sentKeys.includes(key)) return;

                const data = {
                    lesson: log.lesson || currentLesson || 1,
                    date: log.date,
                    total: log.total,
                    correct: log.correct,
                    percentage: log.percentage,
                    duration_sec: log.duration_sec || 0,
                    weak: log.weak || '',
                    type_breakdown: log.type_breakdown || '',
                    hint_count: log.hint_count || 0,
                    details: log.details || '',
                    partial: log.partial ? 'Y' : 'N',
                    timestamp: log.timestamp
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    body: JSON.stringify(data)
                }).then(() => {
                    sentKeys.push(key);
                    localStorage.setItem(unsentLogsKey, JSON.stringify(sentKeys));
                }).catch(() => {});
            });
        }

        // 미전송 로그 재전송
        function retransmitUnsentLogs() {
            sendToGoogleSheets();
        }

        // 결과 내보내기
        function exportResults() {
            const text = `[${today()}] 영어 Lesson 1 학습 결과\n정답률: ${document.getElementById('result-percentage').textContent}%\n\n틀린 문항:\n${Array.from(document.querySelectorAll('.missed-question-item')).map(el => el.textContent).join('\n')}`;

            if (navigator.share) {
                navigator.share({ title: '학습 결과', text });
            } else {
                navigator.clipboard.writeText(text);
                alert('결과가 클립보드에 복사되었습니다.');
            }
        }

        // 홈으로
        function goHome() {
            currentSession = null;
            currentQuestionIndex = 0;
            sessionAnswers = [];
            showPage('home-page');
            updateStats();
        }

        // 그만하기
        function quitQuiz() {
            if (confirm('학습을 중단하겠습니까?')) {
                // 지금까지 푼 문항의 이력은 이미 recordAnswer에서 저장됨
                // 로그도 부분 저장
                if (sessionAnswers.length > 0) {
                    const totalCorrect = sessionAnswers.filter(a => a.correct).length;
                    const log = {
                        lesson: currentLesson || 1,
                        date: today(),
                        total: sessionAnswers.length,
                        correct: totalCorrect,
                        percentage: Math.round((totalCorrect / sessionAnswers.length) * 100),
                        questions: sessionAnswers,
                        timestamp: new Date().toISOString(),
                        partial: true
                    };
                    const logs = JSON.parse(localStorage.getItem('quiz_logs') || '[]');
                    logs.push(log);
                    localStorage.setItem('quiz_logs', JSON.stringify(logs));
                }
                // arrange interval 정리
                if (arrangeCheckInterval) {
                    clearInterval(arrangeCheckInterval);
                    arrangeCheckInterval = null;
                }
                document.getElementById('btn-skip').style.display = 'none';
                goHome();
            }
        }

        // 페이지 전환
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 유틸리티
        function today() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // 앱 시작
        window.addEventListener('load', init);
    </script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>학습</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F5496">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        body {
            overflow: hidden;
        }

        /* 공통 컨테이너 */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
        }

        /* 상단 바 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #2F5496;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(47, 84, 150, 0.15);
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            flex: 1;
            text-align: center;
        }

        /* 페이지별 표시 */
        .page {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* ===== 홈 화면 ===== */
        #home-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .home-title {
            font-size: 28px;
            font-weight: 700;
            color: #2F5496;
            margin-bottom: 10px;
        }

        .today-button {
            width: 85%;
            max-width: 300px;
            padding: 24px 20px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(47, 84, 150, 0.3);
            transition: all 0.3s ease;
        }

        .today-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(47, 84, 150, 0.4);
        }

        .today-button:active {
            transform: translateY(0);
        }

        .button-subtitle {
            display: block;
            font-size: 12px;
            font-weight: 400;
            margin-top: 8px;
            opacity: 0.95;
        }

        /* 학습 현황 카드 */
        .stats-card {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }

        .stats-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #2F5496;
            font-weight: 700;
            font-size: 16px;
        }

        /* ===== 퀴즈 화면 ===== */
        #quiz-page {
            flex-direction: column;
            gap: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 16px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .instruction-text {
            font-size: 15px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 400;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Fill Blank 스타일 */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .choice-btn {
            padding: 14px 12px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .choice-btn:active {
            transform: scale(0.98);
        }

        .choice-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .choice-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        .choice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Arrange 스타일 */
        .arrange-container {
            margin-bottom: 16px;
        }

        .selected-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 2px dashed #ddd;
            min-height: 50px;
            margin-bottom: 12px;
            align-content: flex-start;
        }

        .selected-word {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: #e3f2fd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #90caf9;
        }

        .remove-word-btn {
            background: none;
            border: none;
            color: #2196F3;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }

        .available-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-btn {
            padding: 10px 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .word-btn:active {
            transform: scale(0.98);
        }

        .word-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .word-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .word-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* Match 스타일 */
        .match-options {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .match-option {
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .match-option:active {
            transform: scale(0.98);
        }

        .match-option.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .match-option.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* 컨트롤 버튼 */
        .quiz-controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 16px;
        }

        .btn-quit {
            flex: 1;
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
        }

        .btn-quit:active {
            background-color: #e0e0e0;
        }

        /* ===== 완료 화면 ===== */
        #result-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
            text-align: center;
        }

        .result-label {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        .missed-questions {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow-y: auto;
        }

        .missed-question-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .missed-question-item:last-child {
            border-bottom: none;
        }

        .missed-keyword {
            font-weight: 600;
            color: #F44336;
        }

        .missed-answer {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            flex-direction: column;
        }

        .btn-export {
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-home {
            padding: 14px;
            background-color: #2F5496;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-retry {
            padding: 14px;
            background-color: #E65100;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
            animation: retryPulse 2s ease-in-out 1;
        }

        @keyframes retryPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .retry-recovery-box {
            background: #FFF3E0;
            border: 2px solid #E65100;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            text-align: center;
        }

        .retry-recovery-rate {
            font-size: 28px;
            font-weight: 700;
            color: #E65100;
        }

        .retry-recovery-label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }

        .retry-item-recovered {
            color: #2E7D32;
            font-weight: 600;
        }

        .retry-item-still-wrong {
            color: #C62828;
        }

        .btn-export:active, .btn-home:active, .btn-retry:active {
            opacity: 0.9;
        }

        /* 다음 문항 버튼 */
        .btn-next {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            box-shadow: 0 3px 10px rgba(47, 84, 150, 0.3);
            display: none;
            transition: all 0.2s ease;
        }

        .btn-next:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* 배열형 건너뛰기 버튼 */
        .btn-skip {
            flex: 1;
            padding: 14px;
            background-color: #fff3e0;
            border: 2px solid #ff9800;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #e65100;
        }

        /* 힌트 버튼 */
        .btn-hint {
            flex: 1;
            padding: 14px;
            background-color: #fff8e1;
            border: 2px solid #ffc107;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #f57f17;
        }

        /* 결과 화면 - 아이용 섹션 */
        .result-kid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-emoji {
            font-size: 64px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
        }

        .result-kid-message {
            font-size: 20px;
            font-weight: 600;
            color: #2F5496;
            text-align: center;
        }

        /* 결과 화면 - 부모용 섹션 */
        .result-parent-section {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-parent-toggle {
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            text-align: center;
        }

        /* 웹훅 설정 */
        .webhook-settings {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }
        
        /* position_ask: 단어 위치 표시 */
        .position-sentence {
            font-size: 18px;
            font-weight: 600;
            color: #2F5496;
            text-align: center;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 10px;
            margin-bottom: 12px;
            line-height: 1.8;
        }
        .position-sentence .word-token {
            display: inline-block;
            padding: 4px 6px;
            margin: 2px;
            border-bottom: 2px solid #ccc;
            font-family: monospace;
        }
        .position-sentence .word-number {
            display: block;
            font-size: 10px;
            color: #999;
            text-align: center;
            font-weight: 400;
        }

        /* mini_writing: 서술형 입력 */
        .writing-container {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .writing-condition {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #333;
        }
        .writing-condition strong {
            color: #e65100;
        }
        .writing-input {
            width: 100%;
            min-height: 60px;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: system-ui, -apple-system, sans-serif;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .writing-input:focus {
            outline: none;
            border-color: #2F5496;
        }
        .writing-submit-btn {
            padding: 14px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .writing-feedback {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        .writing-feedback.pass {
            background: #e8f5e9;
            border: 1px solid #4CAF50;
            color: #2e7d32;
        }
        .writing-feedback.fail {
            background: #fce4ec;
            border: 1px solid #f44336;
            color: #c62828;
        }

        /* Lesson Selector */
        .settings-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #e9ecef;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }
        .setting-row + .setting-row {
            border-top: 1px solid #e9ecef;
            margin-top: 8px;
            padding-top: 12px;
        }
        .setting-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            min-width: 60px;
        }
        .lesson-selector {
            display: flex;
            gap: 8px;
        }
        .lesson-btn {
            padding: 8px 16px;
            min-width: 40px;
            border: 2px solid #2F5496;
            border-radius: 20px;
            background: white;
            color: #2F5496;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lesson-btn.active {
            background: #2F5496;
            color: white;
        }
        .count-selector {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .count-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #2F5496;
            border-radius: 50%;
            background: white;
            color: #2F5496;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .count-btn:active {
            background: #2F5496;
            color: white;
        }
        .session-type-selector {
            display: flex;
            gap: 8px;
            flex: 1;
        }
        .session-type-btn {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #2F5496;
            border-radius: 20px;
            background: white;
            color: #2F5496;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.3;
        }
        .session-type-btn.active {
            background: #2F5496;
            color: white;
        }
        .session-type-btn .type-desc {
            display: block;
            font-size: 10px;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 2px;
        }
        .count-display {
            font-size: 20px;
            font-weight: 700;
            color: #2F5496;
            min-width: 36px;
            text-align: center;
        }

        /* Flashcard — Quizlet-style flip */
        .flashcard-scene {
            perspective: 800px;
            min-height: 180px;
            cursor: pointer;
        }
        .flashcard {
            position: relative;
            width: 100%;
            min-height: 180px;
            transform-style: preserve-3d;
            transition: transform 0.25s ease;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-face {
            position: absolute;
            width: 100%;
            min-height: 180px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: white;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            box-sizing: border-box;
        }
        .flashcard-front { font-size: 20px; font-weight: 600; color: #2F5496; line-height: 1.6; text-align: center; }
        .flashcard-back {
            transform: rotateY(180deg);
            font-size: 18px; color: #333; line-height: 1.6; text-align: center;
        }
        .flashcard-back .grammar-note { font-size: 14px; color: #e65100; background: #fff3e0; padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
        .flashcard-tap-hint { font-size: 13px; color: #999; margin-top: 12px; }
        #vocab-hint-display { background: #e3f2fd; border: 1px solid #90caf9; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #1565c0; margin-top: 8px; }
        .flashcard-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .flashcard-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .flashcard-btn.know { background: #e8f5e9; color: #2e7d32; }
        .flashcard-btn.dont-know { background: #fce4ec; color: #c62828; }

        /* Vocab Drill */
        .vocab-word { font-size: 32px; font-weight: 700; color: #2F5496; }
        .vocab-meaning { font-size: 22px; font-weight: 600; color: #333; }
        .vocab-pos { font-size: 14px; color: #888; margin-top: 8px; }
        .vocab-example { font-size: 13px; color: #666; margin-top: 10px; line-height: 1.5; font-style: italic; }
        .vocab-highlight { background: #FFF3B0; color: #333; padding: 1px 3px; border-radius: 3px; font-style: normal; font-weight: 600; }
        .vocab-progress-bar { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
        .vocab-progress-fill { height: 100%; background: #4CAF50; border-radius: 3px; transition: width 0.3s; }
        .vocab-counter { font-size: 13px; color: #888; text-align: center; margin-bottom: 8px; }
        .vocab-round-msg { text-align: center; padding: 20px; }
        .vocab-round-msg h3 { font-size: 20px; color: #2F5496; margin-bottom: 12px; }
        .vocab-round-msg p { font-size: 15px; color: #666; margin-bottom: 20px; }
        .vocab-result-summary { text-align: center; padding: 24px 16px; }
        .vocab-result-summary h2 { font-size: 24px; color: #2F5496; margin-bottom: 16px; }

    <script>
        // 전역 변수
        let isMuted = localStorage.getItem('sound_muted') === 'true';
        let arrangeCheckInterval = null;
        let hintUsedThisQuestion = false;
        let sessionType = localStorage.getItem('session_type') || 'A';
        let currentSubject = 'english'; // 'english' | 'korean'

        // 세션 타입 선택 (하위호환 — 로그에 기록용으로 유지)
        function selectSessionType(type) {
            sessionType = type;
            localStorage.setItem('session_type', type);
        }

        // 고부하 문항 타입 (§7.4 Rule 4: 2개 연속 금지)
        const HIGH_LOAD_TASKS = new Set(['anchor_arrange', 'chunk_arrange', 'mini_rebuild', 'mini_writing']);

        function updateSubtitle() {
            // 버튼 제거됨 — 모드 선택 시 바로 시작하므로 subtitle info만 업데이트
            const el = document.getElementById('session-subtitle-info');
            if (!el) return;
            if (currentMode === 'vocab') {
                const count = (QUIZ_DATA && QUIZ_DATA.vocab_drill) ? QUIZ_DATA.vocab_drill.length : 0;
                el.textContent = count + '단어 · 약 5분';
            } else if (currentMode === 'math_concept') {
                const count = (QUIZ_DATA && QUIZ_DATA.concept_cards) ? QUIZ_DATA.concept_cards.length : 0;
                el.textContent = count + '개 카드 · 약 5분';
            } else if (currentMode === 'math_procedure') {
                const count = (QUIZ_DATA && QUIZ_DATA.procedure_drills) ? QUIZ_DATA.procedure_drills.length : 0;
                el.textContent = count + '문제 · 약 10분';
            } else if (currentMode === 'social_concept' || currentMode === 'science_concept') {
                const count = (QUIZ_DATA && QUIZ_DATA.concept_cards) ? QUIZ_DATA.concept_cards.length : 0;
                el.textContent = count + '개 카드 · 약 5분';
            } else if ((currentSubject === 'social' || currentSubject === 'science') && currentMode === 'exam_prep') {
                const count = (QUIZ_DATA && QUIZ_DATA.exam_prep) ? Math.min(15, QUIZ_DATA.exam_prep.length) : 15;
                el.textContent = count + '문항 · 약 10분';
            } else {
                const total = QUIZ_DATA && QUIZ_DATA.questions ? Math.min(30, QUIZ_DATA.questions.length) : 30;
                el.textContent = total + '문항 · 약 20분';
            }
        }

        // Sound effects
        // AudioContext를 앱 전체에서 하나만 생성하여 재사용 (모바일 브라우저 제한 대응)
        let _audioCtx = null;
        function getAudioCtx() {
            if (!_audioCtx) {
                try {
                    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.warn('[Sound] AudioContext 생성 실패:', e);
                    return null;
                }
            }
            // suspended 상태이면 resume (모바일 브라우저 정책 대응)
            if (_audioCtx.state === 'suspended') {
                _audioCtx.resume().catch(() => {});
            }
            return _audioCtx;
        }

        // TTS voices 프리로드 (첫 호출 시 빈 배열 반환 방지)
        let _ttsVoicesLoaded = false;
        if (window.speechSynthesis) {
            speechSynthesis.getVoices(); // 초기 호출로 로딩 트리거
            speechSynthesis.addEventListener('voiceschanged', () => { _ttsVoicesLoaded = true; });
        }

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('sound_muted', isMuted);
            document.getElementById('mute-toggle').textContent = isMuted ? '🔇' : '🔊';
            // 음소거 해제 시 AudioContext 확실히 깨우기
            if (!isMuted) getAudioCtx();
        }

        function playSound(type) {
            if (isMuted) return;
            try {
                const ctx = getAudioCtx();
                if (!ctx) return;
                const gain = ctx.createGain();
                gain.connect(ctx.destination);

                if (type === 'correct') {
                    // 정답: 도→미→솔 밝은 3음 상승 멜로디
                    gain.gain.value = 0.25;
                    const notes = [523, 659, 784]; // C5, E5, G5
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        osc.connect(gain);
                        osc.start(ctx.currentTime + i * 0.12);
                        osc.stop(ctx.currentTime + i * 0.12 + 0.15);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                } else {
                    // 오답: 낮은 2음 하강 버저 (뚜뚜)
                    gain.gain.value = 0.2;
                    const notes = [311, 233]; // Eb4, Bb3
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        osc.connect(gain);
                        osc.start(ctx.currentTime + i * 0.2);
                        osc.stop(ctx.currentTime + i * 0.2 + 0.18);
                    });
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                }
            } catch(e) {
                console.warn('[Sound] playSound 오류:', e);
            }
        }

        // Hint handling
        function showHint() {
            const q = currentSession[currentQuestionIndex];
            if (q && q.hint) {
                document.getElementById('hint-display').textContent = q.hint;

        }

        // Skip arrange question
        function skipArrange() {
            if (arrangeCheckInterval) {
                clearInterval(arrangeCheckInterval);
                arrangeCheckInterval = null;
            }
            const q = currentSession[currentQuestionIndex];
            recordAnswer(q, false);
            document.getElementById('btn-skip').style.display = 'none';

            // Show correct answer before moving on
            const container = document.getElementById('arrange-container');
            const answerDiv = document.createElement('div');
            answerDiv.className = 'correct-answer-display';
            answerDiv.style.cssText = 'background:#e8f5e9;border:1px solid #4CAF50;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:14px;color:#2e7d32;';
            answerDiv.textContent = '정답: ' + (q.answer || '');
            container.after(answerDiv);

            showNextButton();
        }

        // Result page parent section toggle
        function toggleParentSection() {
            const detail = document.getElementById('parent-detail');
            const btn = document.querySelector('.result-parent-toggle');
            if (detail.style.display === 'none') {
                detail.style.display = 'flex';

                detail.style.display = 'none';
                btn.textContent = '▼ 상세 결과 보기 (부모용)';
            }
        }

        // Webhook settings
        function saveWebhookUrl() {
            const url = document.getElementById('webhook-input').value.trim();
            if (url) {
                localStorage.setItem('webhook_url', url);
                document.getElementById('webhook-status').textContent = '✓ 저장되었습니다';
                setTimeout(() => { document.getElementById('webhook-status').textContent = ''; }, 2000);
            }
        }
        // 외부 JSON 로드용 변수
        let QUIZ_DATA = null;
        let currentLesson = null;
        let currentMode = 'exam_prep'; // 'drill' or 'exam_prep' (default: exam_prep for legacy)

        // 상태 관리
        let currentSession = null;
        let currentQuestionIndex = 0;
        let sessionAnswers = [];
        let questionHistory = {};
        let currentSessionMeta = null; // 세션 메타 (type, lesson, metrics)

        // 오답 재도전 상태
        let retryMode = false;
        let originalSessionAnswers = [];
        let originalSession = [];        // 재도전 시 원본 세션 보존

        // Lesson 데이터 로드
        // v15: JSONP(.js) 우선 로드 → fetch(.json) 폴백
        // 실제 파일이 .js(JSONP)이므로 script 태그를 1순위로 사용
        function fetchJsonCompat(url) {
            // 1순위: <script> 태그로 .js(JSONP) 직접 로드 — 모든 브라우저 호환
            const jsUrl = url.replace(/\.json$/, '.js');
            return new Promise((resolve, reject) => {
                window.__loadLesson = function(data) {
                    delete window.__loadLesson;
                    resolve(data);
                };
                const script = document.createElement('script');
                script.src = jsUrl;
                script.onload = function() {
                    script.remove();
                    // __loadLesson이 아직 남아있으면 콜백이 호출 안 된 것
                    if (window.__loadLesson) {
                        delete window.__loadLesson;
                        reject(new Error('JSONP callback not invoked: ' + jsUrl));
                    }
                };
                script.onerror = function() {
                    delete window.__loadLesson;
                    script.remove();
                    reject(new Error('Script load failed: ' + jsUrl));
                };
                document.head.appendChild(script);
            }).catch(scriptErr => {
                // 2순위 폴백: fetch(.json) — .json 파일이 있는 환경 대비
                console.warn('JSONP load failed, trying fetch:', scriptErr.message);
                return fetch(url).then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                });
            }).catch(fetchErr => {
                // 3순위 폴백: XHR — file:// 프로토콜 등 특수 환경
                console.warn('Fetch failed, trying XHR:', fetchErr.message);
                return new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('GET', url, true);
                    xhr.onload = function() {
                        if (xhr.status === 0 || xhr.status === 200) {
                            try { resolve(JSON.parse(xhr.responseText)); }
                            catch(e) { reject(e); }
                        } else { reject(new Error('XHR ' + xhr.status)); }
                    };
                    xhr.onerror = function() { reject(new Error('XHR network error')); };
                    xhr.send();
                });
            });
        }

        async function loadLesson(lessonNumber) {
            try {
                // 문자열 ID(kor1 등)면 lesson_kor1.js, 숫자면 lesson1.json (기존)
                const isStringId = typeof lessonNumber === 'string' && isNaN(lessonNumber);
                const fileUrl = isStringId
                    ? `lesson_${lessonNumber}.json`
                    : `lesson${lessonNumber}.json`;
                QUIZ_DATA = await fetchJsonCompat(fileUrl);
                currentLesson = lessonNumber;

                // 데이터에서 subject 자동 감지
                if (QUIZ_DATA.subject === 'korean') {
                    currentSubject = 'korean';
                } else if (QUIZ_DATA.subject === 'math') {
                    currentSubject = 'math';
                }

                // B-1: Filter out string comments from questions array (영어/국어/수학만 해당)
                if (QUIZ_DATA.questions) {
                    const realQuestions = QUIZ_DATA.questions.filter(q => typeof q === 'object' && q !== null);
                    QUIZ_DATA.questions = realQuestions;
                }

                // Detect v3.0 schema
                if (QUIZ_DATA.core_sentences && QUIZ_DATA.questions) {
                    QUIZ_DATA._isV3 = true;
                } else if (QUIZ_DATA.questions) {
                    QUIZ_DATA._isV3 = false;
                }

        // 학습 현황 업데이트
        function updateStats() {
            // 문장 정답률
            const totalAttempts = Object.values(questionHistory).reduce((sum, q) => sum + (q.attempts || 0), 0);
            const totalCorrect = Object.values(questionHistory).reduce((sum, q) => sum + (q.correct || 0), 0);
            const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
            document.getElementById('stat-accuracy').textContent = accuracy;

            // 단어 암기율
            const vocabResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lessonKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? currentLesson : ('L' + (currentLesson || 1));
            const lessonVocab = vocabResults[lessonKey] || {};
            const vocabTested = Object.keys(lessonVocab).length;
            if (vocabTested > 0) {
                const vocabKnown = Object.values(lessonVocab).filter(v => v.known === true).length;
                document.getElementById('stat-vocab').textContent = Math.round((vocabKnown / vocabTested) * 100) + '%';
            } else {
                document.getElementById('stat-vocab').textContent = '—';
            }
        }

        // =========================================================
        // 세션 생성 엔진 v3 — score_group 기반 풀링 + 블록 배치 4규칙

        // 어제 틀린 문항 추출 (간격 반복 워밍업용)
        function getYesterdayWrongQuestions(maxCount) {
            const logsKey = (typeof currentLesson === 'string' && isNaN(currentLesson))
                ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            const todayStr = today();
            const yesterday = new Date(Date.now() - 86400000);
            const yStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');

            // 어제 로그에서 틀린 문항 ID 수집
            const wrongIds = new Set();
            const skipTypes = new Set(['flashcard', 'concept_card', 'math_concept_card', 'study_concept_card',
                'passage_guide_picker', 'passage_guide_section', 'explanation_method_card',
                'reading_journal_guide', 'outline_exercise', 'procedure_drill', 'mini_writing', 'kor_core_sentence']);
            logs.forEach(log => {
                if (log.date !== yStr || !log.questions) return;
                log.questions.forEach(a => {
                    if (!a.correct && !skipTypes.has(a.type)) wrongIds.add(a.id);
                });
            });
            if (wrongIds.size === 0) return [];

            // QUIZ_DATA에서 해당 문항 찾기 (exam_prep + questions 모두 탐색)
            const allQ = [...(QUIZ_DATA.questions || []), ...(QUIZ_DATA.exam_prep || [])];
            const found = allQ.filter(q => wrongIds.has(q.id));
            shuffleArray(found);
            return found.slice(0, maxCount);
        }

        // 학습 이력 기반 우선순위 점수 (높을수록 복습 필요)
        // v3.1: 최근 출제 쿨다운 — 직전 세션 문항이 바로 반복되지 않도록
        function priorityScore(q) {
            const h = questionHistory[q.id];
            if (!h) return 50; // 신규: 중간 우선도

            let base;
            if (h.last_correct === false) base = 100; // 오답: 최고 우선
            else if (h.correct >= 3 && h.last_correct) base = 10; // 마스터: 최저
            else base = 70; // 복습 필요

            // 쿨다운: 최근 세션에서 출제된 문항은 우선도 하향
            // last_seen이 오늘이고, 이번 세션에서 이미 풀었다면 감점
            if (h.last_seen === today() && h.attempts > 0) {
                base -= 40; // 오답(100→60), 복습(70→30) — 신규(50)보다 낮아짐
            }

            return Math.max(base, 5); // 최소 5
        }

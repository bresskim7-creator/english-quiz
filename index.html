<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>영어 Lesson 1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2F5496">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #ffffff;
            color: #333333;
        }

        body {
            overflow: hidden;
        }

        /* 공통 컨테이너 */
        .app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
        }

        /* 상단 바 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #2F5496;
            color: white;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(47, 84, 150, 0.15);
            z-index: 100;
        }

        .header-title {
            font-size: 18px;
            flex: 1;
            text-align: center;
        }

        /* 페이지별 표시 */
        .page {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
        }

        .page.active {
            display: flex;
            flex-direction: column;
        }

        /* ===== 홈 화면 ===== */
        #home-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .home-title {
            font-size: 28px;
            font-weight: 700;
            color: #2F5496;
            margin-bottom: 10px;
        }

        .today-button {
            width: 85%;
            max-width: 300px;
            padding: 24px 20px;
            background: linear-gradient(135deg, #2F5496 0%, #1a3a6f 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(47, 84, 150, 0.3);
            transition: all 0.3s ease;
        }

        .today-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(47, 84, 150, 0.4);
        }

        .today-button:active {
            transform: translateY(0);
        }

        .button-subtitle {
            display: block;
            font-size: 12px;
            font-weight: 400;
            margin-top: 8px;
            opacity: 0.95;
        }

        /* 학습 현황 카드 */
        .stats-card {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }

        .stats-title {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #2F5496;
            font-weight: 700;
            font-size: 16px;
        }

        /* ===== 퀴즈 화면 ===== */
        #quiz-page {
            flex-direction: column;
            gap: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .instruction-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 400;
        }

        /* Fill Blank 스타일 */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .choice-btn {
            padding: 14px 12px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .choice-btn:active {
            transform: scale(0.98);
        }

        .choice-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .choice-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        .choice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Arrange 스타일 */
        .arrange-container {
            margin-bottom: 16px;
        }

        .selected-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 2px dashed #ddd;
            min-height: 50px;
            margin-bottom: 12px;
            align-content: flex-start;
        }

        .selected-word {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background-color: #e3f2fd;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #90caf9;
        }

        .remove-word-btn {
            background: none;
            border: none;
            color: #2196F3;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }

        .available-words {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-btn {
            padding: 10px 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .word-btn:active {
            transform: scale(0.98);
        }

        .word-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .word-btn.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .word-btn.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* Match 스타일 */
        .match-options {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .match-option {
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .match-option:active {
            transform: scale(0.98);
        }

        .match-option.correct {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .match-option.incorrect {
            background-color: #F44336;
            color: white;
            border-color: #F44336;
        }

        /* 컨트롤 버튼 */
        .quiz-controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
            padding-top: 16px;
        }

        .btn-quit {
            flex: 1;
            padding: 14px;
            background-color: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #666;
        }

        .btn-quit:active {
            background-color: #e0e0e0;
        }

        /* ===== 완료 화면 ===== */
        #result-page {
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
            text-align: center;
        }

        .result-label {
            font-size: 16px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
        }

        .missed-questions {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
            max-height: 200px;
            overflow-y: auto;
        }

        .missed-question-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .missed-question-item:last-child {
            border-bottom: none;
        }

        .missed-keyword {
            font-weight: 600;
            color: #F44336;
        }

        .missed-answer {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .result-buttons {
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 350px;
            flex-direction: column;
        }

        .btn-export {
            padding: 14px;
            background: linear-gradient(135deg, #4CAF50 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-home {
            padding: 14px;
            background-color: #2F5496;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-export:active, .btn-home:active {
            opacity: 0.9;
        }

        /* 배열형 건너뛰기 버튼 */
        .btn-skip {
            flex: 1;
            padding: 14px;
            background-color: #fff3e0;
            border: 2px solid #ff9800;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #e65100;
        }

        /* 힌트 버튼 */
        .btn-hint {
            flex: 1;
            padding: 14px;
            background-color: #fff8e1;
            border: 2px solid #ffc107;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #f57f17;
        }

        /* 결과 화면 - 아이용 섹션 */
        .result-kid-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .result-emoji {
            font-size: 64px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 700;
            color: #2F5496;
        }

        .result-kid-message {
            font-size: 20px;
            font-weight: 600;
            color: #2F5496;
            text-align: center;
        }

        /* 결과 화면 - 부모용 섹션 */
        .result-parent-section {
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-parent-toggle {
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            text-align: center;
        }

        /* 웹훅 설정 */
        .webhook-settings {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e0e0;
        }
        </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-title">영어 Lesson 1</div>
            <button id="mute-toggle" onclick="toggleMute()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px 8px;">🔊</button>
        </div>

        <!-- 홈 화면 -->
        <div id="home-page" class="page active">
            <div class="home-title">오늘의 학습</div>
            <button class="today-button" onclick="startSession()">
                오늘의 학습 시작
                <span class="button-subtitle">12문항 · 약 10분</span>
            </button>

            <div class="stats-card">
                <div class="stats-title">학습 현황</div>
                <div class="stat-row">
                    <span class="stat-label">총 학습일수</span>
                    <span class="stat-value"><span id="stat-days">0</span>일</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">전체 정답률</span>
                    <span class="stat-value"><span id="stat-accuracy">0</span>%</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">마스터한 문항</span>
                    <span class="stat-value"><span id="stat-mastered">0</span>/80</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">복습 필요</span>
                    <span class="stat-value"><span id="stat-review">0</span>개</span>
                </div>
            </div>

            <div class="webhook-settings" id="webhook-settings">
                <div class="stats-title">설정</div>
                <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;">Google Sheets 웹훅 URL</label>
                <input type="url" id="webhook-input" placeholder="https://script.google.com/..."
                       style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px;box-sizing:border-box;" />
                <button onclick="saveWebhookUrl()" style="margin-top:8px;padding:8px 16px;background:#2F5496;color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer;">저장</button>
                <div id="webhook-status" style="font-size:11px;color:#4CAF50;margin-top:4px;"></div>
            </div>
        </div>

        <!-- 퀴즈 화면 -->
        <div id="quiz-page" class="page">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="question-number" id="question-number">1 / 12</div>

            <div class="instruction-text" id="instruction-text">빈칸에 알맞은 단어를 고르세요.</div>
            <div class="question-text" id="question-text"></div>

            <!-- Fill Blank -->
            <div id="fill-blank-container" class="choices-grid" style="display: none;"></div>

            <!-- Arrange -->
            <div id="arrange-container" class="arrange-container" style="display: none;">
                <div class="selected-words" id="selected-words"></div>
                <div class="available-words" id="available-words"></div>
            </div>

            <!-- Match -->
            <div id="match-container" class="match-options" style="display: none;"></div>

            <div id="hint-display" style="display:none;background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;font-size:13px;color:#795548;margin-top:8px;"></div>
            <div class="quiz-controls" id="quiz-controls">
                <button class="btn-hint" id="btn-hint" onclick="showHint()">💡 힌트</button>
                <button class="btn-quit" onclick="quitQuiz()">그만하기</button>
                <button class="btn-skip" id="btn-skip" onclick="skipArrange()" style="display:none;">건너뛰기</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-page" class="page">
            <!-- 아이용 전면 -->
            <div class="result-kid-section">

                <div id="parent-detail" style="display:none;">
                    <div class="missed-questions" id="missed-questions-container" style="display: none;">
                        <div class="stats-title">틀린 문항</div>
                        <div id="missed-questions-list"></div>

    <script>
        // 전역 변수
        let isMuted = localStorage.getItem('sound_muted') === 'true';
        let arrangeCheckInterval = null;
        let hintUsedThisQuestion = false;

        // 전체 80문항 데이터 (임베드)
        // Sound effects
        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('sound_muted', isMuted);
            document.getElementById('mute-toggle').textContent = isMuted ? '🔇' : '🔊';
        }

        function playSound(type) {
            if (isMuted) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.value = 0.3;

                if (type === 'correct') {
                    osc.frequency.value = 880;
                    osc.type = 'sine';
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.stop(ctx.currentTime + 0.3);
                } else {
                    osc.frequency.value = 330;
                    osc.type = 'square';
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.stop(ctx.currentTime + 0.4);
                }
            } catch(e) {}
        }

        // Hint handling
        function showHint() {
            const q = currentSession[currentQuestionIndex];
            if (q && q.hint) {
                document.getElementById('hint-display').textContent = q.hint;
                document.getElementById('hint-display').style.display = 'block';
                hintUsedThisQuestion = true;
            }
        }

        // Skip arrange question
        function skipArrange() {
            if (arrangeCheckInterval) {
                clearInterval(arrangeCheckInterval);
                arrangeCheckInterval = null;
            }
            const q = currentSession[currentQuestionIndex];
            recordAnswer(q, false);
            document.getElementById('btn-skip').style.display = 'none';
            currentQuestionIndex++;
            showQuestion();
        }

        // Result page parent section toggle
        function toggleParentSection() {
            const detail = document.getElementById('parent-detail');
            const btn = document.querySelector('.result-parent-toggle');
            if (detail.style.display === 'none') {
                detail.style.display = 'flex';
                detail.style.flexDirection = 'column';
                detail.style.gap = '12px';
                btn.textContent = '▲ 상세 결과 접기';
            } else {
                detail.style.display = 'none';
                btn.textContent = '▼ 상세 결과 보기 (부모용)';
            }
        }

        // Webhook settings
        function saveWebhookUrl() {
            const url = document.getElementById('webhook-input').value.trim();
            if (url) {
                localStorage.setItem('webhook_url', url);
                document.getElementById('webhook-status').textContent = '✓ 저장되었습니다';
                setTimeout(() => { document.getElementById('webhook-status').textContent = ''; }, 2000);
            }
        }

        // 상태 관리
        let currentSession = null;
        let currentQuestionIndex = 0;
        let sessionAnswers = [];
        let questionHistory = {};

        // 초기화
        function init() {
            loadQuestionHistory();
            updateStats();
            // 음소거 상태 복원
            document.getElementById('mute-toggle').textContent = isMuted ? '🔇' : '🔊';
            // 웹훅 URL 복원
            const savedWebhook = localStorage.getItem('webhook_url');
            if (savedWebhook) document.getElementById('webhook-input').value = savedWebhook;
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
            retransmitUnsentLogs();
        }

        // localStorage에서 문항 이력 로드
        function loadQuestionHistory() {
            const stored = localStorage.getItem('question_history');
            questionHistory = stored ? JSON.parse(stored) : {};
        }

        // 문항 이력 저장
        function saveQuestionHistory() {
            localStorage.setItem('question_history', JSON.stringify(questionHistory));
        }

        // 학습 현황 업데이트
        function updateStats() {
            const logs = JSON.parse(localStorage.getItem('quiz_logs') || '[]');
            const uniqueDays = new Set(logs.map(log => log.date)).size;

            const totalAttempts = Object.values(questionHistory).reduce((sum, q) => sum + (q.attempts || 0), 0);
            const totalCorrect = Object.values(questionHistory).reduce((sum, q) => sum + (q.correct || 0), 0);
            const accuracy = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;

            const mastered = Object.keys(questionHistory).filter(id => {
                const q = questionHistory[id];
                return q.correct >= 2 && q.last_correct === true;
            }).length;

            const review = Object.keys(questionHistory).filter(id => {
                const q = questionHistory[id];
                return q.attempts > 0 && q.last_correct === false;
            }).length;

            document.getElementById('stat-days').textContent = uniqueDays;
            document.getElementById('stat-accuracy').textContent = accuracy;
            document.getElementById('stat-mastered').textContent = mastered;
            document.getElementById('stat-review').textContent = review;
        }

        // 자동 세션 생성 알고리즘
        function generateSession() {
            const questions = QUIZ_DATA.questions;
            const wrongQuestions = questions.filter(q => {
                const hist = questionHistory[q.id];
                return hist && hist.last_correct === false && hist.attempts > 0;
            }).sort((a, b) => (questionHistory[b.id].last_seen || '') - (questionHistory[a.id].last_seen || ''));
            const newQuestions = questions.filter(q => !questionHistory[q.id]);
            const correctQuestions = questions.filter(q => {
                const hist = questionHistory[q.id];
                return hist && hist.last_correct === true;
            }).sort((a, b) => (questionHistory[a.id].last_seen || '') - (questionHistory[b.id].last_seen || ''));

            const selected = [];
            selected.push(...wrongQuestions.slice(0, 4));
            selected.push(...newQuestions.slice(0, 5));
            const remaining = 12 - selected.length;
            selected.push(...correctQuestions.slice(0, remaining));

            // ★ 12문항 보장
            if (selected.length < 12) {
                const selectedIds = new Set(selected.map(q => q.id));
                const moreNew = newQuestions.filter(q => !selectedIds.has(q.id));
                selected.push(...moreNew.slice(0, 12 - selected.length));
            }
            if (selected.length < 12) {
                const selectedIds = new Set(selected.map(q => q.id));
                const moreCorrect = correctQuestions.filter(q => !selectedIds.has(q.id));
                selected.push(...moreCorrect.slice(0, 12 - selected.length));
            }

            shuffleArray(selected);
            return selected.slice(0, 12).map(q => ({ ...q, poolIdx: questions.indexOf(q) }));
        }

        // 세션 시작
        function startSession() {
            currentSession = generateSession();
            currentQuestionIndex = 0;
            sessionAnswers = [];
            showPage('quiz-page');
            showQuestion();
        }

        // 문제 표시
        function showQuestion() {
            if (currentQuestionIndex >= currentSession.length) {
                finishSession();
                return;
            }

            const q = currentSession[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / currentSession.length) * 100;

            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('question-number').textContent = (currentQuestionIndex + 1) + ' / ' + currentSession.length;
            document.getElementById('instruction-text').textContent = q.instruction;

            // 컨테이너 모두 숨기기
            document.getElementById('fill-blank-container').style.display = 'none';
            document.getElementById('arrange-container').style.display = 'none';
            document.getElementById('match-container').style.display = 'none';

            if (q.type === 'fill_blank') {
                showFillBlank(q);
            } else if (q.type === 'arrange') {
                showArrange(q);
            } else if (q.type === 'match') {
                showMatch(q);
            }
        }

        // Fill Blank 유형
        function showFillBlank(q) {
            document.getElementById('question-text').textContent = q.sentence;
            const container = document.getElementById('fill-blank-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            // 선택지 셔플
            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = item.choice;
                btn.onclick = () => handleFillBlankAnswer(q, idx, newCorrect);
                container.appendChild(btn);
            });
        }

        function handleFillBlankAnswer(q, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });

            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);

            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, isCorrect ? 1000 : 2000);
        }

        // Arrange 유형
        function showArrange(q) {
            document.getElementById('question-text').textContent = q.sentence_ko;
            const container = document.getElementById('arrange-container');
            container.style.display = 'block';

            const selected = [];
            const shuffled = [...q.words];
            shuffleArray(shuffled);

            const selectedDiv = document.getElementById('selected-words');
            const availableDiv = document.getElementById('available-words');
            selectedDiv.innerHTML = '';
            availableDiv.innerHTML = '';

            shuffled.forEach((word, idx) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.dataset.word = word;
                btn.dataset.idx = idx;
                btn.onclick = () => {
                    if (!btn.classList.contains('used')) {
                        selected.push({ word, idx });
                        btn.classList.add('used');
                        updateSelectedWords();
                    }
                };
                availableDiv.appendChild(btn);
            });

            function updateSelectedWords() {
                selectedDiv.innerHTML = '';
                selected.forEach((item, selIdx) => {
                    const tag = document.createElement('div');
                    tag.className = 'selected-word';
                    tag.textContent = item.word;
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-word-btn';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = () => {
                        selected.splice(selIdx, 1);
                        document.querySelector(`[data-word="${item.word}"][data-idx="${item.idx}"]`).classList.remove('used');
                        updateSelectedWords();
                    };
                    tag.appendChild(removeBtn);
                    selectedDiv.appendChild(tag);
                });
            }

            // Submit 버튼 추가 (UI에서 다음으로 자동으로 가야 하므로 타이머로 처리)
            // hint and skip button hidden in showQuestion

            // 5초마다 자동으로 제출된 것처럼 처리 (사용자가 배열을 완료하면)
            const checkArrange = setInterval(() => {
                if (selected.length === q.words.length) {
                    clearInterval(checkArrange);
                    const userAnswer = selected.map(x => x.word).join(' ');
                    const isCorrect = userAnswer === q.answer;

                    const buttons = document.querySelectorAll('#available-words .word-btn');
                    buttons.forEach((btn, idx) => {
                        if (!btn.classList.contains('used')) return;
                        if (isCorrect) btn.classList.add('correct');
                        else btn.classList.add('incorrect');
                        btn.disabled = true;
                    });

                    recordAnswer(q, isCorrect);

                    // 오답 시 정답 표시
                    if (!isCorrect) {
                        const correctDiv = document.createElement('div');
                        correctDiv.style.cssText = 'background:#e8f5e9;border:1px solid #4CAF50;border-radius:8px;padding:10px;margin-top:10px;font-size:13px;color:#2e7d32;';
                        correctDiv.textContent = '정답: ' + q.answer;
                        container.appendChild(correctDiv);
                    }

                    setTimeout(() => {
                        currentQuestionIndex++;
                        document.getElementById('btn-skip').style.display = 'none';
                        showQuestion();
                    }, isCorrect ? 1000 : 2500);
                }
            }, 100);
        }

        // Match 유형
        function showMatch(q) {
            document.getElementById('question-text').textContent = q.sentence_ko;
            const container = document.getElementById('match-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'match-option';
                btn.textContent = item.choice;
                btn.onclick = () => handleMatchAnswer(q, idx, newCorrect);
                container.appendChild(btn);
            });
        }

        function handleMatchAnswer(q, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll('#match-container .match-option');
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });

            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);

            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
            }, isCorrect ? 1000 : 2000);
        }

        // 답변 기록
        function recordAnswer(q, isCorrect) {
            playSound(isCorrect ? 'correct' : 'incorrect');
            sessionAnswers.push({ id: q.id, correct: isCorrect });

            if (!questionHistory[q.id]) {
                questionHistory[q.id] = { attempts: 0, correct: 0, last_seen: today(), last_correct: false };
            }

            const hist = questionHistory[q.id];
            hist.attempts = (hist.attempts || 0) + 1;
            if (isCorrect) hist.correct = (hist.correct || 0) + 1;
            hist.last_seen = today();
            hist.last_correct = isCorrect;

            saveQuestionHistory();
        }

        // 세션 종료
        function finishSession() {
            const totalCorrect = sessionAnswers.filter(a => a.correct).length;
            const percentage = Math.round((totalCorrect / sessionAnswers.length) * 100);

            document.getElementById('result-percentage').textContent = percentage;

            // 틀린 문항 표시
            const missed = sessionAnswers.filter(a => !a.correct).map(a => {
                const q = QUIZ_DATA.questions.find(x => x.id === a.id);
                return q;
            });

            if (missed.length > 0) {
                document.getElementById('missed-questions-container').style.display = 'block';
                const list = document.getElementById('missed-questions-list');
                list.innerHTML = '';
                missed.forEach(q => {
                    const item = document.createElement('div');
                    item.className = 'missed-question-item';
                    item.innerHTML = `<div class="missed-keyword">${q.keyword}</div><div class="missed-answer">정답: ${q.blank_answer || q.answer || (q.choices ? q.choices[q.correct] : '')}</div>`;
                    list.appendChild(item);
                });
            } else {
                document.getElementById('missed-questions-container').style.display = 'none';
            }

            // 로그 저장 및 전송
            const weakKeywords = sessionAnswers.filter(a => !a.correct).map(a => {
                const q2 = QUIZ_DATA.questions.find(x => x.id === a.id);
                return q2 ? q2.keyword : a.id;
            });

            const log = {
                date: today(),
                total: sessionAnswers.length,
                correct: totalCorrect,
                percentage: percentage,
                weak: weakKeywords.join(', '),
                questions: sessionAnswers,
                timestamp: new Date().toISOString(),
                partial: false
            };

            const logs = JSON.parse(localStorage.getItem('quiz_logs') || '[]');
            logs.push(log);
            localStorage.setItem('quiz_logs', JSON.stringify(logs));

            updateStats();
            showPage('result-page');
            sendToGoogleSheets();
        }

        // Google Sheets 전송
        function sendToGoogleSheets() {
            const webhookUrl = localStorage.getItem('webhook_url');
            if (!webhookUrl) return;

            const logs = JSON.parse(localStorage.getItem('quiz_logs') || '[]');
            const sentKeys = JSON.parse(localStorage.getItem('sent_logs') || '[]');

            logs.forEach((log, idx) => {
                const key = log.timestamp;
                if (sentKeys.includes(key)) return;

                const data = {
                    date: log.date,
                    total: log.total,
                    correct: log.correct,
                    percentage: log.percentage,
                    weak: log.weak || '',
                    partial: log.partial ? 'Y' : 'N',
                    timestamp: log.timestamp
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    body: JSON.stringify(data)
                }).then(() => {
                    sentKeys.push(key);
                    localStorage.setItem('sent_logs', JSON.stringify(sentKeys));
                }).catch(() => {});
            });
        }

        // 미전송 로그 재전송
        function retransmitUnsentLogs() {
            sendToGoogleSheets();
        }

        // 결과 내보내기
        function exportResults() {
            const text = `[${today()}] 영어 Lesson 1 학습 결과\n정답률: ${document.getElementById('result-percentage').textContent}%\n\n틀린 문항:\n${Array.from(document.querySelectorAll('.missed-question-item')).map(el => el.textContent).join('\n')}`;

            if (navigator.share) {
                navigator.share({ title: '학습 결과', text });
            } else {
                navigator.clipboard.writeText(text);
                alert('결과가 클립보드에 복사되었습니다.');
            }
        }

        // 홈으로
        function goHome() {
            currentSession = null;
            currentQuestionIndex = 0;
            sessionAnswers = [];
            showPage('home-page');
            updateStats();
        }

        // 그만하기
        function quitQuiz() {
            if (confirm('학습을 중단하겠습니까?')) {
                // 지금까지 푼 문항의 이력은 이미 recordAnswer에서 저장됨
                // 로그도 부분 저장
                if (sessionAnswers.length > 0) {
                    const totalCorrect = sessionAnswers.filter(a => a.correct).length;
                    const log = {
                        date: today(),
                        total: sessionAnswers.length,
                        correct: totalCorrect,
                        percentage: Math.round((totalCorrect / sessionAnswers.length) * 100),
                        questions: sessionAnswers,
                        timestamp: new Date().toISOString(),
                        partial: true
                    };
                    const logs = JSON.parse(localStorage.getItem('quiz_logs') || '[]');
                    logs.push(log);
                    localStorage.setItem('quiz_logs', JSON.stringify(logs));
                }
                // arrange interval 정리
                if (arrangeCheckInterval) {
                    clearInterval(arrangeCheckInterval);
                    arrangeCheckInterval = null;
                }
                document.getElementById('btn-skip').style.display = 'none';
                goHome();
            }
        }

        // 페이지 전환
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // 유틸리티
        function today() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // 앱 시작
        window.addEventListener('load', init);
    </script>
</body>
</html>

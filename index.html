        function checkTypedBlank() {
            const q = currentSession[currentQuestionIndex];
            if (!q) return;

            const inputs = document.querySelectorAll('#typed-blank-inputs .typed-blank-input');
            const answers = q.answers || [];
            const acceptTypos = q.accept_typos || {};

            let allCorrect = true;
            let hasTypo = false;
            let typoWords = [];

            inputs.forEach((input, i) => {
                const userVal = input.value.trim().toLowerCase();
                const correctVal = (answers[i] || '').toLowerCase();
                input.disabled = true;

                if (userVal === correctVal) {
                    input.classList.add('correct-input');
                } else {
                    // Check accept_typos
                    const typoList = acceptTypos[answers[i]] || [];
                    if (typoList.map(t => t.toLowerCase()).includes(userVal)) {
                        input.classList.add('typo-input');
                        hasTypo = true;
                        typoWords.push(answers[i]);
                    } else {
                        input.classList.add('wrong-input');
                        allCorrect = false;
                    }
                }
            });

            document.getElementById('typed-blank-submit').style.display = 'none';
            const feedbackEl = document.getElementById('typed-blank-feedback');
            feedbackEl.style.display = 'block';

            if (allCorrect) {
                if (hasTypo) {
                    feedbackEl.className = 'writing-feedback';
                    feedbackEl.style.background = '#fff3e0';
                    feedbackEl.style.border = '1px solid #FF9800';
                    feedbackEl.style.borderRadius = '8px';
                    feedbackEl.style.padding = '12px';
                    feedbackEl.style.marginTop = '10px';
                    feedbackEl.innerHTML = '✅ 거의 맞았어요! 정확한 철자: <strong>' + typoWords.join(', ') + '</strong>';
                } else {
                    feedbackEl.className = 'writing-feedback pass';
                    feedbackEl.innerHTML = '✅ 정답!';
                }
                recordAnswer(q, true);
            } else {
                feedbackEl.className = 'writing-feedback fail';
                feedbackEl.innerHTML = '❌ 오답이에요. 정답: <strong>' + answers.join(', ') + '</strong>';
                if (q.hint) feedbackEl.innerHTML += '<br><span style="color:#795548;font-size:13px;">💡 ' + q.hint + '</span>';
                recordAnswer(q, false);
            }

            showNextButton();
        }

        // 정답 문장 추출 (유형별) - B-9
        function getCorrectSentence(q) {
            // B-9: Drill types
            if (q.type === 'flashcard') return q.prompt_en || '';
            if (q.type === 'choice_blank') return q.prompt ? q.prompt.replace('_____', q.answer || '') : '';
            if (q.type === 'chunk_order') return q.answer || '';
            if (q.type === 'typed_blank') {
                let result = q.prompt || '';
                (q.answers || []).forEach(a => { result = result.replace('_____', a); });
                return result;
            }
            // Existing types
            if (q.type === 'arrange') return q.answer;
            if (q.type === 'match') return q.choices[q.correct];
            if (q.type === 'dialogue_response') return q.blank_answer || q.choices[q.correct];
            if (q.type === 'short_reading') return q.blank_answer || q.choices[q.correct];
            if (q.type === 'position_ask') return q.sentence; // 전체 문장 읽기
            if (q.type === 'mini_writing') return q.example_answer || '';
            if (q.sentence && q.blank_answer) {
                return q.sentence.replace('_____', q.blank_answer);
            }
            return q.blank_answer || q.answer || '';
        }

        // Vocab hint for sentence drill: show unknown words
        function showVocabHint(q) {
            let hintEl = document.getElementById('vocab-hint-display');
            if (!hintEl) {
                // Create hint element if not exists
                hintEl = document.createElement('div');
                hintEl.id = 'vocab-hint-display';
                hintEl.style.cssText = 'background:#e3f2fd;border:1px solid #90caf9;border-radius:8px;padding:8px 12px;font-size:13px;color:#1565c0;margin-top:8px;display:none;';
                document.getElementById('hint-display').parentNode.insertBefore(hintEl, document.getElementById('hint-display'));
            }
            hintEl.style.display = 'none';
            hintEl.textContent = '';

            if (!QUIZ_DATA || !QUIZ_DATA.vocab_drill || currentMode === 'vocab') return;

            const vocabResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lessonKey = 'L' + currentLesson;
            const lessonResults = vocabResults[lessonKey] || {};

            // Find words that appear in this question and are known === false
            const qId = q.id || '';
            const csId = q.core_sentence_id || '';
            const unknownWords = QUIZ_DATA.vocab_drill.filter(item => {
                const result = lessonResults[item.id];
                if (!result || result.known !== false) return false;
                return item.appears_in && (item.appears_in.includes(qId) || item.appears_in.includes(csId));
            });

            if (unknownWords.length > 0) {
                hintEl.textContent = '💡 ' + unknownWords.map(w => w.word + ' ' + w.meaning).join(' · ');
                hintEl.style.display = 'block';
            }
        }

        // 답변 기록 - B-8: Fallback field support
        function recordAnswer(q, isCorrect) {
            playSound(isCorrect ? 'correct' : 'incorrect');
            // 정답이면 0.5초 후 문장 읽어주기 (드릴 모드만, 실전대비는 제외, 국어는 제외)
            if (isCorrect && currentMode === 'drill' && currentSubject !== 'korean') {
                setTimeout(() => speakEnglish(getCorrectSentence(q)), 500);
            }
            const elapsed = questionStartTime ? Math.round((Date.now() - questionStartTime) / 1000) : 0;
            sessionAnswers.push({
                id: q.id,
                correct: isCorrect,
                type: q.type,
                difficulty: q.difficulty || (q.phase === 'drill' ? 'drill' : ''),
                keyword: q.keyword || q.core_sentence_id || q.id,
                score_group: q.score_group || q.recovery_band || '',
                test_task: q.test_task || q.type || '',
                time_sec: elapsed,
                hint_used: hintUsedThisQuestion,
                phase: q.phase || ''
            });

            if (!questionHistory[q.id]) {
                questionHistory[q.id] = { attempts: 0, correct: 0, last_seen: today(), last_correct: false };
            }

            const hist = questionHistory[q.id];
            hist.attempts = (hist.attempts || 0) + 1;
            if (isCorrect) hist.correct = (hist.correct || 0) + 1;
            hist.last_seen = today();
            hist.last_correct = isCorrect;

            saveQuestionHistory();
        }

        // =========================================================
        // Vocab Drill Engine
        // =========================================================
        let vocabDrillList = [];      // current round words (shuffled)
        let vocabDrillIndex = 0;
        let vocabDrillResults = {};   // { "VD-L1-001": true/false, ... }
        let vocabDrillRound = 1;

        function startVocabDrill() {
            if (!QUIZ_DATA || !QUIZ_DATA.vocab_drill || QUIZ_DATA.vocab_drill.length === 0) {
                alert('이 Lesson에는 단어 드릴 데이터가 없습니다.');
                return;
            }

            vocabDrillRound = 1;
            vocabDrillResults = {};

            // 이전 세션 결과 읽어서 모르는 단어를 앞에 배치
            const prevResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lk = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? currentLesson : ('L' + currentLesson);
            const prevLesson = prevResults[lk] || {};
            const unknown = QUIZ_DATA.vocab_drill.filter(item => prevLesson[item.id] && prevLesson[item.id].known === false);
            const untested = QUIZ_DATA.vocab_drill.filter(item => !prevLesson[item.id]);
            const known = QUIZ_DATA.vocab_drill.filter(item => prevLesson[item.id] && prevLesson[item.id].known === true);
            shuffleArray(unknown);
            shuffleArray(untested);
            shuffleArray(known);
            vocabDrillList = [...unknown, ...untested, ...known];
            vocabDrillIndex = 0;

            document.getElementById('vocab-result-area').style.display = 'none';
            document.getElementById('vocab-card-area').style.display = 'block';
            document.getElementById('vocab-controls').style.display = '';

            const modeLabel = '단어 드릴';
            document.querySelector('.header-title').textContent = getHeaderTitle(modeLabel);

            showPage('vocab-page');
            showVocabCard();
        }

        function showVocabCard() {
            if (vocabDrillIndex >= vocabDrillList.length) {
                finishVocabRound();
                return;
            }

            const item = vocabDrillList[vocabDrillIndex];
            const total = vocabDrillList.length;
            const progress = (vocabDrillIndex / total) * 100;

            document.getElementById('vocab-progress-fill').style.width = progress + '%';
            document.getElementById('vocab-counter').textContent = (vocabDrillIndex + 1) + ' / ' + total + (vocabDrillRound > 1 ? ' (재시도)' : '');

            const front = document.getElementById('vocab-front');
            const back = document.getElementById('vocab-back');
            const buttons = document.getElementById('vocab-buttons');
            const card = document.getElementById('vocab-card');
            const scene = document.getElementById('vocab-scene');

            // Reset
            card.classList.remove('flipped');
            buttons.style.display = 'none';
            document.querySelectorAll('#vocab-buttons .flashcard-btn').forEach(b => { b.disabled = false; });

            // Front: word (big)
            front.innerHTML = '<div class="vocab-word">' + item.word + '</div><div class="flashcard-tap-hint">탭하면 뜻 보기</div>';

            // Back: 국어는 확장 레이아웃 (meaning + pos + example + similar_expression)
            if (currentSubject === 'korean') {
                let backHtml = '<div class="kor-vocab-meaning">' + item.meaning + '</div>';
                backHtml += '<div class="kor-vocab-pos">' + (item.pos || '') + '</div>';
                if (item.example) backHtml += '<div class="kor-vocab-example">' + item.example + '</div>';
                if (item.similar_expression) backHtml += '<div class="kor-vocab-similar">≈ ' + item.similar_expression + '</div>';
                backHtml += '<div class="flashcard-tap-hint">탭하면 단어 보기</div>';
                back.innerHTML = backHtml;
            } else {
                let engBackHtml = '<div class="vocab-meaning">' + item.meaning + '</div><div class="vocab-pos">' + item.pos + '</div>';
                if (item.example) {
                    const highlighted = item.example.replace(new RegExp('(' + item.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark class="vocab-highlight">$1</mark>');
                    engBackHtml += '<div class="vocab-example">' + highlighted + '</div>';
                }
                engBackHtml += '<div class="flashcard-tap-hint">탭하면 영어 보기</div>';
                back.innerHTML = engBackHtml;
            }

            // TTS: 국어는 비활성화
            if (currentSubject !== 'korean') {
                setTimeout(() => speakEnglish(item.word), 300);
            }

            let flipped = false;
            scene.onclick = function() {
                flipped = !flipped;
                card.classList.toggle('flipped');
                if (flipped) {
                    buttons.style.display = 'flex';
                }
                if (!flipped && currentSubject !== 'korean') {
                    setTimeout(() => speakEnglish(item.word), 300);
                }
            };
        }

        function handleVocabAnswer(known) {
            const item = vocabDrillList[vocabDrillIndex];
            document.getElementById('vocab-scene').onclick = null;
            document.querySelectorAll('#vocab-buttons .flashcard-btn').forEach(b => { b.disabled = true; });

            vocabDrillResults[item.id] = known;
            playSound(known ? 'correct' : 'incorrect');

            vocabDrillIndex++;
            setTimeout(() => showVocabCard(), 400);
        }

        function finishVocabRound() {
            const unknownItems = vocabDrillList.filter(item => vocabDrillResults[item.id] === false);
            const knownCount = vocabDrillList.filter(item => vocabDrillResults[item.id] === true).length;
            const totalAll = QUIZ_DATA.vocab_drill.length;
            const totalKnown = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === true).length;

            if (unknownItems.length > 0 && vocabDrillRound < 3) {
                // Show retry prompt
                const area = document.getElementById('vocab-result-area');
                area.style.display = 'block';
                document.getElementById('vocab-card-area').style.display = 'none';
                area.innerHTML = `
                    <div class="vocab-round-msg">
                        <h3>라운드 ${vocabDrillRound} 완료!</h3>
                        <p>알아요: ${totalKnown}개 / 모르겠어요: ${unknownItems.length}개</p>
                        <button class="vocab-retry-btn" onclick="retryVocabDrill()">모르겠어요 ${unknownItems.length}개 다시 도전</button>
                        <button class="vocab-done-btn" onclick="finishVocabDrill()">여기서 마치기</button>
                    </div>
                `;
            } else {
                finishVocabDrill();
            }
        }

        function retryVocabDrill() {
            vocabDrillRound++;
            const unknownItems = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === false);
            vocabDrillList = [...unknownItems];
            shuffleArray(vocabDrillList);
            vocabDrillIndex = 0;

            document.getElementById('vocab-result-area').style.display = 'none';
            document.getElementById('vocab-card-area').style.display = 'block';
            showVocabCard();
        }

        function quitVocabDrill() {
            if (confirm('학습을 중단하겠습니까?')) {
                if (Object.keys(vocabDrillResults).length > 0) {
                    finishVocabDrill();
                } else {
                    showPage('home-page');
                }
            }
        }

        function finishVocabDrill() {
            // 그만하기 버튼 숨기기 (결과 화면에서는 "홈으로 돌아가기"가 있으므로)
            document.getElementById('vocab-controls').style.display = 'none';
            // Save results to localStorage
            const vocabResults = JSON.parse(localStorage.getItem('vocab_results') || '{}');
            const lessonKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? currentLesson : ('L' + currentLesson);
            if (!vocabResults[lessonKey]) vocabResults[lessonKey] = {};
            const now = new Date().toISOString();
            QUIZ_DATA.vocab_drill.forEach(item => {
                if (vocabDrillResults[item.id] !== undefined) {
                    vocabResults[lessonKey][item.id] = {
                        known: vocabDrillResults[item.id],
                        tested_at: now
                    };
                }
            });
            localStorage.setItem('vocab_results', JSON.stringify(vocabResults));

            // Calculate final stats
            const totalAll = QUIZ_DATA.vocab_drill.length;
            const totalKnown = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === true).length;
            const percentage = Math.round((totalKnown / totalAll) * 100);

            // Show result
            const area = document.getElementById('vocab-result-area');
            area.style.display = 'block';
            document.getElementById('vocab-card-area').style.display = 'none';

            const unknownWords = QUIZ_DATA.vocab_drill.filter(item => vocabDrillResults[item.id] === false);
            let unknownHtml = '';
            if (unknownWords.length > 0) {
                unknownHtml = '<div style="text-align:left;margin-top:20px;"><div style="font-size:15px;font-weight:600;color:#e65100;margin-bottom:8px;">복습 필요 단어</div>';
                unknownWords.forEach(w => {
                    unknownHtml += `<div style="padding:8px 0;border-bottom:1px solid #eee;font-size:14px;"><strong>${w.word}</strong> <span style="color:#888">${w.pos}</span> — ${w.meaning}</div>`;
                });
                unknownHtml += '</div>';
            }

            area.innerHTML = `
                <div class="vocab-result-summary">
                    <h2>단어 드릴 완료!</h2>
                    <div class="score">${percentage}%</div>
                    <div class="detail">${totalAll}개 중 ${totalKnown}개 알고 있어요</div>
                    ${unknownHtml}
                    <button class="vocab-done-btn" onclick="showPage('home-page')" style="margin-top:24px;">홈으로 돌아가기</button>
                </div>
            `;

            // Send to Google Sheets (vocab_log)
            sendVocabToGoogleSheets();
        }

        function sendVocabToGoogleSheets() {
            const webhookUrl = localStorage.getItem('webhook_url');
            if (!webhookUrl) return;

            const rows = [];
            const now = new Date().toISOString();
            QUIZ_DATA.vocab_drill.forEach(item => {
                if (vocabDrillResults[item.id] !== undefined) {
                    rows.push({
                        sheet: 'vocab_log',
                        timestamp: now,
                        lesson: currentLesson,
                        subject: currentSubject,
                        word_id: item.id,
                        word: item.word,
                        known: vocabDrillResults[item.id] ? 'T' : 'F'
                    });
                }
            });

            // Send in batch
            rows.forEach(row => {
                fetch(webhookUrl, {
                    method: 'POST',
                    body: JSON.stringify(row)
                }).catch(() => {});
            });
        }

        // 세션 종료
        // =========================================================
        // 4대 메트릭 계산 (§9.1)
        // 1) A군 회수율: A군 문항 정답률
        // 2) 첫 시도 정답률: 힌트 없이 맞춘 비율
        // 3) 조건 준수율: (Phase 1에서는 placeholder)
        // 4) arrange 성공률: arrange 계열 정답률
        // =========================================================
        // B-11: Drill metrics (MVP minimal)
        function compute4Metrics(answers) {
            if (!QUIZ_DATA) return null;

            // 문항 풀(questions / exam_prep / procedure_drills) 통합 조회
            const allQuestions = QUIZ_DATA.questions || QUIZ_DATA.exam_prep || [];
            function findQ(id) {
                let q = allQuestions.find(x => x.id === id);
                if (!q && QUIZ_DATA.exam_prep) q = QUIZ_DATA.exam_prep.find(x => x.id === id);
                if (!q && QUIZ_DATA.procedure_drills) q = QUIZ_DATA.procedure_drills.find(x => x.id === id);
                return q || null;
            }

            // Check if this is a drill session
            const isDrillSession = currentMode === 'drill';

            if (isDrillSession) {
                // Drill-specific metrics
                const totalCorrect = answers.filter(a => a.correct).length;
                const totalRate = answers.length > 0 ? Math.round((totalCorrect / answers.length) * 100) : 0;
                return {
                    mode: 'drill',
                    drill_stage: getDrillStage(),
                    total_rate: totalRate,
                    sentences_practiced: new Set(answers.map(a => {
                        const q = findQ(a.id);
                        return q ? q.core_sentence_id : null;
                    }).filter(Boolean)).size
                };
            }

            // A군 문항만 필터
            const aGroupAnswers = answers.filter(a => {
                const q = findQ(a.id);
                return q && (q.score_group === 'A' || q.recovery_band === 'A');
            });
            const aGroupCorrect = aGroupAnswers.filter(a => a.correct).length;
            const aGroupRate = aGroupAnswers.length > 0
                ? Math.round((aGroupCorrect / aGroupAnswers.length) * 100) : null;

            // 첫 시도 정답률 (힌트 미사용 + 정답)
            const noHintCorrect = answers.filter(a => a.correct && !a.hint_used).length;
            const firstAttemptRate = answers.length > 0
                ? Math.round((noHintCorrect / answers.length) * 100) : null;

            // 조건 준수율 (mini_writing 미구현이므로 placeholder)
            const conditionRate = null;

            // arrange 성공률 (arrange 타입 전체)
            const arrangeAnswers = answers.filter(a => a.type === 'arrange');
            const arrangeCorrect = arrangeAnswers.filter(a => a.correct).length;
            const arrangeRate = arrangeAnswers.length > 0
                ? Math.round((arrangeCorrect / arrangeAnswers.length) * 100) : null;

            // C군 별도 기록 (§5.4: 핵심 메트릭에 미반영)
            const cGroupAnswers = answers.filter(a => {
                const q = findQ(a.id);
                return q && q.score_group === 'C';
            });
            const cGroupRate = cGroupAnswers.length > 0
                ? Math.round((cGroupAnswers.filter(a => a.correct).length / cGroupAnswers.length) * 100) : null;

            return {
                a_group_recovery: aGroupRate,
                a_group_count: aGroupAnswers.length,
                first_attempt_rate: firstAttemptRate,
                condition_compliance: conditionRate,
                arrange_success: arrangeRate,
                arrange_count: arrangeAnswers.length,
                c_group_separate: cGroupRate,
                c_group_count: cGroupAnswers.length
            };
        }

        // =========================================================
        // 오답 재도전 라운드
        // =========================================================
        function startRetryRound() {
            // 재도전 불가능한 타입 (학습/열람 모드)
            const skipTypes = ['flashcard', 'kor_core_sentence', 'passage_guide_picker', 'passage_guide_section',
                'concept_card', 'explanation_method_card', 'reading_journal_guide', 'outline_exercise',
                'math_concept_card', 'procedure_drill', 'mini_writing'];

            // 원본 세션에서 틀린 문항 ID 수집
            const missedIds = new Set(sessionAnswers.filter(a => !a.correct).map(a => a.id));

            // 원본 세션의 question 객체에서 재도전 대상 추출
            const sourceSession = retryMode ? originalSession : currentSession;
            const retryQuestions = sourceSession.filter(q =>
                missedIds.has(q.id) && !skipTypes.includes(q.type)
            );

            if (retryQuestions.length === 0) {
                alert('재도전할 문항이 없습니다.');
                return;
            }

            // 원본 데이터 보존 (첫 재도전 시에만)
            if (!retryMode) {
                originalSessionAnswers = [...sessionAnswers];
                originalSession = [...currentSession];
            }

            retryMode = true;
            sessionAnswers = [];   // 재도전용 새 답안 배열

            // 셔플 후 세션 교체
            shuffleArray(retryQuestions);
            currentSession = retryQuestions;
            currentQuestionIndex = 0;
            sessionStartTime = Date.now();

            // 진도바 제목 변경
            showPage('quiz-page');
            showQuestion();
        }

        async function finishSession() {
            // ========== 재도전 라운드 종료 ==========
            if (retryMode) {
                finishRetryRound();
                return;
            }

            // ========== 일반 세션 종료 ==========
            const totalCorrect = sessionAnswers.filter(a => a.correct).length;
            const percentage = Math.round((totalCorrect / sessionAnswers.length) * 100);

            document.getElementById('result-percentage').textContent = percentage;

            // 틀린 문항 표시 - B-8: Fallback field support
            const missed = sessionAnswers.filter(a => !a.correct).map(a => {
                const q = findQuestionById(a.id);
                return q;
            }).filter(Boolean);

            const retryBtn = document.getElementById('btn-retry');
            const msgEl = document.getElementById('result-kid-message');

            if (missed.length > 0) {
                document.getElementById('missed-questions-container').style.display = 'block';
                const list = document.getElementById('missed-questions-list');
                list.innerHTML = '';
                missed.forEach(q => {
                    const item = document.createElement('div');
                    item.className = 'missed-question-item';
                    const keyword = q.keyword || q.prompt_en || q.prompt || q.id;
                    const answer = q.blank_answer || q.answer || (q.choices && q.correct_index != null ? q.choices[q.correct_index] : '') || (q.choices && q.correct != null ? q.choices[q.correct] : '') || (q.options && q.correct != null ? q.options[q.correct] : '') || '';
                    item.innerHTML = `<div class="missed-keyword">${keyword}</div><div class="missed-answer">정답: ${answer}</div>`;
                    list.appendChild(item);
                });

                // 재도전 가능한 문항이 있는지 확인
                const skipTypes = ['flashcard', 'kor_core_sentence', 'passage_guide_picker', 'passage_guide_section',
                    'concept_card', 'explanation_method_card', 'reading_journal_guide', 'outline_exercise',
                    'math_concept_card', 'procedure_drill', 'mini_writing'];
                const retryable = missed.filter(q => !skipTypes.includes(q.type));

                if (retryable.length > 0) {
                    retryBtn.style.display = 'block';
                    retryBtn.textContent = `틀린 문제 다시 풀기 (${retryable.length}문제)`;
                    msgEl.textContent = '틀린 문제를 다시 풀어볼까요?';
                } else {
                    retryBtn.style.display = 'none';
                    msgEl.textContent = '오늘 끝! 내일 또 만나요 👋';
                }
            } else {
                document.getElementById('missed-questions-container').style.display = 'none';
                retryBtn.style.display = 'none';
                msgEl.textContent = '전부 맞혔어요! 대단해요! 🎉';
            }

            // 로그 저장 및 전송
            const weakKeywords = sessionAnswers.filter(a => !a.correct).map(a => {
                const q2 = findQuestionById(a.id);
                return q2 ? q2.keyword : a.id;
            });

            const sessionDuration = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;

            const typeStats = {};
            sessionAnswers.forEach(a => {
                if (!typeStats[a.type]) typeStats[a.type] = { total: 0, correct: 0 };
                typeStats[a.type].total++;
                if (a.correct) typeStats[a.type].correct++;
            });
            const typeBreakdown = Object.entries(typeStats).map(([t, s]) =>
                t + ':' + s.correct + '/' + s.total
            ).join(', ');

            const hintCount = sessionAnswers.filter(a => a.hint_used).length;

            const metrics = compute4Metrics(sessionAnswers);

            const log = {
                lesson: currentLesson || 1,
                subject: currentSubject,
                date: today(),
                session_type: currentSessionMeta ? currentSessionMeta.type : sessionType,
                total: sessionAnswers.length,
                correct: totalCorrect,
                percentage: percentage,
                duration_sec: sessionDuration,
                weak: weakKeywords.join(', '),
                type_breakdown: typeBreakdown,
                hint_count: hintCount,
                metrics: metrics,
                details: sessionAnswers.map(a =>
                    a.id + (a.correct ? '✓' : '✗') + a.time_sec + 's' + (a.hint_used ? '💡' : '')
                ).join(', '),
                questions: sessionAnswers,
                timestamp: new Date().toISOString(),
                partial: false
            };

            const logsKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            logs.push(log);
            localStorage.setItem(logsKey, JSON.stringify(logs));

            // Drill stage progression check
            if (currentMode === 'drill') {
                const pct = Math.round((totalCorrect / sessionAnswers.length) * 100);
                const currentStage = getDrillStage();
                if (pct >= 80 && currentStage < 4) {
                    setDrillStage(currentStage + 1);
                }
            }

            updateStats();
            showPage('result-page');
            sendToGoogleSheets();
        }

        // 재도전 라운드 결과 처리
        function finishRetryRound() {
            const retryCorrect = sessionAnswers.filter(a => a.correct).length;
            const retryTotal = sessionAnswers.length;
            const recoveryRate = Math.round((retryCorrect / retryTotal) * 100);

            // 결과 화면 업데이트 — 회복률 중심 표시
            document.getElementById('result-percentage').textContent = recoveryRate;

            const msgEl = document.getElementById('result-kid-message');
            if (recoveryRate === 100) {
                msgEl.textContent = '전부 회복! 완벽해요! 💪';
            } else if (recoveryRate >= 50) {
                msgEl.textContent = `${retryTotal}문제 중 ${retryCorrect}문제 회복! 잘했어요!`;
            } else {
                msgEl.textContent = `${retryCorrect}문제 회복했어요. 다음에 다시 도전!`;
            }

            // 재도전 버튼 숨기기 (더 이상 재도전 없음)
            document.getElementById('btn-retry').style.display = 'none';

            // 틀린 문항 리스트: 회복/미회복 구분
            const missedContainer = document.getElementById('missed-questions-container');
            missedContainer.style.display = 'block';
            const list = document.getElementById('missed-questions-list');
            list.innerHTML = '';

            // 회복률 박스
            const recoveryBox = document.createElement('div');
            recoveryBox.className = 'retry-recovery-box';
            recoveryBox.innerHTML = `
                <div class="retry-recovery-rate">${retryCorrect} / ${retryTotal} 회복</div>
                <div class="retry-recovery-label">재도전 회복률 ${recoveryRate}%</div>
            `;
            list.appendChild(recoveryBox);

            // 개별 문항 결과
            sessionAnswers.forEach(a => {
                const q = findQuestionById(a.id);
                if (!q) return;
                const item = document.createElement('div');
                item.className = 'missed-question-item';
                const keyword = q.keyword || q.prompt_en || q.prompt || q.id;
                const status = a.correct ? '✅ 회복' : '❌ 미회복';
                const statusClass = a.correct ? 'retry-item-recovered' : 'retry-item-still-wrong';
                item.innerHTML = `<div class="missed-keyword">${keyword}</div><div class="${statusClass}">${status}</div>`;
                list.appendChild(item);
            });

            // stats-title 변경
            const statsTitle = missedContainer.querySelector('.stats-title');
            if (statsTitle) statsTitle.textContent = '재도전 결과';

            // 로그 저장 (재도전 로그)
            const retryDuration = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
            const retryLog = {
                lesson: currentLesson || 1,
                subject: currentSubject,
                date: today(),
                session_type: 'retry',
                total: retryTotal,
                correct: retryCorrect,
                percentage: recoveryRate,
                duration_sec: retryDuration,
                weak: sessionAnswers.filter(a => !a.correct).map(a => {
                    const q2 = findQuestionById(a.id);
                    return q2 ? q2.keyword : a.id;
                }).join(', '),
                type_breakdown: '',
                hint_count: sessionAnswers.filter(a => a.hint_used).length,
                metrics: null,
                details: sessionAnswers.map(a =>
                    a.id + (a.correct ? '✓(회복)' : '✗') + a.time_sec + 's'
                ).join(', '),
                questions: sessionAnswers,
                timestamp: new Date().toISOString(),
                partial: false,
                retry: true,
                recovery_rate: recoveryRate
            };

            const logsKey = (typeof currentLesson === 'string' && isNaN(currentLesson)) ? `quiz_logs_${currentLesson}` : `quiz_logs_L${currentLesson}`;
            const logs = JSON.parse(localStorage.getItem(logsKey) || '[]');
            logs.push(retryLog);
            localStorage.setItem(logsKey, JSON.stringify(logs));

            // 상태 초기화
            retryMode = false;
            originalSessionAnswers = [];
            originalSession = [];

            updateStats();
            showPage('result-page');
            sendToGoogleSheets();
        }

        // 문항 ID로 question 객체 찾기 (모든 과목 대응)
        function findQuestionById(id) {
            if (!QUIZ_DATA) return null;
            // questions 배열 검색 (영어/국어 실전)
            if (QUIZ_DATA.questions) {
                const found = QUIZ_DATA.questions.find(x => x.id === id);
                if (found) return found;
            }
            // exam_prep 배열 (수학)
            if (QUIZ_DATA.exam_prep) {
                const found = QUIZ_DATA.exam_prep.find(x => x.id === id);
                if (found) return found;
            }
            // procedure_drills 배열 (수학)
            if (QUIZ_DATA.procedure_drills) {
                const found = QUIZ_DATA.procedure_drills.find(x => x.id === id);
                if (found) return found;
            }
            // currentSession에서 직접 검색 (최후 수단)
            const sess = retryMode ? originalSession : currentSession;
            if (sess) {
                const found = sess.find(x => x.id === id);
                if (found) return found;
            }
            return null;
        }

        // Google Sheets 전송
        async function sendToGoogleSheets() {
            const webhookUrl = localStorage.getItem('webhook_url');
            if (!webhookUrl) return;

            // 모든 레슨 로그 자동 수집 (L1, L2, L3, ... 무제한)
            const allLogs = [];
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k === 'quiz_logs' || k.startsWith('quiz_logs_L') || k.startsWith('quiz_logs_kor') || k.startsWith('quiz_logs_math') || k.startsWith('quiz_logs_soc') || k.startsWith('quiz_logs_sci')) {
                    const items = JSON.parse(localStorage.getItem(k) || '[]');
                    items.forEach(log => allLogs.push(log));
                }
            }
            // timestamp 기준 중복 제거
            const seen = new Set();
            const logs = allLogs.filter(log => {
                if (seen.has(log.timestamp)) return false;
                seen.add(log.timestamp);
                return true;
            });
            const sentKeys = JSON.parse(localStorage.getItem('sent_logs') || '[]');

            logs.forEach((log, idx) => {
                const key = log.timestamp;
                if (sentKeys.includes(key)) return;

                const m = log.metrics || {};
                const data = {
                    lesson: log.lesson || currentLesson || 1,
                    subject: log.subject || 'english',
                    date: log.date,
                    session_type: log.session_type || '',
                    total: log.total,
                    correct: log.correct,
                    percentage: log.percentage,
                    duration_sec: log.duration_sec || 0,
                    weak: log.weak || '',
                    type_breakdown: log.type_breakdown || '',
                    hint_count: log.hint_count || 0,
                    a_group_recovery: m.a_group_recovery != null ? m.a_group_recovery : '',
                    first_attempt_rate: m.first_attempt_rate != null ? m.first_attempt_rate : '',
                    arrange_success: m.arrange_success != null ? m.arrange_success : '',
                    details: log.details || '',
                    partial: log.partial ? 'Y' : 'N',
                    retry: log.retry ? 'Y' : 'N',
                    recovery_rate: log.recovery_rate != null ? log.recovery_rate : '',
                    timestamp: log.timestamp
                };

                fetch(webhookUrl, {
                    method: 'POST',
                    body: JSON.stringify(data)
                }).then(() => {
                    sentKeys.push(key);
                    localStorage.setItem('sent_logs', JSON.stringify(sentKeys));
                }).catch(() => {});
            });
        }

        // 미전송 로그 재전송
        function retransmitUnsentLogs() {
            sendToGoogleSheets();
        }

        // 유틸리티
        function today() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // ============================================================
        // 수학 모듈: renderMath, 세션 생성기, 렌더러
        // ============================================================

        // 수식 마크업 변환: {f:분자:분모} → 분수, {r:숫자} → 순환마디, {s:n} → 위첨자
        function renderMath(str) {
            if (!str) return '';
            return str
                .replace(/\{f:([^:}]+):([^}]+)\}/g, '<span class="mfrac"><span class="mnum">$1</span><span class="mden">$2</span></span>')
                .replace(/\{r:([^}]+)\}/g, '<span class="mrep">$1</span>')
                .replace(/\{s:([^}]+)\}/g, '<sup>$1</sup>');
        }

        // 수학 개념카드 세션 생성
        // =========================================================
        // 사회/과학 공통: 개념정리 + 실전문제 세션 엔진
        // =========================================================
        function generateStudyConceptSession() {
            const cards = QUIZ_DATA.concept_cards || [];
            const limited = limitConceptCards(cards);
            return limited.map(c => ({...c, type: 'study_concept_card'}));
        }

        function generateStudyExamSession() {
            const questions = QUIZ_DATA.exam_prep || [];
            if (questions.length === 0) return [];
            // A군 우선, B군 보충, C군 후순위 — 최대 15문항
            // 각 군 내에서 priorityScore 기준 정렬 (틀린 문항 우선)
            const aGroup = questions.filter(q => q.score_group === 'A');
            const bGroup = questions.filter(q => q.score_group === 'B');
            const cGroup = questions.filter(q => q.score_group === 'C');
            aGroup.sort((a, b) => priorityScore(b) - priorityScore(a));
            bGroup.sort((a, b) => priorityScore(b) - priorityScore(a));
            cGroup.sort((a, b) => priorityScore(b) - priorityScore(a));
            const session = [...aGroup, ...bGroup.slice(0, 8), ...cGroup.slice(0, 2)].slice(0, 15);
            shuffleArray(session);
            return session;
        }

        // 사회/과학 개념카드 렌더러
        // ── 개념카드 텍스트 자동 하이라이트 ──
        function highlightText(text, term) {
            if (!text) return text;
            let s = text;

            // 1) 해당 카드의 term이 설명에 등장하면 형광펜
            if (term) {
                const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                s = s.replace(new RegExp('(' + escaped + ')', 'g'), '<span class="hl-term">$1</span>');
            }

            // 2) 「」 『』 작품명/용어 → 굵게
            s = s.replace(/([「『][^」』]+[」』])/g, '<span class="hl-quote">$1</span>');

            // 3) 숫자+단위 (g/cm³, °C, %, mL 등) → 파란 볼드
            s = s.replace(/(\d+\.?\d*\s*(?:g\/cm[³3]|°C|%|mL|cm|kg|g|m\/s|J|N|L|mol))/g, '<span class="hl-formula">$1</span>');

            // 4) = 등호 포함 공식 (밀도 = 질량 ÷ 부피 등) → 파란 볼드
            s = s.replace(/([\w가-힣]+\s*[=＝]\s*[\w가-힣\s÷×\+\-\/\(\)]+)/g, '<span class="hl-formula">$1</span>');

            // 5) 핵심 패턴: ~(이)란, ~(이)라 하, ~을/를 뜻 → 정의 밑줄
            s = s.replace(/([\w가-힣]+(?:이란|란|이라 하|라 하|을 뜻하|를 뜻하|을 의미하|를 의미하)[^\.\,]*)/g, '<span class="hl-keyword">$1</span>');

            return s;
        }

        // 사회/과학 선택형 렌더러 — 보기 셔플 포함
        function showStudyChoice(q) {
            const container = document.getElementById('question-container');
            container.style.display = 'block';
            const subjectColor = currentSubject === 'social' ? '#2E7D32' : '#1565C0';

            let sentenceHtml = q.sentence ? `<div style="font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line;background:#F1F8E9;padding:12px;border-radius:8px;">${q.sentence}</div>` : '';
            let questionHtml = q.question ? `<div style="font-size:15px;font-weight:600;margin-bottom:12px;">${q.question.replace(/(틀린|아닌|않는|없는|못한|아닌 것|틀린 것|해당하지 않는|거리가 먼|적절하지 않은|올바르지 않은)/g, '<span style="color:#E53935;font-weight:700;text-decoration:underline;text-decoration-color:#E53935;">\$1</span>')}</div>` : '';

            // 보기 셔플
            const shuffled = q.options.map((opt, idx) => ({ origIdx: idx, opt }));
            shuffleArray(shuffled);
            // 셔플 맵 저장 (checkStudyChoice에서 사용)
            window._studyShuffleMap = shuffled;

            let optionsHtml = shuffled.map((item, i) => {
                const label = String.fromCharCode(0x2460 + i);
                return `<button class="option-btn" style="display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border:2px solid #ddd;border-radius:10px;background:white;font-size:15px;cursor:pointer;line-height:1.5;" onclick="checkStudyChoice(this, ${i})">${label} ${item.opt}</button>`;
            }).join('');

            container.innerHTML = sentenceHtml + questionHtml + `<div id="study-options">${optionsHtml}</div>`;
            document.getElementById('question-text').innerHTML = q.instruction || '';
            document.getElementById('btn-hint').style.display = q.hint ? '' : 'none';

                document.getElementById('btn-hint').onclick = function() {

                    document.getElementById('hint-display').textContent = q.hint;
                    hintUsedThisQuestion = true;
                };
            }
        }

        function checkStudyChoice(btn, displayIdx) {
            const q = currentSession[currentQuestionIndex];
            const isMulti = Array.isArray(q.correct);
            const origIdx = window._studyShuffleMap[displayIdx].origIdx;
            const isCorrect = isMulti ? q.correct.includes(origIdx) : origIdx === q.correct;

            document.querySelectorAll('#study-options .option-btn').forEach((b, i) => {
                b.disabled = true;
                b.style.cursor = 'default';
                const correctArr = isMulti ? q.correct : [q.correct];
                if (correctArr.includes(window._studyShuffleMap[i].origIdx)) {
                    b.style.background = '#E8F5E9';
                    b.style.borderColor = '#4CAF50';
                }
            });

            if (!isCorrect) {
                btn.style.background = '#FFEBEE';
                btn.style.borderColor = '#F44336';
                if (q.wrong_explanations && q.wrong_explanations[String(origIdx)]) {
                    const wrongDiv = document.createElement('div');
                    wrongDiv.className = 'wrong-explanation';
                    wrongDiv.style.cssText = 'background:#FFEBEE;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.5;';
                    wrongDiv.innerHTML = '❌ ' + q.wrong_explanations[String(origIdx)];
                    document.getElementById('study-options').appendChild(wrongDiv);
                }
            } else {
                btn.style.background = '#E8F5E9';
                btn.style.borderColor = '#4CAF50';
            }

            if (q.explanation) {
                const expDiv = document.createElement('div');
                expDiv.className = 'correct-answer-display';
                expDiv.style.cssText = 'background:#F5F5F5;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line;';
                expDiv.innerHTML = '📝 ' + q.explanation;
                document.getElementById('study-options').appendChild(expDiv);
            }

            // 오답 시 관련 개념카드 보기 버튼
            if (!isCorrect && q.linked_concept && q.linked_concept.length > 0) {
                const conceptCards = QUIZ_DATA.concept_cards || [];
                const linked = conceptCards.filter(c => q.linked_concept.includes(c.id));
                if (linked.length > 0) {
                    const linkDiv = document.createElement('div');
                    linkDiv.style.cssText = 'margin-top:10px;';
                    linkDiv.innerHTML = linked.map(c =>
                        `<button onclick="showLinkedConceptPopup('${c.id}')" style="display:inline-flex;align-items:center;gap:6px;padding:10px 16px;margin:4px;border:2px solid #7C4DFF;border-radius:10px;background:#EDE7F6;color:#4527A0;font-size:14px;font-weight:600;cursor:pointer;">📚 <span>${c.term}</span> 개념 복습</button>`
                    ).join('');
                    document.getElementById('study-options').appendChild(linkDiv);
                }
            }

            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // 오답→개념카드 팝업 오버레이
        function showLinkedConceptPopup(cardId) {
            const conceptCards = QUIZ_DATA.concept_cards || [];
            const card = conceptCards.find(c => c.id === cardId);
            if (!card) return;

            const overlay = document.createElement('div');
            overlay.id = 'concept-popup-overlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
            overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

            const subjectColor = currentSubject === 'social' ? '#2E7D32' : '#1565C0';
            const popup = document.createElement('div');
            popup.style.cssText = 'background:white;border-radius:16px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.3);position:relative;';

            popup.innerHTML = `
                <button onclick="document.getElementById('concept-popup-overlay').remove()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:24px;cursor:pointer;color:#999;padding:4px 8px;">✕</button>
                <div style="font-size:12px;color:${subjectColor};font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">📚 관련 개념카드</div>
                <div style="font-size:20px;font-weight:700;color:#333;margin-bottom:16px;">${card.term}</div>
                ${card.visual_svg ? `<div style="margin-bottom:16px;text-align:center;overflow-x:auto;max-width:100%;">${card.visual_svg.replace(/<svg /,'<svg style="max-width:100%;height:auto;" ')}</div>` : ''}
                <div style="font-size:16px;line-height:1.7;margin-bottom:16px;color:#333;">💡 ${highlightText(card.easy_explanation, card.term)}</div>
                <div style="font-size:13px;color:#888;border-top:1px solid #eee;padding-top:10px;line-height:1.6;">📖 교과서 표현: ${highlightText(card.definition, card.term)}</div>
                ${card.exam_tip ? `<div style="margin-top:10px;font-size:13px;background:#FFF8E1;padding:10px;border-radius:8px;line-height:1.5;">🎯 시험 팁: ${highlightText(card.exam_tip, card.term)}</div>` : ''}
                ${card.related_terms ? `<div style="margin-top:10px;font-size:12px;color:#999;">🔗 관련: ${card.related_terms.join(', ')}</div>` : ''}
            `;

            overlay.appendChild(popup);
            document.body.appendChild(overlay);
        }

        // 영어 핵심문장 복습 팝업
        function showCoreSentencePopup(csId) {
            const coreSentences = QUIZ_DATA.core_sentences || [];
            const cs = coreSentences.find(s => s.id === csId);
            if (!cs) return;

            // 연결된 pair 문장 찾기
            const pair = cs.pair_id ? coreSentences.find(s => s.id === cs.pair_id) : null;

            // 연결된 문법 규칙 찾기
            const grammarRules = QUIZ_DATA.grammar_rules || [];
            const linkedRules = (cs.linked_rule_ids || []).map(rid => grammarRules.find(r => r.id === rid)).filter(Boolean);

            const overlay = document.createElement('div');
            overlay.id = 'cs-popup-overlay';
            overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
            overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

            const popup = document.createElement('div');
            popup.style.cssText = 'background:white;border-radius:16px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.3);position:relative;';

            let html = `
                <button onclick="document.getElementById('cs-popup-overlay').remove()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:24px;cursor:pointer;color:#999;padding:4px 8px;">✕</button>
                <div style="font-size:12px;color:#2F5496;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">📖 핵심문장 복습</div>
                <div style="font-size:18px;font-weight:700;color:#1565C0;margin-bottom:6px;line-height:1.5;">${cs.text_en}</div>
                <div style="font-size:15px;color:#555;margin-bottom:16px;line-height:1.5;">${cs.text_ko}</div>
            `;

            // TTS 버튼
            html += `<button onclick="speakEnglish('${cs.text_en.replace(/'/g, "\\'")}')" style="display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid #90CAF9;border-radius:8px;background:#E3F2FD;color:#1565C0;font-size:13px;cursor:pointer;margin-bottom:16px;">🔊 발음 듣기</button>`;

            // 출처
            if (cs.source) {
                html += `<div style="font-size:12px;color:#999;margin-bottom:12px;">📍 출처: ${cs.source.replace(/_/g, ' ')}</div>`;
            }

            // pair 문장
            if (pair) {
                html += `<div style="background:#F3E5F5;border-radius:10px;padding:12px;margin-bottom:12px;">
                    <div style="font-size:12px;color:#7B1FA2;font-weight:600;margin-bottom:4px;">🔗 짝 문장</div>
                    <div style="font-size:15px;color:#4A148C;font-weight:600;">${pair.text_en}</div>
                    <div style="font-size:14px;color:#666;margin-top:2px;">${pair.text_ko}</div>
                </div>`;
            }

            // 연결된 문법 규칙
            if (linkedRules.length > 0) {
                linkedRules.forEach(rule => {
                    html += `<div style="background:#E8F5E9;border-radius:10px;padding:12px;margin-bottom:8px;">
                        <div style="font-size:12px;color:#2E7D32;font-weight:600;margin-bottom:4px;">📐 문법: ${rule.name || rule.id}</div>
                        <div style="font-size:14px;color:#333;line-height:1.6;">${rule.description || ''}</div>
                        ${rule.example ? `<div style="font-size:13px;color:#1B5E20;margin-top:6px;font-style:italic;">예: ${rule.example}</div>` : ''}
                    </div>`;
                });
            }

            popup.innerHTML = html;
            overlay.appendChild(popup);
            document.body.appendChild(overlay);
        }

        function generateMathConceptSession() {
            const cards = QUIZ_DATA.concept_cards || [];
            const limited = limitConceptCards(cards);
            return limited.map(c => ({...c, type: 'math_concept_card'}));
        }

        // 수학 절차 드릴 세션 생성
        function generateMathProcedureSession() {
            const drills = QUIZ_DATA.procedure_drills || [];
            const shuffled = [...drills];
            shuffleArray(shuffled);
            return shuffled.map(d => ({...d, type: 'procedure_drill'}));
        }

        // 수학 개념카드 렌더러
        function showMathConceptCard(q) {
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="mc-card" onclick="this.classList.toggle('flipped')">
                    <div class="mc-front">
                        <div class="mc-title">${q.title}</div>
                        <div class="mc-question">${renderMath(q.front)}</div>
                        <div class="mc-tap">탭하면 답 보기</div>
                    </div>
                    <div class="mc-back">
                        ${q.visual_svg ? `<div style="margin-bottom:12px;text-align:center;overflow-x:auto;max-width:100%;">${q.visual_svg.replace(/<svg /,'<svg style="max-width:100%;height:auto;" ')}</div>` : ''}
                        <div class="mc-def">${highlightText(renderMath(q.back_definition), q.title)}</div>
                        <div class="mc-easy">💡 ${highlightText(renderMath(q.back_easy), q.title)}</div>
                        ${q.back_example ? `<div class="mc-example">📚 예시\n${renderMath(q.back_example)}</div>` : ''}
                        ${q.exam_tip ? `<div class="mc-tip">🎯 시험 팁: ${highlightText(renderMath(q.exam_tip), q.title)}</div>` : ''}
                    </div>
                </div>
                ${browseNavButtons('다음 카드 →', '#D4760A')}
            `;
            document.getElementById('btn-hint').style.display = 'none';
        }

        // 절차 드릴 렌더러
        function showProcedureDrill(q) {
            const container = document.getElementById('question-container');
            window._pdState = { drill: q, stepIndex: 0, correctSteps: 0 };

            let html = `
                <div style="background:#FFF3E0;border-radius:12px;padding:16px;margin-bottom:16px;">
                    <div style="font-size:13px;color:#D4760A;font-weight:600;margin-bottom:4px;">${q.category} 문제</div>
                    <div style="font-size:17px;font-weight:700;line-height:1.5;">${renderMath(q.problem)}</div>
                </div>
                <div id="pd-steps-container"></div>
                <div id="pd-final-result" style="display:none;"></div>
            `;
            container.innerHTML = html;
            document.getElementById('btn-hint').style.display = 'none';
            showProcedureStep();
        }

        function showProcedureStep() {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            if (!step) {
                // 모든 스텝 완료
                showProcedureFinal();
                return;
            }

            const stepsContainer = document.getElementById('pd-steps-container');
            const stepDiv = document.createElement('div');
            stepDiv.className = 'pd-step';
            stepDiv.id = 'pd-step-' + state.stepIndex;

            let inputHtml = '';
            if (step.input_type === 'choice') {
                inputHtml = step.options.map((opt, i) =>
                    `<button class="pd-choice-btn" onclick="checkProcedureAnswer(this, '${opt.replace(/'/g, "\\'")}')">${renderMath(opt)}</button>`
                ).join('');
            } else {
                inputHtml = `
                    <input type="text" class="pd-step-input" id="pd-input-${state.stepIndex}" placeholder="답 입력" onkeydown="if(event.key==='Enter'){document.getElementById('pd-check-${state.stepIndex}').click();}">
                    <button class="pd-step-btn" id="pd-check-${state.stepIndex}" onclick="checkProcedureTextAnswer(${state.stepIndex})" style="background:#D4760A;color:white;">확인</button>
                `;
            }

            stepDiv.innerHTML = `
                <div class="pd-step-label">${step.label}</div>
                ${step.why ? `<div class="pd-step-why">${step.why}</div>` : ''}
                <div class="pd-step-question">${renderMath(step.question)}</div>
                <div id="pd-input-area-${state.stepIndex}">${inputHtml}</div>
                <div id="pd-feedback-${state.stepIndex}"></div>
            `;

            stepsContainer.appendChild(stepDiv);

            // 텍스트 입력이면 포커스
            const inp = document.getElementById('pd-input-' + state.stepIndex);
            if (inp) setTimeout(() => inp.focus(), 100);
        }

        function checkProcedureAnswer(btn, answer) {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            const isCorrect = step.correct.includes(answer);

            // 모든 버튼 비활성화
            const area = document.getElementById('pd-input-area-' + state.stepIndex);
            area.querySelectorAll('.pd-choice-btn').forEach(b => {
                b.disabled = true;
                b.style.cursor = 'default';
                if (step.correct.includes(b.textContent.trim())) {
                    b.style.background = '#E8F5E9';
                    b.style.borderColor = '#4CAF50';
                    b.style.color = '#2E7D32';
                }
            });

            if (!isCorrect) {
                btn.style.background = '#FFEBEE';
                btn.style.borderColor = '#F44336';
                btn.style.color = '#C62828';
            } else {
                state.correctSteps++;
            }

            showProcedureFeedback(isCorrect);
        }

        function checkProcedureTextAnswer(stepIdx) {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            const input = document.getElementById('pd-input-' + stepIdx);
            const answer = input.value.trim();

            if (!answer) return;

            // 정답 체크: correct 배열의 어느 하나와 일치하면 정답
            const isCorrect = step.correct.some(c =>
                answer.replace(/\s/g, '') === c.replace(/\s/g, '')
            );

            input.disabled = true;
            const checkBtn = document.getElementById('pd-check-' + stepIdx);
            if (checkBtn) checkBtn.disabled = true;

            if (isCorrect) {
                input.style.borderColor = '#4CAF50';
                input.style.background = '#E8F5E9';
                state.correctSteps++;
            } else {
                input.style.borderColor = '#F44336';
                input.style.background = '#FFEBEE';
            }

            showProcedureFeedback(isCorrect);
        }

        function showProcedureFeedback(isCorrect) {
            const state = window._pdState;
            const step = state.drill.steps[state.stepIndex];
            const feedbackDiv = document.getElementById('pd-feedback-' + state.stepIndex);

            if (isCorrect) {
                feedbackDiv.innerHTML = `<div class="pd-feedback correct">✅ 맞았어!</div>`;
            } else {
                feedbackDiv.innerHTML = `<div class="pd-feedback wrong">❌ ${renderMath(step.wrong_feedback)}</div>`;
            }

            // 다음 스텝으로
            state.stepIndex++;
            setTimeout(() => showProcedureStep(), 800);
        }

        function showProcedureFinal() {
            const state = window._pdState;
            const total = state.drill.steps.length;
            const correct = state.correctSteps;
            const resultDiv = document.getElementById('pd-final-result');
            const pct = Math.round(correct / total * 100);

            let emoji = pct === 100 ? '🎉' : pct >= 50 ? '👍' : '💪';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="text-align:center;padding:20px;background:${pct === 100 ? '#E8F5E9' : '#FFF8E1'};border-radius:12px;margin-top:16px;">
                    <div style="font-size:32px;">${emoji}</div>
                    <div style="font-size:18px;font-weight:700;margin:8px 0;">${correct}/${total} 단계 정답</div>
                    <div style="font-size:14px;color:#666;">최종 답: ${renderMath(state.drill.final_answer)}</div>
                </div>
                <button class="next-btn" onclick="showNextQuestion()" style="margin-top:16px;width:100%;padding:14px;font-size:16px;background:#D4760A;color:white;border:none;border-radius:10px;cursor:pointer;">다음 문제 →</button>
            `;
        }

        // 수학 선택형 렌더러
        // 수학 선택형 — 보기 셔플 맵 (원본 인덱스 추적)
        let mathShuffleMap = []; // [{origIdx, opt}]

        function showMathChoice(q) {
            const container = document.getElementById('question-container');
            container.style.display = 'block';

            const isMulti = Array.isArray(q.correct);
            let sentenceHtml = q.sentence ? `<div style="font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line;background:#FFF8E1;padding:12px;border-radius:8px;">${renderMath(q.sentence)}</div>` : '';

            // 보기 셔플 (원본 인덱스 보존)
            mathShuffleMap = q.options.map((opt, idx) => ({ origIdx: idx, opt }));
            shuffleArray(mathShuffleMap);

            let optionsHtml = mathShuffleMap.map((item, i) => {
                const label = String.fromCharCode(0x2460 + i); // ①②③④⑤
                return `<button class="option-btn" style="display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;border:2px solid #ddd;border-radius:10px;background:white;font-size:15px;cursor:pointer;line-height:1.5;" onclick="checkMathChoice(this, ${i})">${label} ${renderMath(item.opt)}</button>`;
            }).join('');

            container.innerHTML = sentenceHtml + `<div id="math-options">${optionsHtml}</div>`;

            document.getElementById('question-text').innerHTML = q.instruction ? renderMath(q.instruction) : '';
            document.getElementById('btn-hint').style.display = q.hint ? '' : 'none';

            if (q.hint) {
                document.getElementById('btn-hint').onclick = function() {
                    document.getElementById('hint-display').style.display = 'block';
                    document.getElementById('hint-display').innerHTML = renderMath(q.hint);
                    hintUsedThisQuestion = true;
                };
            }
        }

        function checkMathChoice(btn, displayIdx) {
            const q = currentSession[currentQuestionIndex];
            const isMulti = Array.isArray(q.correct);
            const origIdx = mathShuffleMap[displayIdx].origIdx;
            let isCorrect;

            if (isMulti) {
                isCorrect = q.correct.includes(origIdx);
            } else {
                isCorrect = origIdx === q.correct;
            }

            // 모든 버튼 비활성화 + 정답 표시
            document.querySelectorAll('#math-options .option-btn').forEach((b, i) => {
                b.disabled = true;
                b.style.cursor = 'default';
                const correctArr = isMulti ? q.correct : [q.correct];
                if (correctArr.includes(mathShuffleMap[i].origIdx)) {
                    b.style.background = '#E8F5E9';
                    b.style.borderColor = '#4CAF50';
                }
            });

            if (!isCorrect) {
                btn.style.background = '#FFEBEE';
                btn.style.borderColor = '#F44336';
                // 오답 해설 (원본 인덱스로 참조)
                if (q.wrong_explanations && q.wrong_explanations[origIdx]) {
                    const wrongDiv = document.createElement('div');
                    wrongDiv.className = 'wrong-explanation';
                    wrongDiv.style.cssText = 'background:#FFEBEE;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.5;';
                    wrongDiv.innerHTML = '❌ ' + renderMath(q.wrong_explanations[origIdx]);
                    document.getElementById('math-options').appendChild(wrongDiv);
                }
            } else {
                btn.style.background = '#E8F5E9';
                btn.style.borderColor = '#4CAF50';
            }

            if (q.explanation) {
                const expDiv = document.createElement('div');
                expDiv.className = 'correct-answer-display';
                expDiv.style.cssText = 'background:#F5F5F5;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line;';
                expDiv.innerHTML = '📝 ' + renderMath(q.explanation);
                document.getElementById('math-options').appendChild(expDiv);
            }

            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // 수학 직접입력 렌더러
        function showMathTypedAnswer(q) {
            const container = document.getElementById('question-container');
            container.style.display = 'block';

            let sentenceHtml = q.sentence ? `<div style="font-size:15px;line-height:1.7;margin-bottom:16px;white-space:pre-line;background:#FFF8E1;padding:12px;border-radius:8px;">${renderMath(q.sentence)}</div>` : '';

            container.innerHTML = sentenceHtml + `
                <input type="text" id="math-typed-input" style="width:100%;padding:14px;border:2px solid #D4760A;border-radius:10px;font-size:18px;text-align:center;box-sizing:border-box;" placeholder="답 입력 (예: 5/9)" onkeydown="if(event.key==='Enter')checkMathTypedAnswer()">
                <button onclick="checkMathTypedAnswer()" style="width:100%;margin-top:10px;padding:14px;background:#D4760A;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;">확인</button>
                <div id="math-typed-feedback"></div>
            `;

            document.getElementById('question-text').innerHTML = q.instruction ? renderMath(q.instruction) : '';
            setTimeout(() => document.getElementById('math-typed-input')?.focus(), 100);

            // 힌트
            document.getElementById('btn-hint').style.display = q.hint ? '' : 'none';
            if (q.hint) {
                document.getElementById('btn-hint').onclick = function() {
                    document.getElementById('hint-display').style.display = 'block';
                    document.getElementById('hint-display').innerHTML = renderMath(q.hint);
                    hintUsedThisQuestion = true;
                };
            }
        }

        function checkMathTypedAnswer() {
            const q = currentSession[currentQuestionIndex];
            const input = document.getElementById('math-typed-input');
            const answer = input.value.trim();
            if (!answer) return;

            input.disabled = true;

            const allCorrect = [...(q.correct || []), ...(q.alt_correct || [])];
            const isCorrect = allCorrect.some(c => answer.replace(/\s/g, '') === c.replace(/\s/g, ''));

            const feedback = document.getElementById('math-typed-feedback');
            if (isCorrect) {
                input.style.borderColor = '#4CAF50';
                input.style.background = '#E8F5E9';
                feedback.innerHTML = `<div style="background:#E8F5E9;padding:12px;border-radius:8px;margin-top:8px;color:#2E7D32;font-size:15px;">✅ 정답!</div>`;
            } else {
                input.style.borderColor = '#F44336';
                input.style.background = '#FFEBEE';
                feedback.innerHTML = `<div style="background:#FFEBEE;padding:12px;border-radius:8px;margin-top:8px;color:#C62828;font-size:14px;line-height:1.5;">❌ 정답: ${renderMath(q.correct[0])}</div>`;
            }

            if (q.explanation) {
                feedback.innerHTML += `<div style="background:#F5F5F5;padding:12px;border-radius:8px;margin-top:8px;font-size:14px;line-height:1.6;white-space:pre-line;">📝 ${renderMath(q.explanation)}</div>`;
            }

            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // 앱 시작
        window.addEventListener('load', init);
    </script>
</body>
</html>

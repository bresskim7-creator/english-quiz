        // B-4: Exam Prep Session Engine — training_layer 기반 3단계 구성
        // 1단계: passage_check (Stage A 4문항 워밍업)
        // 2단계: skill_focus 3~4문항
        // 3단계: mixed_practice 2~3문항
        // 같은 레이어 내 셔플, JSON 순서 무관, fallback: mixed_practice
        function generateExamPrepSession() {
            const allQuestions = QUIZ_DATA.questions.filter(q => !HIDDEN_TYPES.has(q.type));
            const examPrepQuestions = allQuestions.filter(q => q.phase === 'exam_prep');

            // === 국어: passage_group 단위 묶음 출제 ===
            if (currentSubject === 'korean') {
                return generateKoreanExamPrepSession(examPrepQuestions);
            }

            // === 수학: 단순 무작위 20문항 (2026-05-14: score_group 운영 제거) ===
            // 기존 영어 training_layer 로직은 math 문항에 training_layer가 없어 mpPick≤3만
            // 잡혀 세션이 7~8개로 너무 작다. 수학은 별도 20문항 경로로 분리한다.
            if (currentSubject === 'math') {
                return generateMathExamSession(examPrepQuestions);
            }

            // === 영어: 기존 training_layer 기반 — 20문항 확대 (STEP98 / 2026-04-19c) ===
            // 변경: pcCap 4 유지, sfCap 4→8, mpCap 3→8. L1(pc=16,sf=42,mp=59): 4+8+8=20.
            // L3(pc=0,sf=37,mp=50): 0+8+8=16 → 잔여(sf/mp)에서 4개 보충하여 20 도달.
            // training_layer 기준 분류 (없으면 mixed_practice fallback)
            const TARGET = 20;
            const passageCheck = examPrepQuestions.filter(q => q.training_layer === 'passage_check');
            const skillFocus = examPrepQuestions.filter(q => q.training_layer === 'skill_focus');
            const mixedPractice = examPrepQuestions.filter(q =>
                q.training_layer === 'mixed_practice' || !q.training_layer
            );

            // passage_check: Stage A 우선, 최대 4문항
            const pcStageA = passageCheck.filter(q => q.passage_stage === 'A');
            const pcOther = passageCheck.filter(q => q.passage_stage !== 'A');
            shuffleArray(pcStageA);
            shuffleArray(pcOther);
            const pcPool = pcStageA.concat(pcOther);
            const pcCap = 4;
            const pcPick = pcPool.slice(0, pcCap);

            // skill_focus: 최대 8문항 (2026-05-14: A군 우선 정렬 제거 → 단순 무작위)
            const sfSorted = [...skillFocus];
            shuffleArray(sfSorted);
            const sfCap = 8;
            const sfPick = sfSorted.slice(0, sfCap);

            // mixed_practice: 최대 8문항
            shuffleArray(mixedPractice);
            const mpCap = 8;
            const mpPick = mixedPractice.slice(0, mpCap);

            // 세션 조합: 레이어 순서 유지, 레이어 내부만 셔플 (이미 셔플됨)
            let session = [...pcPick, ...sfPick, ...mpPick];

            // TARGET 미달 시 잔여 풀(pc→sf→mp 순)에서 보충
            if (session.length < TARGET) {
                const usedIds = new Set(session.map(q => q.id));
                const leftovers = [
                    ...pcPool.slice(pcCap),
                    ...sfSorted.slice(sfCap),
                    ...mixedPractice.slice(mpCap)
                ];
                for (const q of leftovers) {
                    if (session.length >= TARGET) break;
                    if (!usedIds.has(q.id)) {
                        session.push(q);
                        usedIds.add(q.id);
                    }
                }
            }

            // 세션이 비어있으면 기존 전체 풀에서 fallback
            if (session.length === 0) {
                shuffleArray(examPrepQuestions);
                return examPrepQuestions.slice(0, TARGET);
            }

            return session.slice(0, TARGET);
        }

        // multi_focus("모두고르기 5분") 세션 엔진 — generateExamPrepSession와 완전 독립.
        // 6문항 고정, 시퀀스: 1 예열 / 2-3 awkward(어색한 것 모두) / 4-6 correct(옳은 것 모두)2 + awkward1(내부 셔플).
        // 각 레이어 내부만 셔플(위치 패턴 암기 차단). 풀이 6 미달이면 있는 만큼 + 잔여 풀로 보충.
        function generateMultiFocusSession() {
            if (!QUIZ_DATA || !Array.isArray(QUIZ_DATA.questions)) return [];
            const all = QUIZ_DATA.questions.filter(q => !HIDDEN_TYPES.has(q.type));
            const pool = all.filter(q => q.focus_group === 'multi_grammar');

            const singles = pool.filter(q => q.answer_count === 1);
            const awkward = pool.filter(q => q.polarity === 'awkward');
            const correct = pool.filter(q => q.polarity === 'correct');
            shuffleArray(singles);
            shuffleArray(awkward);
            shuffleArray(correct);

            // L1 (1번): 단일 예열 1개. 풀에 단일형(answer_count:1)이 없으면 기존 어법 단답 1개로 대체.
            let warm = singles.slice(0, 1);
            if (warm.length === 0) {
                const grammarSingle = all.filter(q =>
                    (q.type === 'fill_blank' || q.type === 'choice_blank') &&
                    q.phase === 'exam_prep' &&
                    q.focus_group !== 'multi_grammar' &&
                    !(Array.isArray(q.answer_indices) && q.answer_indices.length > 0) &&
                    Array.isArray(q.linked_rule_ids) && q.linked_rule_ids.length > 0
                );
                shuffleArray(grammarSingle);
                warm = grammarSingle.slice(0, 1);
            }

            // L2 (2-3번): awkward 2개 (앞 블록 — blocked 연습, 레이어 내부 셔플은 위에서 완료)
            const awkFront = awkward.slice(0, 2);

            // L3 (4-6번): correct 2 + awkward 1, 내부 셔플 → polarity 위치 추측 차단
            const back = [];
            back.push(...correct.slice(0, 2));            // correct 최대 2
            if (awkward.length > 2) back.push(awkward[2]); // 남은 awkward 1
            shuffleArray(back);

            let session = [...warm, ...awkFront, ...back];

            // 중복 제거
            const seen = new Set();
            session = session.filter(q => {
                if (!q || seen.has(q.id)) return false;
                seen.add(q.id);
                return true;
            });

            // 6 미달 시 잔여 multi_grammar 풀에서 보충 (있는 만큼).
            // correct 과노출 방지(풀 확장 대비) → 보충은 awkward 우선, correct 후순위.
            if (session.length < 6) {
                const rest = pool.filter(q => !seen.has(q.id));
                shuffleArray(rest);
                rest.sort((a, b) => (a.polarity === 'correct' ? 1 : 0) - (b.polarity === 'correct' ? 1 : 0));
                for (const q of rest) {
                    if (session.length >= 6) break;
                    session.push(q);
                    seen.add(q.id);
                }
            }

            return session.slice(0, 6);
        }

        // 국어 실전대비 세션: passage_group 단위 묶음 출제
        function generateKoreanExamPrepSession(examPrepQuestions) {
            const passageCheck = examPrepQuestions.filter(q => q.training_layer === 'passage_check');
            const skillFocus = examPrepQuestions.filter(q => q.training_layer === 'skill_focus');
            const mixedPractice = examPrepQuestions.filter(q =>
                q.training_layer === 'mixed_practice' || !q.training_layer
            );

            // passage_group별로 묶기
            function groupByPassageGroup(questions) {
                const groups = {};
                questions.forEach(q => {
                    const pg = q.passage_group || q.id;
                    if (!groups[pg]) groups[pg] = [];
                    groups[pg].push(q);
                });
                // 각 그룹 내 group_order 정렬
                Object.values(groups).forEach(arr => arr.sort((a, b) => (a.group_order || 0) - (b.group_order || 0)));
                return groups;
            }

            const pcGroups = groupByPassageGroup(passageCheck);
            const sfGroups = groupByPassageGroup(skillFocus);

            const pcGroupKeys = Object.keys(pcGroups);
            const sfGroupKeys = Object.keys(sfGroups);
            shuffleArray(pcGroupKeys);
            shuffleArray(sfGroupKeys);

            const session = [];
            const usedGroups = new Set();
            const TARGET = 20; // STEP98 / 2026-04-19c — 시험 대비 노출량 확대 (12→20)
            const MIN_TARGET = 18; // 그룹 묶음 제약으로 20 못 채울 때 최소 보장

            // passage_check 그룹 1~3개 (단, 그룹 통째 포함 시 TARGET 초과 안 함)
            let pcCount = 0;
            for (const gk of pcGroupKeys) {
                if (pcCount >= 3) break;
                const groupItems = pcGroups[gk];
                if (session.length + groupItems.length > TARGET) continue;
                session.push(...groupItems);
                usedGroups.add(gk);
                pcCount++;
            }

            // skill_focus 그룹 1~3개 (동일 제약)
            let sfCount = 0;
            for (const gk of sfGroupKeys) {
                if (sfCount >= 3) break;
                if (usedGroups.has(gk)) continue;
                const groupItems = sfGroups[gk];
                if (session.length + groupItems.length > TARGET) continue;
                session.push(...groupItems);
                usedGroups.add(gk);
                sfCount++;
            }

            // mixed_practice로 나머지 채움 (총 TARGET 문항 목표)
            shuffleArray(mixedPractice);
            for (const q of mixedPractice) {
                if (session.length >= TARGET) break;
                session.push(q);
            }

            // 최소 MIN_TARGET 미달 시 남은 풀에서 보충
            if (session.length < MIN_TARGET) {
                const sessionIds = new Set(session.map(q => q.id));
                const remaining = examPrepQuestions.filter(q => !sessionIds.has(q.id));
                shuffleArray(remaining);
                for (const q of remaining) {
                    if (session.length >= MIN_TARGET) break;
                    session.push(q);
                }
            }

            return session;
        }

        // 수학 실전대비 세션: 단순 무작위 20문항 (2026-05-14: A/B/C 운영 제거)
        function generateMathExamSession(examPrepQuestions) {
            if (!examPrepQuestions || examPrepQuestions.length === 0) return [];
            const TARGET = 20;
            const pool = [...examPrepQuestions];
            shuffleArray(pool);
            return pool.slice(0, TARGET);
        }

        // [DEPRECATED 2026-05-14] 세션 생성 단순화로 호출처 없음. 데이터 메타 호환을 위해 함수만 보존.
        function poolByScoreGroup(questions, group) {
            const pool = questions.filter(q => Object.is(q.score_group, group));
            shuffleArray(pool); // 먼저 셔플 후 안정 정렬로 우선도 반영
            pool.sort((a, b) => priorityScore(b) - priorityScore(a));
            return pool;
        }

        // session_type 필터: 해당 세션에 투입 가능한 문항인지
        function canUseInSession(q, sType) {
            return q.session_type === sType || q.session_type === 'AB';
        }

        function generateSession() {
            const questions = QUIZ_DATA.questions;
            const TARGET = 30; // 목표 문항 수

            // 2026-05-14: 레거시 통합 세션의 A/B/C 풀링 제거 → 전체 풀 단순 무작위
            const pool = [...questions];
            shuffleArray(pool);
            const session = pool.slice(0, Math.min(TARGET, questions.length));

            // === 2. 블록 배치 규칙 적용 ===
            const ordered = applyBlockRules(session, 'A');

            return ordered.map(q => ({ ...q, poolIdx: questions.indexOf(q) }));
        }

        // =========================================================
        // 블록 배치 4규칙 (§7.4)
        // Rule 1: 블록 시작 = 가장 쉽거나 최근 맞힌 문항
        // Rule 2: 핵심 과제는 중간에 배치
        // Rule 3: 블록 끝 = 짧은 복습/전환 문항
        // Rule 4: 고부하 타입 2개 연속 금지
        // =========================================================
        function applyBlockRules(items, sType) {
            if (items.length === 0) return items;

            // 난이도 점수 (낮을수록 쉬움)
            const diffScore = q => ({ easy: 1, medium: 2, hard: 3 }[q.difficulty] || 2);

            // 부하 분류
            const isHighLoad = q => HIGH_LOAD_TASKS.has(q.test_task);
            const isLowLoad = q => ['word_recall', 'meaning_match', 'sentence_completion'].includes(q.test_task);

            // 2026-05-14: A군 선행 정렬 제거 → 난이도 순만 유지 (block rules 1·3·4는 유지)
            const sorted = [...items].sort((a, b) => diffScore(a) - diffScore(b));

            // --- Rule 1: 첫 문항 = 가장 쉬운 것 (이미 sorted[0]) ---
            // --- Rule 3: 마지막 문항 = 쉬운 것 (low load 문항 찾기) ---
            const lastIdx = sorted.length - 1;
            // 마지막에 배치할 쉬운 문항 찾기 (뒤에서 앞으로)
            let easyEndIdx = -1;
            for (let i = 1; i < sorted.length - 1; i++) {
                if (isLowLoad(sorted[i]) && diffScore(sorted[i]) <= 2) {
                    easyEndIdx = i;
                }
            }
            if (easyEndIdx > 0) {
                const easyQ = sorted.splice(easyEndIdx, 1)[0];
                sorted.push(easyQ);
            }

            // --- Rule 2: arrange 계열은 후반부에 배치 ---
            // 현재 구현은 난이도 순 + 고부하 연속 방지만 적용한다.

            // --- Rule 4: 고부하 타입 2개 연속 금지 ---
            const result = enforceNoConsecutiveHighLoad(sorted);

            return result;
        }

        // Rule 4 구현: 고부하 타입 연속 배치 해소
        function enforceNoConsecutiveHighLoad(items) {
            if (items.length <= 2) return items;

            const result = [...items];
            let maxIter = result.length * 2; // 무한루프 방지
            let swapped = true;

            while (swapped && maxIter-- > 0) {
                swapped = false;
                for (let i = 0; i < result.length - 1; i++) {
                    if (HIGH_LOAD_TASKS.has(result[i].test_task) && HIGH_LOAD_TASKS.has(result[i + 1].test_task)) {
                        // 연속 고부하 발견 — 뒤쪽 것을 저부하 문항과 교체
                        let swapIdx = -1;
                        for (let j = i + 2; j < result.length; j++) {
                            if (!HIGH_LOAD_TASKS.has(result[j].test_task)) { swapIdx = j; break; }
                        }
                        // 앞쪽에서도 찾기
                        if (swapIdx < 0) {
                            for (let j = i - 1; j >= 0; j--) {
                                if (!HIGH_LOAD_TASKS.has(result[j].test_task)) { swapIdx = j; break; }
                            }
                        }
                        if (swapIdx >= 0) {
                            [result[i + 1], result[swapIdx]] = [result[swapIdx], result[i + 1]];
                            swapped = true;
                            break; // 한 번 교체 후 처음부터 다시 확인
                        }
                    }
                }
            }
            return result;
        }


        function getExamPerfVariantKeys(q) {
            const variants = q && q.exam_perf_variants ? q.exam_perf_variants : {};
            return Object.keys(variants).filter(key => variants[key] && variants[key].active);
        }

        function getExamPerfQuestionPool() {
            if (!QUIZ_DATA) return [];
            const pools = [];
            if (Array.isArray(QUIZ_DATA.questions)) pools.push(QUIZ_DATA.questions);
            if (Array.isArray(QUIZ_DATA.exam_prep)) pools.push(QUIZ_DATA.exam_prep);
            const seen = new Set();
            const result = [];
            pools.forEach(pool => {
                pool.forEach(q => {
                    if (!q || typeof q !== 'object') return;
                    if (seen.has(q.id)) return;
                    seen.add(q.id);
                    if (getExamPerfVariantKeys(q).length > 0) result.push(q);
                });
            });
            return result;
        }

        function hasExamPerfVariants() {
            return getExamPerfQuestionPool().length > 0;
        }

        function getExamPerfModeContainer() {
            const map = {
                english: 'english-mode-selector',
                korean: 'korean-mode-selector',
                math: 'math-mode-selector',
                social: 'social-mode-selector',
                science: 'science-mode-selector'
            };
            return document.getElementById(map[currentSubject] || 'english-mode-selector');
        }

        function renderExamPerfModeButton() {
            document.querySelectorAll('.exam-perf-mode-btn').forEach(btn => btn.remove());
            const hiddenModes = HIDDEN_MODES_OUTSIDE_EXAM_WINDOW || new Set();
            if (hiddenModes.has('exam_perf') && !isExamPerfWindow()) return;

            const container = getExamPerfModeContainer();
            if (!container) return;

            const ready = hasExamPerfVariants();
            document.getElementById('mode-selector-container').style.display = 'block';
            document.getElementById('mode-preparing-msg').style.display = 'none';
            container.style.display = 'flex';

            const btn = document.createElement('button');
            btn.className = 'mode-btn exam-perf-mode-btn';
            btn.id = 'mode-exam-perf';
            btn.disabled = !ready;
            btn.innerHTML = ready
                ? '시험 수행<span class="mode-desc">조건·OMR·시간</span>'
                : '시험 수행<span class="mode-desc">준비 중</span>';
            if (ready) {
                btn.onclick = () => selectAndStart('exam_perf');
            }
            container.appendChild(btn);
            if (currentMode === 'exam_perf') btn.classList.add('active');
        }

        // multi_focus("모두고르기 5분") — 평시 전용 얇은 모드 버튼
        // 노출 조건: 영어 AND 기말범위 단원(L2/L4) AND multi_grammar 풀 존재. D-day 게이트 없음(평시 상시).
        function renderMultiFocusModeButton() {
            document.querySelectorAll('.multi-focus-mode-btn').forEach(btn => btn.remove());
            if (currentSubject !== 'english') return;
            const ln = Number(currentLesson);
            if (!(ln === 2 || ln === 4)) return;
            if (!QUIZ_DATA || !Array.isArray(QUIZ_DATA.questions)) return;
            const hasPool = QUIZ_DATA.questions.some(q => q.focus_group === 'multi_grammar' && !HIDDEN_TYPES.has(q.type));
            if (!hasPool) return;

            const container = document.getElementById('english-mode-selector');
            if (!container) return;
            document.getElementById('mode-selector-container').style.display = 'block';
            document.getElementById('mode-preparing-msg').style.display = 'none';
            container.style.display = 'flex';

            const btn = document.createElement('button');
            btn.className = 'mode-btn multi-focus-mode-btn';
            btn.id = 'mode-multi-focus';
            btn.innerHTML = '모두고르기 5분<span class="mode-desc">조건·정답개수</span>';
            btn.onclick = () => selectAndStart('multi_focus');
            container.appendChild(btn);
            if (currentMode === 'multi_focus') btn.classList.add('active');
        }

        function prepareExamPerfQuestion(q) {
            const copy = { ...q };
            const variants = q.exam_perf_variants || {};
            const keys = getExamPerfVariantKeys(q);
            copy._exam_perf = true;
            copy._exam_perf_variants = keys;
            copy._exam_condition_trap = !!(variants.condition_trap && variants.condition_trap.active);
            copy._exam_omr = !!(variants.omr_marking && variants.omr_marking.active);
            copy._exam_time_limit = variants.time_pressure && variants.time_pressure.active
                ? Number(variants.time_pressure.seconds || 0)
                : 0;
            if (copy._exam_condition_trap && variants.condition_trap.prompt_modifier) {
                const original = copy.instruction || '';
                copy.instruction = variants.condition_trap.prompt_modifier + (original ? ' · ' + original : '');
            }
            return copy;
        }

        function generateExamPerfSession() {
            const pool = getExamPerfQuestionPool();
            if (pool.length === 0) return [];
            const shuffled = [...pool];
            shuffleArray(shuffled);
            return shuffled.slice(0, Math.min(10, shuffled.length)).map(prepareExamPerfQuestion);
        }

        function resetExamPerfMetrics() {
            examPerfSessionMetrics = {
                condition_miss: 0,
                omr_miss: 0,
                timed_total: 0,
                timed_ok: 0
            };
        }

        function updateExamPerfMetrics(q, isCorrect, elapsed) {
            if (!q || !q._exam_perf) return;
            if (!examPerfSessionMetrics) resetExamPerfMetrics();
            if (q._exam_condition_trap && !isCorrect) {
                examPerfSessionMetrics.condition_miss++;
            }
            if (q._exam_omr && !isCorrect) {
                examPerfSessionMetrics.omr_miss++;
            }
            if (q._exam_time_limit) {
                examPerfSessionMetrics.timed_total++;
                if (elapsed <= q._exam_time_limit) examPerfSessionMetrics.timed_ok++;
            }
        }

        function getExamPerfLogFields() {
            if (!examPerfSessionMetrics) {
                return { condition_miss: '', omr_miss: '', time_complete: '' };
            }
            return {
                condition_miss: examPerfSessionMetrics.condition_miss || 0,
                omr_miss: examPerfSessionMetrics.omr_miss || 0,
                time_complete: examPerfSessionMetrics.timed_total > 0
                    ? (examPerfSessionMetrics.timed_ok >= examPerfSessionMetrics.timed_total ? 'Y' : 'N')
                    : ''
            };
        }

        function renderExamPerfQuestionFrame(q) {
            document.querySelectorAll('.exam-perf-frame').forEach(el => el.remove());
            if (!q || !q._exam_perf) return;
            const chips = [];
            if (q._exam_condition_trap) chips.push('조건 먼저');
            if (q._exam_omr) chips.push('OMR 번호 확인');
            if (q._exam_time_limit) chips.push(q._exam_time_limit + '초');
            const frame = document.createElement('div');
            frame.className = 'exam-perf-frame';
            frame.textContent = '시험 수행 · ' + chips.join(' · ');
            const instrEl = document.getElementById('instruction-text');
            if (instrEl) instrEl.insertAdjacentElement('afterend', frame);
        }

        // 세션 시작
        let sessionStartTime = null;
        let questionStartTime = null;

        async function startSession() {
            if (!QUIZ_DATA) {
                await loadLesson(currentLesson || 1);
            }

            // Vocab drill: separate flow
            if (currentMode === 'vocab') {
                startVocabDrill();
                return;
            }

            if (currentMode === 'exam_perf') {
                if (!isExamPerfWindow()) {
                    alert('시험 수행 모드는 시험 D-day 7일 전부터 열립니다.');
                    return;
                }
                resetExamPerfMetrics();
                currentSession = generateExamPerfSession();
                if (!currentSession || currentSession.length === 0) {
                    alert('이 과목은 시험 수행 문항을 준비 중입니다.');
                    return;
                }
                currentQuestionIndex = 0;
                sessionAnswers = [];
                sessionStartTime = Date.now();
                currentSessionMeta = {
                    type: 'exam_perf',
                    lesson: currentLesson,
                    mode: currentMode,
                    size: currentSession.length,
                    score_groups: currentSession.map(q => q.score_group || q.recovery_band || '')
                };
                document.querySelector('.header-title').textContent = getHeaderTitle('시험 수행');
                showPage('quiz-page');
                showQuestion();
                return;
            }

            // multi_focus("모두고르기 5분") — 평시 전용 얇은 모드. generateExamPrepSession와 독립.
            if (currentMode === 'multi_focus') {
                currentSession = generateMultiFocusSession();
                if (!currentSession || currentSession.length === 0) {
                    alert('이 단원은 모두고르기 문항을 준비 중입니다.');
                    return;
                }
                currentQuestionIndex = 0;
                sessionAnswers = [];
                sessionStartTime = Date.now();
                currentSessionMeta = {
                    type: 'multi_focus',
                    lesson: currentLesson,
                    mode: currentMode,
                    size: currentSession.length,
                    score_groups: currentSession.map(q => q.score_group || q.recovery_band || '')
                };
                document.querySelector('.header-title').textContent = getHeaderTitle('모두고르기 5분');
                showPage('quiz-page');
                showQuestion();
                return;
            }

            // B-4: Generate session based on mode
            let modeLabel = '';

            if (currentMode === 'social_concept' || currentMode === 'science_concept') {
                // 과학 마인드맵 허브 분기 — 과학 + mindmap 메타 있을 때만(타 과목/조건 미충족 시 기존 경로 그대로)
                if (currentSubject === 'science' && QUIZ_DATA && QUIZ_DATA.mindmap) {
                    renderMindmapHub();
                    return;
                }
                currentSession = generateStudyConceptSession();
                modeLabel = '개념 정리';
            } else if (currentMode === 'math_concept') {
                currentSession = generateMathConceptSession();
                modeLabel = '개념 카드';
            } else if (currentMode === 'math_procedure') {
                currentSession = generateMathProcedureSession();
                modeLabel = '절차 연습';
            } else if (currentMode === 'passage_guide') {
                currentSession = generatePassageGuideSession();
                modeLabel = '본문 해설';
            } else if (currentMode === 'concept_card') {
                currentSession = generateConceptCardSession();
                modeLabel = '개념 카드';
            } else if (currentMode === 'perf_assessment') {
                // Show perf assessment menu instead of starting session
                showPerfAssessmentMenu();
                return;
            } else if (currentMode === 'drill') {
                // 국어: core_sentences 플래시카드 모드
                if (currentSubject === 'korean') {
                    currentSession = generateKoreanCoreSentenceSession();
                    modeLabel = '핵심 문장';
                } else {
                    currentSession = generateDrillSession();
                    modeLabel = '문장 드릴';
                }
            } else if ((currentSubject === 'social' || currentSubject === 'science') && currentMode === 'exam_prep') {
                currentSession = generateStudyExamSession();
                modeLabel = '실전 문제';
            } else {
                currentSession = generateExamPrepSession();
                modeLabel = '실전 대비';
            }

            if (!currentSession || currentSession.length === 0) {
                alert('이 모드의 문항이 없습니다.');
                return;
            }

            // 실전 모드: 어제 틀린 문항 2~3개를 세션 앞에 워밍업으로 삽입
            if (currentMode === 'exam_prep') {
                const warmup = getYesterdayWrongQuestions(3);
                if (warmup.length > 0) {
                    // 중복 제거 (이미 세션에 포함된 ID 제외)
                    const sessionIds = new Set(currentSession.map(q => q.id));
                    const unique = warmup.filter(q => !sessionIds.has(q.id));
                    if (unique.length > 0) {
                        // 워밍업 표시용 태그 추가
                        unique.forEach(q => q._warmup = true);
                        currentSession = [...unique, ...currentSession];
                    }
                }
            }

            currentQuestionIndex = 0;
            sessionAnswers = [];
            sessionStartTime = Date.now();

            // 세션 메타 정보 저장 (메트릭 로깅용)
            currentSessionMeta = {
                type: sessionType,
                lesson: currentLesson,
                mode: currentMode,
                size: currentSession.length,
                score_groups: currentSession.map(q => q.score_group || q.recovery_band || '')
            };

            // Update header title with mode label
            document.querySelector('.header-title').textContent = getHeaderTitle(modeLabel);

            showPage('quiz-page');
            showQuestion();
        }

        // 문제 표시
        function showQuestion() {
            if (currentQuestionIndex >= currentSession.length) {
                finishSession();
                return;
            }

            const q = currentSession[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / currentSession.length) * 100;
            questionStartTime = Date.now();
            document.querySelectorAll('.exam-perf-frame').forEach(el => el.remove());

            document.getElementById('progress-fill').style.width = progress + '%';
            const retryLabel = retryMode ? '재도전 ' : '';
            document.getElementById('question-number').textContent = retryLabel + (currentQuestionIndex + 1) + ' / ' + currentSession.length;
            // 조건어 하이라이트: "틀린", "아닌", "않는", "없는", "못한" 등 부정 조건을 빨간 강조
            const instrEl = document.getElementById('instruction-text');
            const instrText = q.instruction || '';
            if (currentSubject === 'math') {
                instrEl.innerHTML = renderMath(instrText);
            } else {
                instrEl.innerHTML = instrText.replace(/(틀린|아닌|않는|없는|못한|아닌 것|틀린 것|해당하지 않는|거리가 먼|적절하지 않은|올바르지 않은)/g,
                    '<span style="color:#E53935;font-weight:700;text-decoration:underline;text-decoration-color:#E53935;">$1</span>');
            }

            // 다음 버튼 숨기기 + 이전 정답/힌트/설명 표시 제거
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('hint-display').style.display = 'none';
            document.getElementById('hint-display').textContent = '';
            hintUsedThisQuestion = false;
            document.querySelectorAll('.correct-answer-display, .wrong-explanation').forEach(el => el.remove());

            // question-text innerHTML 초기화 (dialogue/reading용)
            const questionTextEl = document.getElementById('question-text');
            questionTextEl.innerHTML = '';
            questionTextEl.style.whiteSpace = '';

            // 컨테이너 모두 숨기기 (B-6)
            document.getElementById('fill-blank-container').style.display = 'none';
            document.getElementById('arrange-container').style.display = 'none';
            document.getElementById('paragraph-order-container').style.display = 'none';
            document.getElementById('match-container').style.display = 'none';
            document.getElementById('writing-container').style.display = 'none';
            document.getElementById('flashcard-container').style.display = 'none';
            document.getElementById('typed-blank-container').style.display = 'none';
            document.getElementById('question-container').style.display = 'none';
            document.getElementById('question-container').innerHTML = '';

            // Show/hide controls based on type (B-6)
            const hintBtn = document.getElementById('btn-hint');
            const skipBtn = document.getElementById('btn-skip');
            const hideHintOnTypes = ['flashcard', 'passage_guide_picker', 'passage_guide_section', 'concept_card', 'explanation_method_card', 'reading_journal_guide', 'outline_exercise', 'position_ask'];
            hintBtn.style.display = hideHintOnTypes.includes(q.type) ? 'none' : 'inline-block';
            skipBtn.style.display = (q.type === 'arrange' || q.type === 'chunk_order') ? 'inline-block' : 'none';

            // Dispatch by type (B-6)
            const specialContainerTypes = ['passage_guide_picker', 'passage_guide_section', 'concept_card', 'explanation_method_card', 'reading_journal_guide', 'outline_exercise', 'math_concept_card', 'procedure_drill', 'study_concept_card'];
            if (specialContainerTypes.includes(q.type)) {
                document.getElementById('question-container').style.display = 'block';
            }

            if (q.type === 'math_concept_card') {
                showMathConceptCard(q);
            } else if (q.type === 'procedure_drill') {
                showProcedureDrill(q);
            } else if (q.type === 'passage_guide_picker') {
                showPassageGuidePicker(q);
            } else if (q.type === 'passage_guide_section') {
                showPassageGuideSection(q);
            } else if (q.type === 'concept_card') {
                showConceptCard(q);
            } else if (q.type === 'explanation_method_card') {
                showExplanationMethodCard(q);
            } else if (q.type === 'reading_journal_guide') {
                showReadingJournalGuide(q);
            } else if (q.type === 'outline_exercise') {
                showOutlineExercise(q);
            } else if (q.type === 'kor_core_sentence') {
                showKorCoreSentence(q);
            } else if (q.type === 'flashcard') {
                showFlashcard(q);
            } else if (q.type === 'choice_blank') {
                showChoiceBlank(q);
            } else if (q.type === 'chunk_order') {
                showChunkOrder(q);
            } else if (q.type === 'paragraph_order' || q.type === 'dialogue_order') {
                showParagraphOrder(q);
            } else if (q.type === 'typed_blank') {
                showTypedBlank(q);
            } else if (q.type === 'fill_blank' || q.type === 'position_ask') {
                if (q.type === 'position_ask') showPositionAsk(q);
                else showFillBlank(q);
            } else if (q.type === 'dialogue_response') {
                showDialogueResponse(q);
            } else if (q.type === 'short_reading') {
                showShortReading(q);
            } else if (q.type === 'arrange') {
                showArrange(q);
            } else if (q.type === 'match') {
                showMatch(q);
            } else if (q.type === 'mini_writing') {
                showMiniWriting(q);
            } else if (q.type === 'study_concept_card') {
                showStudyConceptCard(q);
            } else if (q.type === 'choice' && currentSubject === 'english') {
                showEnglishChoice(q);
            } else if (q.type === 'choice' && (currentSubject === 'social' || currentSubject === 'science')) {
                showStudyChoice(q);
            } else if (q.type === 'choice' && currentSubject === 'math') {
                showMathChoice(q);
            } else if (q.type === 'typed_answer' && currentSubject === 'math') {
                showMathTypedAnswer(q);
            } else if (q.type === 'typed_answer' && currentSubject === 'english') {
                showEnglishTypedAnswer(q);
            }

            renderExamPerfQuestionFrame(q);

            // Vocab hint: show unknown words that appear in this question
            showVocabHint(q);
        }

        // 정규화 함수: arrange 정답 비교 시 구두점 차이 무시
        function normalizeAnswer(str) {
            return str
                .replace(/[.,!?;:]/g, '')   // 모든 구두점 제거
                .replace(/\s+/g, ' ')       // 연속 공백 → 단일 공백
                .trim();
        }

        // 다음 문항으로 이동 (수동)
        function goNextQuestion() {
            document.getElementById('btn-next').style.display = 'none';
            currentQuestionIndex++;
            showQuestion();
        }

        // showNextQuestion alias for new Korean modes
        function showNextQuestion() {
            goNextQuestion();
        }

        // 이전 문항으로 돌아가기 (열람형 모드 전용)
        function goPrevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        // 열람형 모드 네비게이션 버튼 생성 헬퍼
        function browseNavButtons(nextLabel, color) {
            color = color || '#6B4C9A';
            const hasPrev = currentQuestionIndex > 0;
            const isLast = currentQuestionIndex >= currentSession.length - 1;
            let html = '<div style="display:flex;gap:8px;margin-top:16px;">';
            if (hasPrev) {
                html += `<button onclick="goPrevQuestion()" style="flex:1;padding:14px;font-size:15px;background:#f0f0f0;color:#333;border:none;border-radius:10px;cursor:pointer;">← 이전</button>`;
            }
            if (!isLast) {
                html += `<button onclick="showNextQuestion()" style="flex:${hasPrev ? '1' : '1'};padding:14px;font-size:${hasPrev ? '15' : '16'}px;background:${color};color:white;border:none;border-radius:10px;cursor:pointer;">${nextLabel}</button>`;
            } else {
                html += `<button onclick="goHome()" style="flex:1;padding:14px;font-size:15px;background:#f0f0f0;color:#333;border:none;border-radius:10px;cursor:pointer;">← 돌아가기</button>`;
            }
            html += '</div>';
            return html;
        }

        // 정답/오답 후 "다음" 버튼 표시
        function showNextButton() {
            const btn = document.getElementById('btn-next');
            btn.style.display = 'block';
            // 설명/개념카드 버튼 등이 추가되어 버튼이 화면 밖으로 밀릴 수 있으므로 스크롤
            setTimeout(() => btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 150);
        }



        function getExamPerfChoiceLabel(q, item, displayIdx) {
            if (q && q._exam_omr) return (displayIdx + 1) + '. ' + item.choice;
            return item.choice;
        }
        // Fill Blank 유형
        function showFillBlank(q) {
            document.getElementById('question-text').textContent = q.sentence;
            const container = document.getElementById('fill-blank-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            // 선택지 셔플
            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                btn.onclick = () => handleFillBlankAnswer(q, idx, newCorrect);
                container.appendChild(btn);
            });
        }

        // Dialogue Response 유형 (대화 빈칸)
        function showDialogueResponse(q) {
            // 대화 문장: \n → <br> 로 줄바꿈 처리
            const questionText = document.getElementById('question-text');
            questionText.innerHTML = q.sentence.replace(/\n/g, '<br>');
            questionText.style.whiteSpace = 'pre-line';

            const container = document.getElementById('fill-blank-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                btn.onclick = () => handleChoiceAnswer(q, idx, newCorrect, shuffled[idx].idx);
                container.appendChild(btn);
            });
        }

        // Short Reading 유형 (짧은 독해)
        function showShortReading(q) {
            const questionText = document.getElementById('question-text');
            // 지문과 질문을 분리 (\n\n 기준)
            const parts = q.sentence.split(/\n\n/);
            let html = '';

            if (parts.length >= 2) {
                let passage = parts.slice(0, -1).join('<br><br>').replace(/\n/g, '<br>');
                const question = parts[parts.length - 1];

                // symbol_marks 치환 (㉠㉡㉢ 등 → span.symbol-mark)
                if (q.symbol_marks && q.symbol_marks.length > 0) {
                    q.symbol_marks.forEach(mark => {
                        passage = passage.split(mark).join('<span class="symbol-mark">' + mark + '</span>');
                    });
                }

                // reference_type별 보기 박스 생성 (hint 타입은 힌트 버튼으로 처리 — 즉시 노출 안 함)
                let refBoxHtml = '';
                if (q.reference_type && q.reference_type !== 'hint' && q.hint) {
                    refBoxHtml = buildReferenceBox(q.reference_type, q.hint);
                }

                // background 타입은 지문 상단에 표시
                if (q.reference_type === 'background') {
                    html += refBoxHtml;
                }

                html += '<div style="background:#f0f4ff;border-left:3px solid #2F5496;padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:12px;line-height:1.8;font-size:15px;">' +
                    passage + '</div>';

                // background 외 타입은 지문 아래, 질문 위에 표시
                if (q.reference_type && q.reference_type !== 'background') {
                    html += refBoxHtml;
                }

                html += '<div style="font-weight:600;color:#333;font-size:15px;">' + question + '</div>';
            } else {
                let text = q.sentence.replace(/\n/g, '<br>');
                // symbol_marks 치환
                if (q.symbol_marks && q.symbol_marks.length > 0) {
                    q.symbol_marks.forEach(mark => {
                        text = text.split(mark).join('<span class="symbol-mark">' + mark + '</span>');
                    });
                }
                html = text;
            }

            questionText.innerHTML = html;

            const container = document.getElementById('fill-blank-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            // [12 F-1] 다중정답 모드 감지 — short_reading 확장 (choice_blank 동일 패턴)
            const isMulti = Array.isArray(q.answer_indices) && q.answer_indices.length > 0;

            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);

            if (isMulti) {
                // 다중정답: 체크박스형 토글 + 정답 개수 안내 + 제출 버튼
                const need = q.answer_indices.length;
                const info = document.createElement('div');
                info.style.cssText = 'grid-column:1/-1;background:#FFF8E1;border-left:4px solid #FFA726;padding:10px 14px;margin-bottom:8px;border-radius:0 8px 8px 0;font-size:14px;color:#5D4037;font-weight:600;';
                info.textContent = '✏️ 정답 ' + need + '개를 모두 고른 뒤 제출하세요';
                container.appendChild(info);

                const selectedSet = new Set();
                const correctSet = new Set(q.answer_indices);

                shuffled.forEach((item, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                    btn.dataset.origIdx = item.idx;
                    btn.onclick = () => {
                        if (btn.disabled) return;
                        if (btn.classList.contains('multi-selected')) {
                            btn.classList.remove('multi-selected');
                            selectedSet.delete(item.idx);
                        } else {
                            btn.classList.add('multi-selected');
                            selectedSet.add(item.idx);
                        }
                    };
                    container.appendChild(btn);
                });

                const submitBtn = document.createElement('button');
                submitBtn.id = 'multi-answer-submit';
                submitBtn.textContent = '제출';
                submitBtn.style.cssText = 'grid-column:1/-1;padding:14px;margin-top:8px;background:#1a73e8;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;';
                submitBtn.onclick = () => handleChoiceBlankMultiAnswer(q, selectedSet, correctSet);
                container.appendChild(submitBtn);
                return;
            }

            // 단일정답: 기존 로직
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                btn.onclick = () => handleChoiceAnswer(q, idx, newCorrect, shuffled[idx].idx);
                container.appendChild(btn);
            });
        }

        // reference_type별 보기 박스 HTML 생성
        function buildReferenceBox(refType, hintText) {
            const config = {
                hint:       { icon: '💡', cls: 'ref-hint' },
                concept:    { icon: '📘', cls: 'ref-concept' },
                table:      { icon: '📊', cls: 'ref-table' },
                criteria:   { icon: '✅', cls: 'ref-criteria' },
                background: { icon: '📖', cls: 'ref-background' }
            };
            const c = config[refType] || config.hint;
            let content = hintText;

            if (refType === 'table') {
                // 구분자 / 를 줄바꿈으로 표시
                content = hintText.split('/').map(s => s.trim()).join('<br>');
            } else if (refType === 'criteria') {
                // ①②③④ 기준을 리스트로 표시
                const items = hintText.split(/[①②③④⑤⑥⑦⑧⑨⑩]/).filter(s => s.trim());
                const markers = hintText.match(/[①②③④⑤⑥⑦⑧⑨⑩]/g) || [];
                if (items.length > 1) {
                    content = items.map((item, i) => (markers[i] || '') + ' ' + item.trim()).join('<br>');
                }
            }

            return '<div class="reference-box ' + c.cls + '">' + c.icon + ' ' + content + '</div>';
        }

        // 공통 선택형 답변 처리 (fill_blank / dialogue_response / short_reading)
        function handleChoiceAnswer(q, selectedIdx, correctIdx, originalIdx) {
            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            const userChoice = buttons[selectedIdx] ? buttons[selectedIdx].textContent : '';
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });

            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);

            if (!isCorrect) {
                showWrongExplanation(q, document.getElementById('fill-blank-container'), userChoice, originalIdx);
            }

            // position_ask: 답변 후 영어 원문 공개
            if (q.type === 'position_ask' && q.meaning_ko && q.sentence) {
                const revealDiv = document.createElement('div');
                revealDiv.className = 'correct-answer-display';
                revealDiv.style.cssText = 'background:#e8f5e9;border:1px solid #81c784;border-radius:8px;padding:10px 14px;margin-top:10px;font-size:15px;line-height:1.8;';
                revealDiv.innerHTML = '📖 <strong>영어 문장:</strong> ' + q.sentence;
                document.getElementById('fill-blank-container').after(revealDiv);
            }

            showNextButton();
        }

        function handleFillBlankAnswer(q, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll('#fill-blank-container .choice-btn');
            const userChoice = buttons[selectedIdx] ? buttons[selectedIdx].textContent : '';
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });

            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);

            if (!isCorrect) {
                showWrongExplanation(q, document.getElementById('fill-blank-container'), userChoice);
            }

            showNextButton();
        }

        // Arrange 유형
        function showArrange(q) {
            const qText = document.getElementById('question-text');
            let arrangeHtml = q.sentence_ko;
            if (q.sentence) {
                arrangeHtml += '<div style="margin-top:6px;color:#2F5496;font-size:0.95em;">' + q.sentence.replace(/_____/g, '<span style="border-bottom:2px solid #2F5496;padding:0 12px;">?</span>') + '</div>';
            }
            qText.innerHTML = arrangeHtml;
            const container = document.getElementById('arrange-container');
            container.style.display = 'block';

            const selected = [];
            const shuffled = [...q.words];
            shuffleArray(shuffled);

            const selectedDiv = document.getElementById('selected-words');
            const availableDiv = document.getElementById('available-words');
            selectedDiv.innerHTML = '<div style="color:#999;font-size:13px;padding:8px 0;">👆 아래 단어를 순서대로 탭하세요</div>';
            availableDiv.innerHTML = '';

            shuffled.forEach((word, idx) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.dataset.word = word;
                btn.dataset.idx = idx;
                btn.onclick = () => {
                    if (!btn.classList.contains('used')) {
                        selected.push({ word, idx });
                        btn.classList.add('used');
                        updateSelectedWords();
                    }
                };
                availableDiv.appendChild(btn);
            });

            function updateSelectedWords() {
                selectedDiv.innerHTML = '';
                selected.forEach((item, selIdx) => {
                    const tag = document.createElement('div');
                    tag.className = 'selected-word';
                    tag.textContent = item.word;
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-word-btn';
                    removeBtn.textContent = '×';
                    removeBtn.onclick = () => {
                        selected.splice(selIdx, 1);
                        document.querySelector(`[data-word="${item.word}"][data-idx="${item.idx}"]`).classList.remove('used');
                        updateSelectedWords();
                    };
                    tag.appendChild(removeBtn);
                    selectedDiv.appendChild(tag);
                });
            }

            // 모든 단어를 배치하면 자동 채점
            const checkArrange = setInterval(() => {
                if (selected.length === q.words.length) {
                    clearInterval(checkArrange);
                    const userAnswer = selected.map(x => x.word).join(' ');
                    const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(q.answer);

                    const buttons = document.querySelectorAll('#available-words .word-btn');
                    buttons.forEach((btn, idx) => {
                        if (!btn.classList.contains('used')) return;
                        if (isCorrect) btn.classList.add('correct');
                        else btn.classList.add('incorrect');
                        btn.disabled = true;
                    });

                    // 제거 버튼 비활성화
                    document.querySelectorAll('.remove-word-btn').forEach(b => b.disabled = true);

                    recordAnswer(q, isCorrect);

                    // 오답 시 정답 + 설명 표시
                    if (!isCorrect) {
                        showWrongExplanation(q, container, userAnswer);
                    }

                    document.getElementById('btn-skip').style.display = 'none';
                    showNextButton();
                }
            }, 100);
        }

        // Match 유형
        function showMatch(q) {
            document.getElementById('question-text').textContent = q.sentence_ko;
            const container = document.getElementById('match-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'match-option';
                btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                btn.onclick = () => handleMatchAnswer(q, idx, newCorrect);
                container.appendChild(btn);
            });
        }

        function handleMatchAnswer(q, selectedIdx, correctIdx) {
            const buttons = document.querySelectorAll('#match-container .match-option');
            const userChoice = buttons[selectedIdx] ? buttons[selectedIdx].textContent : '';
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === correctIdx) btn.classList.add('correct');
                if (idx === selectedIdx && idx !== correctIdx) btn.classList.add('incorrect');
            });

            const isCorrect = selectedIdx === correctIdx;
            recordAnswer(q, isCorrect);

            if (!isCorrect) {
                showWrongExplanation(q, document.getElementById('match-container'), userChoice);

        // 오답 시 이해 도움 설명 (정답을 직접 말하지 않고 이해를 유도)
        function showWrongExplanation(q, afterEl, userAnswer, originalIdx) {
            const box = document.createElement('div');
            box.className = 'wrong-explanation';
            box.style.cssText = 'background:linear-gradient(135deg,#fff8e1,#fff3e0);border-left:4px solid #FF9800;border-radius:0 10px 10px 0;padding:14px 16px;margin-top:12px;font-size:15px;color:#333;line-height:1.8;';

            const we = q.wrong_explanations || {};
            let html = '<div style="font-weight:700;color:#e65100;margin-bottom:8px;font-size:16px;">🎓 선생님 설명</div>';

            // 설명 조회: 텍스트 키 → 숫자 인덱스 키 → hint 순으로 시도
            function findExplanation(answer, idx) {
                return we[answer] || we[String(idx)] || q.hint || '';
            }

            // 부정 프레임 판별: 불일치/답할 수 없는/흐름 관계없는/틀린/어색한/옳지 않은/적절하지 않은/나오지 않은 류
            // → 정답 보기가 "본문과 어긋난 문장 / 답할 수 없는 질문 / 흐름 벗어난 문장 / 어법 틀린 문장"이라
            //   기존 "✅ 정답: [content]" 및 "📖 정답 문장을 소리 내어 읽어보면..." 라벨이 오학습을 유발.
            //   부정 프레임에서는 보기 번호만 노출하고 공통 라벨도 중립 문구로 교체.
            function isNegativeFrame(qq) {
                const s = (qq.instruction || '') + ' ' + (qq.sentence || '');
                return /일치하지 않|답할 수 없|나오지 않|원문의 뜻과 다른|흐름과 관계없|흐름에서 벗어|어색한|틀린 문장|틀린 부분|옳지 않은|적절하지 않|문법적으로 다른|용법이 다른|의미가 다른|문법적으로 올바르지 않/.test(s);
            }
            const _isNeg = isNegativeFrame(q);

            if (q.type === 'fill_blank' || q.type === 'dialogue_response' || q.type === 'short_reading') {
                const explanation = findExplanation(userAnswer, originalIdx);
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
                if (q.choices && q.correct !== undefined) {
                    if (_isNeg) {
                        html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">🎯 골라야 할 보기: ' + q.choices[q.correct] + '</div>';
                    } else {
                        html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + q.choices[q.correct] + '</div>';
                    }
                }
            } else if (q.type === 'choice_blank') {
                const explanation = findExplanation(userAnswer, originalIdx);
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
                // [06b A-1] 다중정답: q.answer_indices 우선
                if (Array.isArray(q.answer_indices) && q.choices) {
                    const correctList = q.answer_indices.map(i => q.choices[i]).join(', ');
                    html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + correctList + '</div>';
                } else if (q.choices && q.correct !== undefined) {
                    html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + q.choices[q.correct] + '</div>';
                }
            } else if (q.type === 'chunk_order') {
                const explanation = we['default'] || q.hint || '';
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
                html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + (q.answer || '') + '</div>';
            } else if (q.type === 'paragraph_order' || q.type === 'dialogue_order') {
                // [06b A-3] paragraph_order / [5/12j] dialogue_order — 정답 순서 표시
                const explanation = we['default'] || q.hint || '';
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
                const correctOrder = (q.answer || []).map(a => String(a).replace(/[()\s]/g, '')).join(' → ');
                html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답 순서: ' + correctOrder + '</div>';
            } else if (q.type === 'arrange') {
                const explanation = we['default'] || q.hint || '';
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
                html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + (q.answer || '') + '</div>';
            } else if (q.type === 'match') {
                const explanation = findExplanation(userAnswer, originalIdx);
                html += '<div style="font-size:15px;color:#333;">' + explanation + '</div>';
                if (q.choices && q.correct !== undefined) {
                    html += '<div style="margin-top:8px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + q.choices[q.correct] + '</div>';
                }
            }

            if (_isNeg) {
                html += '<div style="font-size:13px;color:#888;margin-top:8px;border-top:1px solid #ffe0b2;padding-top:6px;">📖 본문/문장을 다시 확인하며 어디가 다른지 직접 찾아보면 확실해져요!</div>';
            } else {
                html += '<div style="font-size:13px;color:#888;margin-top:8px;border-top:1px solid #ffe0b2;padding-top:6px;">📖 정답 문장을 소리 내어 읽어보면 기억에 남아요!</div>';
            }

            // 영어: 오답 시 핵심문장 복습 버튼
            if (currentSubject === 'english' && q.core_sentence_id) {
                const cs = (QUIZ_DATA.core_sentences || []).find(s => s.id === q.core_sentence_id);
                if (cs) {
                    html += `<div style="margin-top:12px;padding-top:10px;border-top:1px dashed #FFB74D;">
                        <button onclick="showCoreSentencePopup('${cs.id}')" style="display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:2px solid #2F5496;border-radius:10px;background:#E3F2FD;color:#1565C0;font-size:14px;font-weight:600;cursor:pointer;">📖 핵심문장 복습: ${cs.text_en.substring(0, 30)}${cs.text_en.length > 30 ? '...' : ''}</button>
                    </div>`;
                }

            box.innerHTML = html;
            afterEl.after(box);
        }

        // [06b A-1 + Codex Q1] 다중정답 전용 wrong explanation —
        // 잘못 고른 오답 인덱스 + 놓친 정답 인덱스를 각각 나열, 각 인덱스의 wrong_explanations[String(idx)] 표시
        function showWrongExplanationMulti(q, afterEl, selectedSet, correctSet) {
            const box = document.createElement('div');
            box.className = 'wrong-explanation';
            box.style.cssText = 'background:linear-gradient(135deg,#fff8e1,#fff3e0);border-left:4px solid #FF9800;border-radius:0 10px 10px 0;padding:14px 16px;margin-top:12px;font-size:15px;color:#333;line-height:1.8;';

            const we = q.wrong_explanations || {};
            const choices = q.choices || [];
            let html = '<div style="font-weight:700;color:#e65100;margin-bottom:8px;font-size:16px;">🎓 선생님 설명</div>';

            const wrongSelected = [...selectedSet].filter(i => !correctSet.has(i)).sort((a, b) => a - b);
            const missedCorrect = [...correctSet].filter(i => !selectedSet.has(i)).sort((a, b) => a - b);

            if (wrongSelected.length > 0) {
                html += '<div style="margin-top:6px;font-size:14px;color:#C62828;font-weight:600;">❌ 잘못 고른 보기:</div>';
                wrongSelected.forEach(idx => {
                    const text = choices[idx] || ('보기 ' + (idx + 1));
                    const explanation = we[String(idx)] || we[text] || '';
                    html += '<div style="margin:4px 0 4px 12px;font-size:14px;color:#333;">• ' +
                            text + (explanation ? '<br><span style="color:#666;font-size:13px;">→ ' + explanation + '</span>' : '') +
                            '</div>';
                });
            }

            if (missedCorrect.length > 0) {
                html += '<div style="margin-top:10px;font-size:14px;color:#1565C0;font-weight:600;">⚠️ 놓친 정답:</div>';
                missedCorrect.forEach(idx => {
                    const text = choices[idx] || ('보기 ' + (idx + 1));
                    const explanation = we[String(idx)] || we[text] || '';
                    html += '<div style="margin:4px 0 4px 12px;font-size:14px;color:#333;">• ' +
                            text + (explanation ? '<br><span style="color:#666;font-size:13px;">→ ' + explanation + '</span>' : '') +
                            '</div>';
                });
            }

            // 정답 전체 표시 (요약)
            const correctList = [...correctSet].sort((a, b) => a - b).map(i => choices[i]).join(', ');
            html += '<div style="margin-top:10px;font-size:14px;color:#2F5496;font-weight:600;">✅ 정답: ' + correctList + '</div>';

            // hint
            if (q.hint) {
                html += '<div style="font-size:13px;color:#888;margin-top:8px;border-top:1px solid #ffe0b2;padding-top:6px;">💡 ' + q.hint + '</div>';
            }

            box.innerHTML = html;
            afterEl.after(box);
        }

        // TTS: 정답 시 영어 문장 읽어주기
        let _cachedEnVoice = null;
        function speakEnglish(text) {
            if (isMuted || !window.speechSynthesis) return;
            // 이전 발화 중단
            speechSynthesis.cancel();
            // 빈칸(_____)을 쉼표로 치환 → TTS가 자연스러운 pause로 처리
            text = text.replace(/_{2,}/g, ',');
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            utter.rate = 0.85;  // 약간 느리게 (학습용)
            utter.pitch = 1.0;
            // 영어 음성 선택 (캐싱하여 매번 탐색 비용 절감)
            if (!_cachedEnVoice) {
                const voices = speechSynthesis.getVoices();
                _cachedEnVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female'))
                              || voices.find(v => v.lang.startsWith('en'))
                              || null;
            }
            if (_cachedEnVoice) utter.voice = _cachedEnVoice;
            speechSynthesis.speak(utter);
        }
        // voices가 나중에 로드되면 캐시 갱신
        if (window.speechSynthesis) {
            speechSynthesis.addEventListener('voiceschanged', () => { _cachedEnVoice = null; });
        }

        // =========================================================
        // position_ask: 어순 감각 문항
        // 문장의 N번째 단어를 묻는 4지선다
        // =========================================================
        function showPositionAsk(q) {
            const questionText = document.getElementById('question-text');
            // 한국어 해석을 보여주고, 영어 문장을 머릿속으로 떠올리게 함
            const displayText = q.meaning_ko || q.sentence;
            questionText.innerHTML = '<div class="position-sentence" style="font-size:16px;line-height:2;letter-spacing:0.5px;color:#2F5496;background:#f0f4ff;padding:12px 16px;border-radius:8px;border-left:3px solid #2F5496;">' + displayText + '</div>';
            // [3차 갭팩A] position_ask에 word_bank 존재 시 <보기> 단어 박스를 표시(표시-only, 드래그 없음).
            //   word_bank 없으면 미진입 → 기존 P001~P003 렌더/채점 동작 불변(비파괴 추가 분기).
            if (Array.isArray(q.word_bank) && q.word_bank.length) {
                var wbHtml = q.word_bank.map(function(w){ return '<span style="display:inline-block;margin:3px 4px;padding:5px 11px;background:#fff;border:1.5px solid #2F5496;border-radius:7px;font-size:14px;font-weight:600;color:#2F5496;">' + w + '</span>'; }).join('');
                var nth = q.target_position || '?';
                questionText.innerHTML = '<div style="margin-bottom:10px;padding:11px 13px;background:#eef3ff;border-radius:9px;">' +
                    '<div style="font-size:12px;font-weight:700;color:#555;margin-bottom:7px;">📦 보기 — 우리말 뜻에 맞게 배열한 뒤, ' + nth + '번째 단어를 고르세요</div>' +
                    '<div style="line-height:2.1;">' + wbHtml + '</div></div>' + questionText.innerHTML;
            }

            // 선택지는 fill-blank-container 재사용
            const container = document.getElementById('fill-blank-container');
            container.style.display = 'grid';
            container.innerHTML = '';

            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);
            const newCorrect = shuffled.findIndex(x => x.idx === q.correct);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                btn.onclick = () => handleChoiceAnswer(q, idx, newCorrect, shuffled[idx].idx);
                container.appendChild(btn);
            });
        }

        // =========================================================
        // mini_writing: 서술형 조건 충족 문항
        // 조건(필수 단어, 최소 단어 수)을 제시하고 자유 입력
        // =========================================================
        let currentWritingQ = null;

        function showMiniWriting(q) {
            currentWritingQ = q;
            // context가 있으면 question-text에 표시 (예: 합칠 두 문장, 밑줄 문장 등)
            const qTextEl = document.getElementById('question-text');
            if (q.context) {
                qTextEl.textContent = q.context;
            } else if (q.sentence) {
                qTextEl.textContent = q.sentence;
            } else {
                qTextEl.textContent = '';
            }

            const container = document.getElementById('writing-container');
            container.style.display = 'flex';

            // B-7: 조건 표시 (formal vs fallback)
            const condEl = document.getElementById('writing-condition');
            let condHtml = '<strong>조건:</strong><br>';

            // Check if formal rubric exists
            if (q.required_word || q.min_words) {
                // Formal scoring
                if (q.required_word) condHtml += '• <strong>"' + q.required_word + '"</strong>을(를) 사용하세요<br>';
                if (q.min_words) condHtml += '• ' + q.min_words + '단어 이상으로 쓰세요';
            } else if (q.wrong_explanations && q.wrong_explanations.default) {
                // Fallback: show conditions from wrong_explanations
                condHtml += q.wrong_explanations.default;
            } else {
                condHtml += '• 자유롭게 문장을 완성하세요';
            }
            condEl.innerHTML = condHtml;

            // 입력 초기화
            document.getElementById('writing-input').value = '';
            document.getElementById('writing-input').disabled = false;
            document.getElementById('writing-submit').style.display = 'block';
            document.getElementById('writing-feedback').style.display = 'none';
        }

        function checkWriting() {
            const q = currentWritingQ;
            if (!q) return;

            const input = document.getElementById('writing-input').value.trim();
            if (!input) { alert('문장을 입력해 주세요.'); return; }

            // B-7: Formal vs Fallback scoring
            let isCorrect = false;
            let feedbackEl = document.getElementById('writing-feedback');
            feedbackEl.style.display = 'block';
            document.getElementById('writing-input').disabled = true;
            document.getElementById('writing-submit').style.display = 'none';

            if (q.required_word || q.min_words) {
                // Formal scoring path
                const words = input.split(/\s+/);
                const wordCount = words.length;
                const minWords = q.min_words || 5;
                const requiredWord = q.required_word ? q.required_word.toLowerCase() : null;

                // 조건 검사
                const hasRequiredWord = requiredWord ? input.toLowerCase().includes(requiredWord) : true;
                const hasMinWords = wordCount >= minWords;
                isCorrect = hasRequiredWord && hasMinWords;

                if (isCorrect) {
                    feedbackEl.className = 'writing-feedback pass';
                    feedbackEl.innerHTML = '✅ 조건을 충족했어요!<br>(' + wordCount + '단어'
                        + (requiredWord ? ', "' + q.required_word + '" 포함' : '') + ')'
                        + (q.example_answer ? '<br><br>📝 예시 답안: <em>' + q.example_answer + '</em>' : '');
                } else {
                    let reasons = [];
                    if (!hasRequiredWord) reasons.push('"' + q.required_word + '"을(를) 사용하지 않았어요');
                    if (!hasMinWords) reasons.push(minWords + '단어 이상이어야 해요 (현재 ' + wordCount + '단어)');
                    feedbackEl.className = 'writing-feedback fail';
                    feedbackEl.innerHTML = '❌ 조건을 충족하지 못했어요.<br>• ' + reasons.join('<br>• ')
                        + (q.example_answer ? '<br><br>📝 예시 답안: <em>' + q.example_answer + '</em>' : '');
                }
            } else {
                // Fallback self-check scoring
                feedbackEl.className = 'writing-feedback';
                feedbackEl.style.background = '#e8f5e9';
                feedbackEl.style.border = '1px solid #4CAF50';
                feedbackEl.style.borderRadius = '8px';
                feedbackEl.style.padding = '12px';
                feedbackEl.style.marginTop = '10px';

                let html = '<strong>📝 모범 답안</strong><br><em>' + (q.blank_answer || '') + '</em>';
                if (q.wrong_explanations && q.wrong_explanations.default) {
                    html += '<br><strong>조건:</strong><br>' + q.wrong_explanations.default;
                }
                html += '<br><br><strong>조건을 충족했나요?</strong>';
                feedbackEl.innerHTML = html;

                // Two buttons for self-check: 충족했어요 / 부족해요
                const btn1 = document.createElement('button');
                btn1.textContent = '✓ 충족했어요';
                btn1.style.cssText = 'margin-top:8px;margin-right:8px;padding:8px 12px;background:#4CAF50;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;';
                btn1.onclick = () => { recordAnswer(q, true); showNextButton(); };
                feedbackEl.appendChild(btn1);

                const btn2 = document.createElement('button');
                btn2.textContent = '✗ 부족해요';
                btn2.style.cssText = 'padding:8px 12px;background:#f44336;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;';
                btn2.onclick = () => { recordAnswer(q, false); showNextButton(); };
                feedbackEl.appendChild(btn2);

                return; // Don't call recordAnswer here, buttons will do it
            }

            recordAnswer(q, isCorrect);
            showNextButton();
        }

        // ── 원문 리더 (책처럼 보기) ──
        let readerFontLevel = 1; // 0=small, 1=medium, 2=large

        function getReaderTexts() {
            // 현재 레슨에 따라 올바른 reader 데이터 반환
            if (currentLesson === 'kor2') return window.__kor2ReaderTexts || {};
            if (currentLesson === 'kor3') return window.__kor3ReaderTexts || {};
            return window.__korReaderTexts || {};
        }

        function openReader(guideId) {
            const texts = getReaderTexts();
            if (!texts || !texts[guideId]) {
                alert('원문 데이터를 찾을 수 없습니다.');
                return;
            }
            const data = texts[guideId];
            const overlay = document.getElementById('reader-overlay');
            const body = document.getElementById('reader-body');
            document.getElementById('reader-header-title').textContent = data.title;

            let html = '';
            html += `<h1 class="reader-title">${data.title}</h1>`;
            html += `<p class="reader-meta">${data.meta}</p>`;

            data.body.forEach(block => {
                if (block.heading) {
                    html += `<div class="reader-scene-heading">${block.heading}</div>`;
                }
                // 텍스트를 줄바꿈 기준으로 단락 분리
                const paragraphs = block.text.split('\n').filter(p => p.trim());
                paragraphs.forEach(p => {
                    const trimmed = p.trim();
                    // 대사 판별: "나 「로 시작하거나 큰따옴표로 시작
                    const isDialogue = /^["\"「『]/.test(trimmed) || /^["]/.test(trimmed);
                    html += `<p class="reader-paragraph${isDialogue ? ' dialogue' : ''}">${trimmed}</p>`;
                });
            });

            html += '<div class="reader-end-mark">· · ·</div>';
            body.innerHTML = html;
            body.scrollTop = 0;

            // 폰트 크기 복원
            body.className = 'reader-body' + (readerFontLevel === 0 ? ' font-small' : readerFontLevel === 2 ? ' font-large' : '');

            overlay.classList.add('active');
        }

        function closeReader() {
            document.getElementById('reader-overlay').classList.remove('active');
        }

        function toggleReaderFont() {
            readerFontLevel = (readerFontLevel + 1) % 3;
            const body = document.getElementById('reader-body');
            body.className = 'reader-body' + (readerFontLevel === 0 ? ' font-small' : readerFontLevel === 2 ? ' font-large' : '');
            const btn = document.querySelector('.reader-font-btn');
            btn.textContent = readerFontLevel === 0 ? '가' : readerFontLevel === 1 ? '가' : '가';
            btn.style.fontSize = readerFontLevel === 0 ? '11px' : readerFontLevel === 1 ? '13px' : '16px';
        }

        // 설명글쓰기 세션 시작

            const pa = QUIZ_DATA.perf_assessment;
            if (!pa || !pa.writing) {
                alert('설명글쓰기 자료가 없습니다.');
                return;
            }

            // 설명 방법 카드 + 연습 문항 + 개요 짜기
            const methodCards = pa.writing.explanation_methods.map(em => ({
                type: 'explanation_method_card',
                ...em
            }));
            const practiceQs = pa.writing.practice_questions.map(q => ({
                ...q,
                type: 'short_reading'
            }));
            const outlineExs = (pa.writing.outline_exercises || []).map(oe => ({
                type: 'outline_exercise',
                topic: oe.topic,
                method_focus: oe.method_focus,
                outline: oe.model_outline
            }));

            currentSession = [...methodCards, ...practiceQs, ...outlineExs];
            currentQuestionIndex = 0;
            sessionScore = 0;
            totalAnswered = 0;

            const modeLabel = '수행평가 - 설명글쓰기';
            document.querySelector('.header-title').textContent = getHeaderTitle(modeLabel);

            showQuestion();

            // [06b A-1] 다중정답 모드 감지 (q.answer_indices 배열)
            const isMulti = Array.isArray(q.answer_indices) && q.answer_indices.length > 0;

            const shuffled = q.choices.map((choice, idx) => ({ choice, idx }));
            shuffleArray(shuffled);

            if (isMulti) {
                // 다중정답: 체크박스형 토글 + 정답 개수 안내 + 제출 버튼
                const need = q.answer_indices.length;

                info.textContent = '✏️ 정답 ' + need + '개를 모두 고른 뒤 제출하세요';
                container.appendChild(info);

                const selectedSet = new Set();
                const correctSet = new Set(q.answer_indices);

                shuffled.forEach((item, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                    btn.dataset.origIdx = item.idx;
                    btn.onclick = () => {
                        if (btn.disabled) return;
                        if (btn.classList.contains('multi-selected')) {
                            btn.classList.remove('multi-selected');
                            selectedSet.delete(item.idx);
                        } else {
                            btn.classList.add('multi-selected');
                            selectedSet.add(item.idx);
                        }
                    };
                    container.appendChild(btn);
                });

                const submitBtn = document.createElement('button');
                submitBtn.id = 'multi-answer-submit';
                submitBtn.textContent = '제출';
                submitBtn.style.cssText = 'grid-column:1/-1;padding:14px;margin-top:8px;background:#1a73e8;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;';
                submitBtn.onclick = () => handleChoiceBlankMultiAnswer(q, selectedSet, correctSet);
                container.appendChild(submitBtn);
                return;
            }

            // 단일정답: 기존 로직
            // Map correct_index through shuffle (correct 필드도 fallback)
            const correctIdx = q.correct_index != null ? q.correct_index : q.correct;
            const newCorrect = shuffled.findIndex(x => x.idx === correctIdx);

            shuffled.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = getExamPerfChoiceLabel(q, item, idx);
                btn.onclick = () => handleChoiceBlankAnswer(q, idx, newCorrect, item.choice);
                container.appendChild(btn);

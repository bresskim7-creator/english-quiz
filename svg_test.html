="190" font-size="14" font-family="sans-serif" text-anchor="middle" fill="#92400e" font-weight="bold">입사각 = 반사각</text></svg></div><h2>LC-04_refraction: 빛의 굴절</h2><div class="card"><svg viewBox="0 0 340 260" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arrowBlue2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f97316"/></marker></defs><text x="170" y="22" font-size="16" font-weight="bold" font-family="sans-serif" text-anchor="middle" fill="#1f2937">빛의 굴절</text><rect x="20" y="50" width="300" height="65" fill="#dbeafe" rx="4"/><text x="35" y="100" font-size="13" font-family="sans-serif" fill="#1e40af" font-weight="500">공기</text><rect x="20" y="115" width="300" height="120" fill="#a7f3d0" rx="4"/><text x="35" y="160" font-size="13" font-family="sans-serif" fill="#065f46" font-weight="500">물</text><line x1="20" y1="115" x2="320" y2="115" stroke="#4b5563" stroke-width="2.5"/><line x1="170" y1="115" x2="170" y2="30" stroke="#6b7280" stroke-width="2" stroke-dasharray="4,4"/><line x1="70" y1="60" x2="170" y2="115" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue2)"/><line x1="170" y1="115" x2="230" y2="195" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/><circle cx="170" cy="115" r="3" fill="#1f2937"/><path d="M150,95 Q160,85 170,75" stroke="#2563eb" stroke-width="1.5" fill="none"/><text x="130" y="88" font-size="13" font-family="sans-serif" fill="#2563eb" font-weight="500">입사각</text><path d="M170,75 Q180,100 190,135" stroke="#f97316" stroke-width="1.5" fill="none"/><text x="205" y="130" font-size="13" font-family="sans-serif" fill="#f97316" font-weight="500">굴절각</text><rect x="50" y="220" width="240" height="28" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="6"/><text x="170" y=

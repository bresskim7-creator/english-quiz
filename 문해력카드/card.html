<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>문해력 한 장 · 요약 훈련</title><style>
:root{--bg:#f4f2ec;--card:#fff;--ink:#20201d;--mut:#57564f;--line:#cdc8ba;--soft:#e6e2d7;--ok:#0f6e56;--okbg:#dcf1e8;--no:#a32d2d;--nobg:#fbe6e5;--acc:#0f6e56;--accbg:#dcefe5}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.6}
.wrap{max-width:720px;margin:0 auto;padding:18px 14px 64px}
h1{font-size:21px;margin:0 0 4px;letter-spacing:-.2px}
.lead{font-size:13.5px;color:var(--mut);margin:0 0 14px}
.card{background:#fff;border:1px solid var(--soft);border-radius:14px;border-top:5px solid #0f6e56;padding:16px 16px 18px;margin-top:8px;box-shadow:0 2px 10px rgba(40,38,30,.05)}
.ptitle{font-size:18px;font-weight:800;margin:0 0 12px;line-height:1.35;letter-spacing:-.2px}
.stepno{display:inline-block;font-size:12px;font-weight:800;color:#fff;background:var(--acc);border-radius:99px;padding:3px 12px;margin:16px 0 8px;letter-spacing:.2px}
.stepno.two{background:#6a4fc0}.stepno.three{background:#bd7d13}
.sguide{font-size:13.5px;color:#4a4942;margin:0 0 9px}
.sen{display:block;width:100%;text-align:left;font-family:inherit;font-size:16px;background:#fbfaf6;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:8px;cursor:pointer;line-height:1.7;color:var(--ink);box-shadow:0 1px 0 rgba(40,38,30,.04);transition:background .12s,border-color .12s}
.sen:hover{background:#f3eee1;border-color:#bdb7a5}
.sen .num{display:inline-block;min-width:24px;height:24px;line-height:24px;text-align:center;background:#efe6cf;color:#8a5a12;font-weight:800;font-size:13px;border-radius:50%;margin-right:8px;vertical-align:1px}
.sen.ok{border-color:var(--ok);background:var(--okbg);font-weight:600}
.sen.ok .num{background:#0f6e56;color:#fff}
.sen.no{border-color:var(--no);background:var(--nobg)}
i.g{font-style:normal;color:#7a5f1f;font-size:.9em}
.fb{display:none;margin-top:9px}.fb.on{display:block}
.fx{font-size:13.5px;background:var(--accbg);border:1px solid #bfe0d2;border-radius:9px;padding:10px 12px;line-height:1.6}
.fb.no .fx{background:var(--nobg);border-color:#eec4c2;color:#7c2b2b}
.fb.ok .fx{background:var(--okbg);border-color:#b6e0cf;color:#0b4a3a}
.saybox{font-size:14.5px;color:#3f3e38;background:#fbfaf6;border:1.5px dashed #c3bda9;border-radius:11px;padding:11px 13px;line-height:1.65}
.rvl{display:block;width:100%;font-family:inherit;font-size:14px;font-weight:800;color:#fff;background:var(--acc);border:none;border-radius:11px;padding:12px;cursor:pointer;margin-top:2px;box-shadow:0 1px 4px rgba(15,110,86,.25)}
.rvl:hover{background:#0c5c48}
.model{font-size:14.5px;background:#fff6d6;border:1.5px solid #e6d69a;border-radius:10px;padding:11px 13px;line-height:1.65;font-weight:600;margin-bottom:11px}
.model b{color:#835410}
.maph{font-size:13px;font-weight:800;color:var(--acc);margin:4px 0 7px}
.maprow{display:flex;gap:8px;align-items:flex-start;font-size:13.2px;line-height:1.55;margin-bottom:6px}
.tag{flex:none;font-size:11px;font-weight:800;border-radius:6px;padding:3px 8px;margin-top:1px;white-space:nowrap}
.t-int{background:#e9e7e0;color:#4d4a42}
.t-core{background:#d6f0e5;color:#0b6b53}
.t-evd{background:#e5ddf6;color:#5b3fa0}
.t-res{background:#dcecfb;color:#1a5591}
.selfcheck{background:#f6f3ea;border:1px solid #e3ddcd;border-radius:10px;padding:11px 12px;margin-top:13px}
.selfcheck>.sch{font-size:13.2px;font-weight:800;color:#5b43ad}
.ck{display:block;width:100%;text-align:left;font-family:inherit;font-size:14px;background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;margin-top:8px;cursor:pointer;line-height:1.5;color:var(--ink)}
.ck.on{border-color:var(--ok);background:var(--okbg);font-weight:700}
.ck.on::before{content:"\2713 ";color:var(--ok);font-weight:800}
.score{margin-top:10px;font-size:14.5px;font-weight:800;color:var(--mut);text-align:center}
.score.one{color:#8a5a12}
.score.two{color:var(--ok)}
.more{background:#e7f0fb;border:1.5px solid #b9d4f0;border-radius:11px;padding:12px 13px;margin-top:15px;font-size:13.5px;line-height:1.6}
.more b{color:#17538f}
.more a{display:inline-block;margin-top:6px;color:#0f4c96;font-weight:800;text-decoration:none}
.more a:hover{text-decoration:underline}
.src{font-size:11px;color:#8f8e86;margin-top:16px;line-height:1.5;word-break:break-all}
.src a{color:#82817a}
/* ── 2주차 인터랙션(삭제·일반화·재구성) 전용 추가 스타일 (1주차 선택자 불변) ── */
.sen.rsen{cursor:default;box-shadow:none}
.sen.rsen:hover{background:#fbfaf6;border-color:var(--line)}
.sen.delsen.struck{text-decoration:line-through;opacity:.42}
.sen.delsen.struck .num{opacity:.6}
.sen.delsen.miss{border-color:#d8b24a;background:#fbf4de}
.fx .cutlist{margin-top:6px}
.fx .cutlist>div{margin-top:5px}
.confirm{display:block;width:100%;font-family:inherit;font-size:14px;font-weight:800;color:#fff;background:#6a4fc0;border:none;border-radius:11px;padding:12px;cursor:pointer;margin:6px 0 2px;box-shadow:0 1px 4px rgba(106,79,192,.25)}
.confirm:hover{background:#573fa8}
.opts{margin-top:2px}
.opt{display:block;width:100%;text-align:left;font-family:inherit;font-size:15.5px;background:#fbfaf6;border:1.5px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:8px;cursor:pointer;line-height:1.6;color:var(--ink);box-shadow:0 1px 0 rgba(40,38,30,.04);transition:background .12s,border-color .12s}
.opt:hover{background:#f3eee1;border-color:#bdb7a5}
.opt.ok{border-color:var(--ok);background:var(--okbg);font-weight:600}
.opt.no{border-color:var(--no);background:var(--nobg)}
</style></head><body><div class="wrap">
<h1>문해력 한 장 · 요약 훈련</h1>
<p class="lead">짧은 글 한 편을 읽고 → 핵심 문장(글쓴이가 가장 하고 싶은 말)을 찾고 → 한 문장으로 요약해 말해 보자. 하루 5분.</p>
<div id="root"></div>
</div>

<script src="cards.js"></script>
<script>
// ── 데이터 주입점(카드별) ── 렌더 시 각 카드 데이터에서 채워짐. 인터랙션 로직(pick/rv/ck/playSound)은 카드01 원본과 동일.
var CORRECT=null,HINTS={},CORRECT_FB='',done=false;
var CARD=null; // 현재 카드(2주차 인터랙션 핸들러가 참조)

function pick(el){
  if(done)return;
  var n=parseInt(el.getAttribute('data-n'),10);
  var box=document.getElementById('s1fb');
  if(n===CORRECT){
    el.classList.add('ok');done=true;
    document.querySelectorAll('.sen').forEach(function(s){s.style.cursor='default';});
    box.className='fb on ok';
    box.querySelector('.fx').innerHTML=CORRECT_FB;
    playSound('correct');
  }else{
    el.classList.add('no');
    box.className='fb on no';
    box.querySelector('.fx').innerHTML='<b>다시!</b> '+HINTS[n];
    playSound('incorrect');
    setTimeout(function(){el.classList.remove('no');},700);
  }
}
function rv(btn){var fb=btn.nextElementSibling;if(fb&&fb.classList.contains('fb'))fb.classList.add('on');btn.style.display='none';}
function ck(btn){
  btn.classList.toggle('on');
  var total=document.querySelectorAll('.ck').length;
  var n=document.querySelectorAll('.ck.on').length;
  var s=document.getElementById('score');
  if(n===0){s.textContent='하나씩 눌러서 확인해 봐';s.className='score';}
  else if(n<total){s.textContent='빠진 게 있으면 넣어서 다시 말해보자';s.className='score one';}
  else{s.textContent='핵심 다 담겼어!';s.className='score two';playSound('correct');}
}
// ── 사운드: PA 앱(index.html)과 동일 ──
var _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx){try{_audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(_audioCtx.state==='suspended'){_audioCtx.resume().catch(function(){});}
  return _audioCtx;
}
function playSound(type){
  try{
    var ctx=getAudioCtx();if(!ctx)return;
    var gain=ctx.createGain();gain.connect(ctx.destination);
    if(type==='correct'){
      gain.gain.value=0.25;
      [523,659,784].forEach(function(freq,i){var osc=ctx.createOscillator();osc.type='sine';osc.frequency.value=freq;osc.connect(gain);osc.start(ctx.currentTime+i*0.12);osc.stop(ctx.currentTime+i*0.12+0.15);});
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.6);
    }else{
      gain.gain.value=0.16;
      [440,349].forEach(function(freq,i){var osc=ctx.createOscillator();osc.type='sine';osc.frequency.value=freq;osc.connect(gain);osc.start(ctx.currentTime+i*0.12);osc.stop(ctx.currentTime+i*0.12+0.12);});
      gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.35);
    }
  }catch(e){}
}

// ── 2주차 인터랙션 핸들러 ──
// 삭제(delete_noise): 문장 토글로 지우고, '확인'으로 채점(선택집합 vs deletable).
function delToggle(el){ if(done)return; el.classList.toggle('struck'); }
function delConfirm(btn){
  if(done)return;
  var struck=[];
  document.querySelectorAll('.delsen').forEach(function(b){ if(b.classList.contains('struck')) struck.push(parseInt(b.getAttribute('data-n'),10)); });
  var del=(CARD.deletable||[]);
  var wrongStruck=struck.filter(function(n){return del.indexOf(n)<0;}); // 지우면 안 되는데 지움
  var missed=del.filter(function(n){return struck.indexOf(n)<0;});      // 지워야 하는데 안 지움
  var box=document.getElementById('s1fb');
  if(wrongStruck.length===0 && missed.length===0){
    done=true;
    document.querySelectorAll('.delsen').forEach(function(b){
      b.style.cursor='default';
      var n=parseInt(b.getAttribute('data-n'),10);
      if(del.indexOf(n)<0) b.classList.add('ok'); // 남은 핵심(뼈대) 강조
    });
    btn.style.display='none';
    box.className='fb on ok';
    box.querySelector('.fx').innerHTML=CARD.delete_fb_ok||'<b>좋아!</b> 남은 문장이 이 글의 뼈대야.';
    playSound('correct');
  }else{
    box.className='fb on no';
    var msg='<b>다시!</b> ';
    wrongStruck.forEach(function(n){var b=document.querySelector('.delsen[data-n="'+n+'"]');if(b)b.classList.add('no');});
    if(wrongStruck.length){
      // 잘못 지운 필수문장(essential) 우선 — 기존 hints 유지
      var focus=wrongStruck[0];
      msg+=(CARD.hints&&CARD.hints[focus])?CARD.hints[focus]:'지우면 안 되는 문장을 지웠어 — 주장·핵심 이유는 남겨야 뼈대가 서.';
    }else{
      // 안 지운 곁가지(missed)만 남은 경우 → 화면에 표시 + cut_reason 나열
      var cr=CARD.cut_reason||{};
      missed.forEach(function(n){var b=document.querySelector('.delsen[data-n="'+n+'"]');if(b)b.classList.add('miss');});
      var items='';
      missed.forEach(function(n){ if(cr[n]) items+='<div>('+n+') '+cr[n]+'</div>'; });
      if(items){ msg+='이 문장들은 <b>곁가지</b>야 — 눌러서 지워 봐:<div class="cutlist">'+items+'</div>'; }
      else { msg+='아직 지울 수 있는 예시·군더더기가 남았어. 꼭 필요한 문장만 남게 더 지워 봐.'; }
    }
    box.querySelector('.fx').innerHTML=msg;
    playSound('incorrect');
    setTimeout(function(){document.querySelectorAll('.delsen.no,.delsen.miss').forEach(function(b){b.classList.remove('no');b.classList.remove('miss');});},1800);
  }
}
// 일반화/재구성(generalize·reconstruct): 보기 옵션 클릭 채점(index vs correct).
function pickOpt(el){
  if(done)return;
  var i=parseInt(el.getAttribute('data-i'),10);
  var box=document.getElementById('s1fb');
  if(i===CARD.correct){
    el.classList.add('ok');done=true;
    document.querySelectorAll('.opt').forEach(function(b){b.style.cursor='default';});
    box.className='fb on ok';
    box.querySelector('.fx').innerHTML=CARD.gen_fb_ok||CARD.recon_fb_ok||'<b>정답!</b>';
    playSound('correct');
  }else{
    el.classList.add('no');
    box.className='fb on no';
    var hint=(CARD.hints&&CARD.hints[i])?CARD.hints[i]:'다시 생각해 봐.';
    box.querySelector('.fx').innerHTML='<b>다시!</b> '+hint;
    playSound('incorrect');
    setTimeout(function(){el.classList.remove('no');},700);
  }
}
// STEP1 렌더 분기. pick_core_sentence(1주차) 출력은 완전 불변.
function renderStep1(card){
  var it=card.interaction||'pick_core_sentence';
  var g='';
  if(it==='pick_core_sentence'){
    g+='<div class="stepno">STEP 1 · 읽고, 핵심 문장 찾기</div>';
    g+='<p class="sguide">'+card.step1_guide+'</p>';
    card.sentences.forEach(function(s,i){
      g+='<button class="sen" data-n="'+(i+1)+'" onclick="pick(this)"><span class="num">'+(i+1)+'</span>'+s+'</button>';
    });
    g+='<div id="s1fb" class="fb"><div class="fx"></div></div>';
  }else if(it==='delete_noise'){
    g+='<div class="stepno">STEP 1 · 지우고 뼈대만 남기기</div>';
    g+='<p class="sguide">'+card.step1_guide+'</p>';
    card.sentences.forEach(function(s,i){
      g+='<button class="sen delsen" data-n="'+(i+1)+'" onclick="delToggle(this)"><span class="num">'+(i+1)+'</span>'+s+'</button>';
    });
    g+='<button class="confirm" onclick="delConfirm(this)">확인 — 남은 문장 보기</button>';
    g+='<div id="s1fb" class="fb"><div class="fx"></div></div>';
  }else if(it==='generalize'||it==='reconstruct'){
    var label=(it==='generalize')?'STEP 1 · 한 단어로 묶기':'STEP 1 · 주제문 만들기';
    g+='<div class="stepno">'+label+'</div>';
    g+='<p class="sguide">'+card.step1_guide+'</p>';
    card.sentences.forEach(function(s,i){
      g+='<div class="sen rsen"><span class="num">'+(i+1)+'</span>'+s+'</div>';
    });
    g+='<div class="opts">';
    (card.options||[]).forEach(function(o,i){
      g+='<button class="opt" data-i="'+i+'" onclick="pickOpt(this)">'+o+'</button>';
    });
    g+='</div>';
    g+='<div id="s1fb" class="fb"><div class="fx"></div></div>';
  }else{
    g+='<div class="stepno">STEP 1</div><p class="sguide">이 카드 형식은 아직 준비 중이에요.</p>';
  }
  return g;
}

// ── 렌더 ── ?d=YYYY-MM-DD 로 카드 데이터 조회 → DOM 생성. 데이터 없으면 안전 실패(준비 중).
function _pad2(x){return x<10?'0'+x:''+x;}
function _mhGetDate(){var m=location.search.match(/[?&]d=([^&]*)/);return m?decodeURIComponent(m[1]):'';}
function _mhNotReady(){
  document.getElementById('root').innerHTML='<div class="card"><p class="ptitle">이 날짜 카드는 아직 준비 중이에요</p><p class="sguide">앱으로 돌아가 &lsquo;오늘의 한 장&rsquo;을 먼저 해도 좋아.</p></div>';
}
function renderCard(card){
  CARD=card;
  CORRECT=card.correct;HINTS=card.hints||{};CORRECT_FB=card.correct_fb||'';done=false;
  document.title='문해력 한 장 · 요약 훈련 ('+_pad2(card.n)+')';
  var h='';
  h+='<div class="card">';
  h+='<p class="ptitle">'+card.ptitle+'</p>';
  h+=renderStep1(card);
  h+='<div class="stepno two">STEP 2 · 말로 요약하기</div>';
  h+='<p class="sguide">'+card.step2_guide+'</p>';
  h+='<div class="saybox">'+card.saybox+'</div>';
  h+='<div class="stepno three">STEP 3 · 모범과 견주고 셀프 체크</div>';
  h+='<button class="rvl" onclick="rv(this)">모범 요약·구조 확인하기</button>';
  h+='<div class="fb">';
  h+='<div class="model">모범 요약 &mdash; <b>'+card.model+'</b></div>';
  h+='<div class="maph">글의 구조 한눈에 보기</div>';
  card.map.forEach(function(r){
    h+='<div class="maprow"><span class="tag t-'+r.tag+'">'+r.label+'</span><span>'+r.text+'</span></div>';
  });
  h+='<div class="selfcheck">';
  h+='<div class="sch">내가 말한 요약에 이게 있었어? <span style="font-weight:400;color:#82817a">— 눌러서 체크</span></div>';
  card.selfcheck.forEach(function(c){
    h+='<button class="ck" onclick="ck(this)">'+c+'</button>';
  });
  h+='<div class="score" id="score">하나씩 눌러서 확인해 봐</div>';
  h+='</div>';
  h+='</div>';
  if(card.more){
    h+='<div class="more"><b>📺 다 했으면, 관심 있으면 더 보기</b><br>'+card.more.desc+'<br><a href="'+card.more.url+'" target="_blank" rel="noopener">'+card.more.link_label+'</a></div>';
  }
  h+='</div>';
  h+='<p class="src">출처 — '+(card.sources||[]).map(function(s){
    return s.url?(s.text+' (<a href="'+s.url+'">'+s.url_label+'</a>)'):s.text;
  }).join(' · ')+'</p>';
  document.getElementById('root').innerHTML=h;
}
(function(){
  var cards=window.MUNHAERAK_CARDS||{};
  var card=cards[_mhGetDate()];
  if(card){renderCard(card);}else{_mhNotReady();}
})();
</script>
</body></html>
